<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequently Asked Questions - Town of Kennard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    .blue-header { background-color: #001f3f; }
    .top-brand { padding: 6px 0; }
    .menu-bar { background-color: #001f3f; padding: 8px 0; }
    .blue-card {
      background: linear-gradient(135deg, #e6f0ff, #d0e0f5);
      border: none;
      box-shadow: 0 4px 12px rgba(0, 31, 63, 0.15);
      transition: all 0.3s ease;
      height: 100%;
    }
    .blue-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 31, 63, 0.25);
    }
  </style>
</head>
<body>

  <!-- Header will be inserted here -->
  <div id="header-placeholder"></div>

  <!-- Main FAQ content -->
  <div class="container section">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="card h-100 p-4 text-center" style="background: white; border: 1px solid #e0e0e0;">
          <h3>Quick Help</h3>
          <p class="mb-4">Answers to the most common questions about living and doing business in Kennard, Indiana.</p>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card h-100 p-4" style="background: white; border: 1px solid #e0e0e0;">
          <h3>How Kennard Works</h3>
          <p>These FAQs are written specifically for how our small town operates — from wastewater payments and trash service to Sheriff and Volunteer Fire Department procedures.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- FAQ CARDS (same as before) -->
  <div class="container section">
    <div class="row g-4">
      <!-- Paste your 8 blue cards here exactly as in the previous version -->
    </div>
  </div>

  <!-- Footer will be inserted here -->
  <div id="footer-placeholder"></div>

  <!-- Load header and footer -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('header.html')
        .then(r => r.text())
        .then(html => document.getElementById('header-placeholder').innerHTML = html);

      fetch('footer.html')
        .then(r => r.text())
        .then(html => document.getElementById('footer-placeholder').innerHTML = html);
    });
  </script>
</body>
</html>
