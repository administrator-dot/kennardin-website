name: Deploy to GitHub Pages with Pagefind Search

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build Pagefind search index
        run: |
          pagefind --source . --output-path ./pagefind

      - name: Minify HTML and CSS (optional but nice)
        run: |
          find . -type f -name "*.html" -exec html-minifier-terser --collapse-whitespace --remove-comments -o {} {} \;
          find . -type f -name "*.css" -exec cleancss -o {} {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
