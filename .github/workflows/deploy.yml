name: Deploy to GitHub Pages (Awesome Version)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allows you to run it manually from GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install minification tools
        run: npm install -g html-minifier-terser clean-css-cli

      - name: Minify HTML files (remove whitespace, comments, etc.)
        run: |
          find . -type f -name "*.html" -exec html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --minify-css true \
            --minify-js true \
            -o {} {} \;

      - name: Minify CSS files
        run: |
          find . -type f -name "*.css" -exec cleancss -o {} {} \;

      - name: Optimize images (jpg, png, webp)
        run: |
          sudo apt-get install -y imagemagick
          find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec mogrify -quality 85 -strip {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
