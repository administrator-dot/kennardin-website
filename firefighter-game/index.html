document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.19 + Math.random() * 0.23; this.vx += (Math.random() - 0.5) * 1.9; }
    if (this.type === 'smoke') { this.vy -= 0.06; this.vx += (Math.random() - 0.5) * 0.5; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 3.8;
    const vy = -4.2 - Math.random() * 6.2;
    const colors = ['#FF1100', '#FF5500', '#FFAA00', '#FF3300', '#FF7700'];
    particles.push(new Particle(x + (Math.random()-0.5)*52, y + (Math.random()-0.5)*38, vx, vy, colors[Math.floor(Math.random()*colors.length)], 52 + Math.random()*38, 8 + Math.random()*14, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 34; i++) {
    const spread = (Math.random() - 0.5) * 6;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*7, mouseY + (Math.random()-0.5)*7, dirX + spread, dirY + spread - 5.2, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*58, y + (Math.random()-0.5)*30, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 13 + Math.random()*18, 'smoke'));
  }
}

function createSmallExplosion(x, y) {
  for (let i = 0; i < 28; i++) {
    const vx = (Math.random() - 0.5) * 8.5;
    const vy = (Math.random() - 0.5) * 7 - 4;
    particles.push(new Particle(x, y, vx, vy, '#FFAA00', 22, 7 + Math.random()*8, 'fire'));
  }
  explosions.push({x, y, life: 22});
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF'); grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);
  // trees (distant)
  ctx.fillStyle = '#2A6B2A';
  ctx.fillRect(20, 385, 42, 135); ctx.beginPath(); ctx.arc(41, 375, 36, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(1040, 390, 38, 130); ctx.beginPath(); ctx.arc(1060, 375, 34, 0, Math.PI*2); ctx.fill();
}

function drawSouthParkHouse(x, color, burned) {
  const alpha = burned ? 0.65 : 1;
  ctx.globalAlpha = alpha;
  // walls - South Park bright color
  ctx.fillStyle = burned ? '#222' : color;
  ctx.fillRect(x, 205, 265, 315);
  // thick black outlines (South Park style)
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 8;
  ctx.strokeRect(x+8, 205, 249, 315);
  // roof
  ctx.fillStyle = burned ? '#111' : '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-22, 195);
  ctx.lineTo(x+132, burned ? 138 : 108);
  ctx.lineTo(x+287, 195);
  ctx.fill();
  ctx.stroke();
  // chimney
  ctx.fillStyle = burned ? '#111' : '#A33';
  ctx.fillRect(x+172, 118, 29, 58);
  // porch
  ctx.fillStyle = burned ? '#222' : '#6B4E2A';
  ctx.fillRect(x+32, 460, 98, 60);
  // door (still visible when burned - broken look)
  ctx.fillStyle = burned ? '#111' : '#3C2F1F';
  ctx.fillRect(x+102, 410, 44, 110);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+119, 465, 9, 9);
  // windows (still visible when burned - black/broken)
  ctx.fillStyle = burned ? '#111' : '#AACCFF';
  ctx.fillRect(x+33, 263, 54, 80);
  ctx.fillRect(x+173, 263, 54, 80);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 7;
  ctx.strokeRect(x+28, 258, 64, 90);
  ctx.strokeRect(x+168, 258, 64, 90);
  ctx.globalAlpha = 1;
  // driveway (only for levels with cars, but drawn under house for consistency)
  ctx.fillStyle = '#555';
  ctx.fillRect(x + 80, 510, 110, 20);
}
