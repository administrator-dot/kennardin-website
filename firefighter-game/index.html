<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 15px; padding: 14px 28px; font-size: 20px;
    background: #C00; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #F00; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
  .encourage {
    position: absolute; font-size: 26px; font-weight: bold; color: #FF0;
    text-shadow: 0 0 12px #000; pointer-events: none; animation: floatUp 2.2s forwards;
  }
  @keyframes floatUp { to { transform: translateY(-140px); opacity: 0; } }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:58px; margin-top:70px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:10px 0 40px;">For Kennard Volunteer Fire Department • New Castle, Indiana</p>
    <button onclick="startGame()">START MISSION</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>

<canvas id="game" width="900" height="600"></canvas>

<script>
// ============== Kennard Fire Defender – Small-Town Indiana Edition (6 Levels) ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');

let score = 0;
let mouseX = 450, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let fireSpots = [];
let particles = [];
let explosions = []; // small explosion bursts for tankers

const truckX = 95;
const truckY = 505;

const levels = [
  // 1: Single realistic home
  { name: "Level 1 – Neighborhood Home", fireSpots: [
    {x: 495, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 615, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 470, y: 152, w: 235, h: 48, health: 340, maxHealth: 340, type: 'roof'}
  ], entities: [{type:'house', x:460}] },

  // 2: Two homes side-by-side
  { name: "Level 2 – Two Homes on Elm Street", fireSpots: [
    {x: 280, y: 242, w: 55, h: 85, health: 230, maxHealth: 230, type: 'window'},
    {x: 370, y: 242, w: 55, h: 85, health: 230, maxHealth: 230, type: 'window'},
    {x: 255, y: 155, w: 210, h: 46, health: 320, maxHealth: 320, type: 'roof'},
    {x: 580, y: 242, w: 55, h: 85, health: 230, maxHealth: 230, type: 'window'},
    {x: 670, y: 242, w: 55, h: 85, health: 230, maxHealth: 230, type: 'window'},
    {x: 555, y: 155, w: 210, h: 46, health: 320, maxHealth: 320, type: 'roof'}
  ], entities: [{type:'house', x:255}, {type:'house', x:555}] },

  // 3: Home + clear burning sedan
  { name: "Level 3 – Home + Burning Sedan", fireSpots: [
    {x: 495, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 615, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 470, y: 152, w: 235, h: 48, health: 340, maxHealth: 340, type: 'roof'},
    {x: 165, y: 348, w: 112, h: 52, health: 190, maxHealth: 190, type: 'hood'},
    {x: 185, y: 312, w: 68, h: 40, health: 140, maxHealth: 140, type: 'cab'}
  ], entities: [{type:'house', x:460}, {type:'sedan', x:140}] },

  // 4: Home + pickup truck
  { name: "Level 4 – Home + Pickup Truck", fireSpots: [
    {x: 495, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 615, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 470, y: 152, w: 235, h: 48, health: 340, maxHealth: 340, type: 'roof'},
    {x: 155, y: 340, w: 128, h: 48, health: 210, maxHealth: 210, type: 'bed'},
    {x: 172, y: 308, w: 78, h: 38, health: 155, maxHealth: 155, type: 'cab'}
  ], entities: [{type:'house', x:460}, {type:'pickup', x:130}] },

  // 5: Home + semi tanker (clear positioning + explosions)
  { name: "Level 5 – Home + Semi Tanker Fire", fireSpots: [
    {x: 495, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 615, y: 242, w: 58, h: 88, health: 240, maxHealth: 240, type: 'window'},
    {x: 470, y: 152, w: 235, h: 48, health: 340, maxHealth: 340, type: 'roof'},
    {x: 105, y: 305, w: 82, h: 72, health: 290, maxHealth: 290, type: 'cab'},
    {x: 195, y: 278, w: 265, h: 98, health: 460, maxHealth: 460, type: 'tanker'}
  ], entities: [{type:'house', x:460}, {type:'semi', x:80}] },

  // 6: Apartment building + two vehicles (final challenge)
  { name: "Level 6 – Apartment + Car & Pickup", fireSpots: [
    {x: 380, y: 182, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 380, y: 272, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 380, y: 362, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 510, y: 182, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 510, y: 272, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 510, y: 362, w: 68, h: 68, health: 260, maxHealth: 260, type: 'window'},
    {x: 465, y: 138, w: 260, h: 42, health: 380, maxHealth: 380, type: 'roof'},
    {x: 140, y: 348, w: 112, h: 52, health: 190, maxHealth: 190, type: 'hood'},
    {x: 155, y: 312, w: 68, h: 40, health: 140, maxHealth: 140, type: 'cab'},
    {x: 280, y: 340, w: 128, h: 48, health: 210, maxHealth: 210, type: 'bed'},
    {x: 297, y: 308, w: 78, h: 38, health: 155, maxHealth: 155, type: 'cab'}
  ], entities: [{type:'apartment', x:360}, {type:'sedan', x:120}, {type:'pickup', x:260}] }
];

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') {
      this.vy -= 0.17 + Math.random() * 0.2;
      this.vx += (Math.random() - 0.5) * 1.7;
    }
    if (this.type === 'smoke') {
      this.vy -= 0.06;
      this.vx += (Math.random() - 0.5) * 0.5;
    }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 3.4;
    const vy = -3.8 - Math.random() * 5.8;
    const colors = ['#FF1100', '#FF5500', '#FFAA00', '#FF3300', '#FF7700'];
    particles.push(new Particle(x + (Math.random()-0.5)*48, y + (Math.random()-0.5)*35, vx, vy, colors[Math.floor(Math.random()*colors.length)], 48 + Math.random()*35, 7 + Math.random()*13, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 34; i++) {
    const spread = (Math.random() - 0.5) * 6;
    const dirX = (mouseX - (truckX + 142)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*7, mouseY + (Math.random()-0.5)*7, dirX + spread, dirY + spread - 5.2, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*58, y + (Math.random()-0.5)*30, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 13 + Math.random()*18, 'smoke'));
  }
}

function createSmallExplosion(x, y) {
  for (let i = 0; i < 22; i++) {
    const vx = (Math.random() - 0.5) * 7;
    const vy = (Math.random() - 0.5) * 7 - 3;
    particles.push(new Particle(x, y, vx, vy, '#FFAA00', 18, 5 + Math.random()*6, 'fire'));
  }
  explosions.push({x, y, life: 22});
}

function showPutOutMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'encourage';
  msg.textContent = text;
  msg.style.left = (Math.random() * 260 + 320) + 'px';
  msg.style.top = '220px';
  document.getElementById('overlay').appendChild(msg);
  setTimeout(() => msg.remove(), 2300);
}

const safetyTips = [
  "Never hide from fire – get low and go!",
  "Smoke alarms save lives – test yours monthly.",
  "Stop, drop, and roll if your clothes catch fire.",
  "Have an escape plan and practice it with your family.",
  "Call 911 first – then get out fast.",
  "Kitchen fires? Smother with a lid, never water!"
];

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF');
  grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);
  // trees
  ctx.fillStyle = '#2A6B2A';
  ctx.fillRect(18, 385, 42, 135);
  ctx.beginPath(); ctx.arc(39, 375, 36, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(775, 390, 38, 130);
  ctx.beginPath(); ctx.arc(795, 375, 34, 0, Math.PI*2); ctx.fill();
}

function drawRealisticHouse(x) {
  // Walls + siding
  ctx.fillStyle = '#E8D5B8';
  ctx.fillRect(x, 205, 265, 315);
  ctx.strokeStyle = '#C9B89A';
  ctx.lineWidth = 3;
  for (let i = 0; i < 13; i++) {
    ctx.beginPath(); ctx.moveTo(x+10, 215 + i*23); ctx.lineTo(x+255, 215 + i*23); ctx.stroke();
  }
  // Roof
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-22, 195);
  ctx.lineTo(x+132, 108);
  ctx.lineTo(x+287, 195);
  ctx.fill();
  // Chimney
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+172, 118, 29, 58);
  // Porch + door
  ctx.fillStyle = '#6B4E2A';
  ctx.fillRect(x+32, 460, 98, 60);
  ctx.fillStyle = '#3C2F1F';
  ctx.fillRect(x+102, 410, 44, 110);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+119, 465, 9, 9);
  // Windows
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 7;
  ctx.strokeRect(x+28, 258, 64, 90);
  ctx.strokeRect(x+168, 258, 64, 90);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+33, 263, 54, 80);
  ctx.fillRect(x+173, 263, 54, 80);
}

function drawApartment(x) {
  ctx.fillStyle = '#D8D0C8';
  ctx.fillRect(x, 165, 275, 355);
  ctx.fillStyle = '#8B2A00';
  ctx.fillRect(x-5, 140, 285, 35); // roof
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 5;
  for (let i = 0; i < 6; i++) {
    ctx.strokeRect(x+20 + i*80, 180, 64, 68);
    ctx.strokeRect(x+20 + i*80, 270, 64, 68);
    ctx.strokeRect(x+20 + i*80, 360, 64, 68);
  }
  ctx.fillStyle = '#AACCFF';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(x+25 + i*80, 185, 54, 58);
    ctx.fillRect(x+25 + i*80, 275, 54, 58);
    ctx.fillRect(x+25 + i*80, 365, 54, 58);
  }
}

function drawRealisticFireTruck() {
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX+40, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+122, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX+40, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+122, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C00';
  ctx.fillRect(truckX, truckY-44, 185, 74);
  ctx.fillStyle = '#A00';
  ctx.fillRect(truckX+14, truckY-76, 82, 40);
  ctx.fillStyle = '#113344';
  ctx.fillRect(truckX+22, truckY-71, 35, 29);
  ctx.fillRect(truckX+63, truckY-71, 27, 29);
  ctx.fillStyle = '#222';
  ctx.fillRect(truckX+98, truckY-40, 72, 50);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX+105, truckY-34, 14, 14);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(truckX+140, truckY-72, 19, 40);
  ctx.fillStyle = '#AAA';
  for (let i = 0; i < 7; i++) ctx.fillRect(truckX+143, truckY-68 + i*6, 13, 3);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX+8, truckY-20, 173, 10);
  ctx.fillStyle = '#FFF';
  ctx.fillRect(truckX+8, truckY-11, 173, 5);
}

function drawSedan(x) {
  ctx.fillStyle = '#2A2A2A';
  ctx.fillRect(x+8, 355, 118, 52);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+22, 315, 82, 44);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+32, 322, 35, 28);
  ctx.fillRect(x+72, 322, 26, 28);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+35, 397, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+98, 397, 17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+30, 400, 12, 6);
  ctx.fillRect(x+93, 400, 12, 6);
}

function drawPickup(x) {
  ctx.fillStyle = '#1F2A3C';
  ctx.fillRect(x+5, 352, 135, 50);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+18, 316, 78, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+27, 322, 38, 26);
  ctx.fillRect(x+72, 322, 18, 26);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+32, 394, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+105, 394, 17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+115, 355, 22, 22); // bed
}

function drawSemi(x) {
  ctx.fillStyle = '#C00';
  ctx.fillRect(x, 300, 88, 78);
  ctx.fillStyle = '#113344';
  ctx.fillRect(x+14, 312, 42, 38);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+85, 278, 275, 102);
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+92, 288, 260, 14);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+35, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+115, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+185, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+255, 370, 19, 0, Math.PI*2); ctx.fill();
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const data = levels[lvl-1];
  fireSpots = data.fireSpots.map(s => ({...s, lastHit: 0}));
  particles = [];
  explosions = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    const tip = safetyTips[Math.floor(Math.random() * safetyTips.length)];
    document.getElementById('levelTitle').textContent = levels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Excellent work, Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: " + tip;
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < levels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed ALL 6 levels! Amazing job protecting Kennard!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  loadLevel(1);
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = levels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'house') drawRealisticHouse(ent.x);
    if (ent.type === 'apartment') drawApartment(ent.x);
    if (ent.type === 'sedan') drawSedan(ent.x);
    if (ent.type === 'pickup') drawPickup(ent.x);
    if (ent.type === 'semi') drawSemi(ent.x);
  });

  drawRealisticFireTruck();

  let burningCount = 0;
  const now = Date.now();

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    burningCount++;

    if (Math.random() < 0.024) spot.health = Math.min(spot.health + 3.8, spot.maxHealth);
    if (spot.health < spot.maxHealth && now - spot.lastHit > 7000) spot.health = Math.min(spot.health + 2.4, spot.maxHealth);

    const intensity = Math.floor(spot.health / 13);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 1.1;
        spot.lastHit = now;
        p.life = 7;
        if (spot.type === 'tanker' && Math.random() < 0.18) createSmallExplosion(spot.x + spot.w/2, spot.y + spot.h/2);
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      if (spot.type === 'tanker' || spot.type === 'roof') score += 25;
      else score += 10;
      scoreEl.textContent = score;
      if (Math.random() < 0.4) showPutOutMessage("FIRE OUT!");
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    ctx.globalAlpha = e.life / 22;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(e.x - 12, e.y - 12, 24, 24);
    ctx.globalAlpha = 1;
    e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  // thinner gray hose
  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 142, truckY - 32);
  ctx.quadraticCurveTo(truckX + 218, truckY - 140, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 9, mouseY - 9, 18, 18);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 5, mouseY - 14, 10, 8);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
