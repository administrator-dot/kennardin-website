<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender - Level 1</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 12px; padding: 14px 32px; font-size: 22px;
    background: #C00; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #F00; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:58px; margin-top:80px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <div style="margin-top:30px;">
      <button onclick="startGame()">START LEVEL 1</button>
    </div>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:80px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0; margin-bottom:20px;">LEVEL 1 COMPLETE!</h1>
    <div style="background:rgba(0,0,0,0.8); padding:25px 40px; border-radius:12px; display:inline-block; max-width:680px;">
      <p id="encourageText" style="font-size:32px; margin:10px 0 15px;">Great Work, Kennard Fire Defender!<br>You saved the day!</p>
      <p id="safetyTip" style="font-size:26px; line-height:1.5; margin:15px 0;"></p>
    </div>
    <div style="margin-top:30px;">
      <button onclick="resetGame()">PLAY AGAIN</button>
      <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
    </div>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span>
</div>

<canvas id="game" width="1150" height="600"></canvas>

<script>
// ============== KVFD – Level 1 Only, Perfectly Aligned to Your Image ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let fireSpots = [];
let particles = [];
let explosions = [];

const truckX = 48;
const truckY = 505;

const safetyTipsPool = [
  "Never hide from fire – get low and go!",
  "Smoke alarms save lives – test yours monthly.",
  "For grease fires: Smother with a lid – never use water!",
  "Outdoor fires: Keep a hose or water nearby and never leave them unattended."
];

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  fireSpots = [
    {x: 735, y: 255, w: 48, h: 72, health: 2800, maxHealth: 2800, type: 'window', points: 10}, // bottom of left window
    {x: 855, y: 255, w: 48, h: 72, health: 2800, maxHealth: 2800, type: 'window', points: 10}, // bottom of right window
    {x: 700, y: 138, w: 230, h: 42, health: 4200, maxHealth: 4200, type: 'roof', points: 25},   // top of roof
    {x: 785, y: 415, w: 42, h: 105, health: 2200, maxHealth: 2200, type: 'door', points: 15}    // bottom of door
  ];
  particles = [];
  explosions = [];
  gameState = 'playing';
  score = 0;
  scoreEl.textContent = 0;
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    const tip = safetyTipsPool[Math.floor(Math.random() * safetyTipsPool.length)];
    document.getElementById('safetyTip').textContent = "Safety Tip: " + tip;
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  startGame();
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.18 + Math.random() * 0.22; this.vx += (Math.random() - 0.5) * 1.8; }
    if (this.type === 'smoke') { this.vy -= 0.05; this.vx += (Math.random() - 0.5) * 0.4; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.2, this.life / 40);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2, this.y - 2.5, 4, 7);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  const count = Math.max(2, Math.floor(intensity * 0.22));
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 2.6;
    const vy = -3.2 - Math.random() * 4.4;
    const colors = ['#FF4400', '#FF8800', '#FFCC00'];
    particles.push(new Particle(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*18, vx, vy, colors[Math.floor(Math.random()*colors.length)], 26, 4.5 + Math.random()*6.5, 'fire'));
  }
}

function createWaterParticles() {
  const count = 7;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random() - 0.5) * 3.2;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*4, mouseY + (Math.random()-0.5)*4, dirX + spread, dirY + spread - 4.8, '#33CCFF', 20, 3, 'water'));
  }
}

function createSmoke(x, y) {
  const count = 4;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*35, y + (Math.random()-0.5)*18, (Math.random()-0.5)*1.6, -0.9 - Math.random()*1.2, '#666666', 360, 8 + Math.random()*8, 'smoke'));
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF'); grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);
  ctx.fillStyle = '#777';
  ctx.fillRect(0, 510, canvas.width, 12);
}

function drawKennardHouse() {
  const x = 680;
  const baseY = 205;
  ctx.fillStyle = '#FFEE66';
  ctx.fillRect(x, baseY, 265, 315);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 10;
  ctx.strokeRect(x+5, baseY, 255, 315);
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-25, baseY - 10);
  ctx.lineTo(x+132, baseY - 100);
  ctx.lineTo(x+290, baseY - 10);
  ctx.fill();
  ctx.fillStyle = '#A33';
  ctx.fillRect(x + 175, baseY - 85, 28, 55); // chimney
  ctx.fillStyle = '#3C2F1F';
  ctx.fillRect(x+105, baseY + 205, 45, 110); // door
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+122, baseY + 260, 10, 10); // knob
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+35, baseY + 40, 55, 82); // left window
  ctx.fillRect(x+175, baseY + 40, 55, 82); // right window
  ctx.strokeRect(x+30, baseY + 35, 65, 92);
  ctx.strokeRect(x+170, baseY + 35, 65, 92);
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(truckX+18, truckY+38, 182, 18);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX+48, truckY+28, 26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+128, truckY+28, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX+48, truckY+28, 13, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+128, truckY+28, 13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C00';
  ctx.fillRect(truckX, truckY-48, 190, 78);
  ctx.fillStyle = '#A00';
  ctx.fillRect(truckX+15, truckY-78, 88, 42);
  ctx.fillStyle = '#113';
  ctx.fillRect(truckX+22, truckY-73, 40, 30);
  ctx.fillRect(truckX+68, truckY-73, 30, 30);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX+8, truckY-22, 175, 12);
  ctx.fillStyle = '#CC0';
  ctx.fillRect(truckX+105, truckY-85, 75, 12);
  for (let i = 0; i < 6; i++) ctx.fillRect(truckX+108, truckY-82 + i*11, 68, 4);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(truckX+155, truckY-75, 22, 38);
  ctx.fillStyle = '#AAA';
  for (let i = 0; i < 6; i++) ctx.fillRect(truckX+158, truckY-72 + i*7, 15, 3);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawKennardHouse();
  drawSideFireTruck();

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', canvas.width - 20, 545);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;

    const growthRate = 0.025;
    if (Math.random() < growthRate) spot.health = Math.min(spot.health + 8, spot.maxHealth);

    const intensity = Math.floor(spot.health / 16);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 1.1;
        spot.lastHit = Date.now();
        p.life = 6;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += spot.points || 10;
      scoreEl.textContent = score;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    ctx.globalAlpha = e.life / 24;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(e.x - 14, e.y - 14, 28, 28);
    ctx.globalAlpha = 1;
    e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 148, truckY - 34);
  ctx.quadraticCurveTo(truckX + 235, truckY - 150, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 9, mouseY - 9, 18, 18);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 5, mouseY - 14, 10, 8);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

function createFireParticles(x, y, intensity) {
  const count = Math.max(2, Math.floor(intensity * 0.22));
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 2.6;
    const vy = -3.2 - Math.random() * 4.4;
    const colors = ['#FF4400', '#FF8800', '#FFCC00'];
    particles.push(new Particle(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*18, vx, vy, colors[Math.floor(Math.random()*colors.length)], 26, 4.5 + Math.random()*6.5, 'fire'));
  }
}

function createWaterParticles() {
  const count = 7;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random() - 0.5) * 3.2;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*4, mouseY + (Math.random()-0.5)*4, dirX + spread, dirY + spread - 4.8, '#33CCFF', 20, 3, 'water'));
  }
}

function createSmoke(x, y) {
  const count = 4;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*35, y + (Math.random()-0.5)*18, (Math.random()-0.5)*1.6, -0.9 - Math.random()*1.2, '#666666', 360, 8 + Math.random()*8, 'smoke'));
  }
}

loop();
</script>
</body>
</html>
