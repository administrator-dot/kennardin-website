<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Truck Simulation - Day / Dusk / Night</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #111; color: #fff; text-align: center; }
    h1 { margin-bottom: 5px; }
    .canvas-container { margin: 20px auto; border: 4px solid #333; background: #222; padding: 10px; display: inline-block; }
    canvas { image-rendering: pixelated; }
    .controls { margin: 15px 0; }
    button { padding: 12px 24px; margin: 0 8px; font-size: 18px; background: #001f3f; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #003366; }
    .info { max-width: 1000px; margin: 15px auto; background: #222; padding: 12px; border-radius: 8px; font-size: 15px; line-height: 1.5; }
  </style>
</head>
<body>

  <h1>Fire Truck Simulation</h1>
  <p class="info">Day • Dusk • Night levels with sun, sunset, and moon.<br>Click "Ignite Fires" to start realistic fires.<br>Click any flame to put it out. Test the new fire truck!</p>

  <div class="controls">
    <button onclick="changeBackground(0)">☀️ Day Sky</button>
    <button onclick="changeBackground(1)">🌅 Dusk</button>
    <button onclick="changeBackground(2)">🌙 Night</button>
    <button onclick="igniteFires()" style="background:#c0392b;">🔥 Ignite Fires</button>
    <button onclick="extinguishAll()">🧯 Put Out All Fires</button>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="1200" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentBg = 0;
    let fires = [];

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      for (let x = 0; x <= 1200; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke(); }
      for (let y = 0; y <= 600; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke(); }
    }

    function drawBackground(bg) {
      if (bg === 0) { // Day
        ctx.fillStyle = '#5cc8ff'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#4caf50'; ctx.fillRect(0, 480, 1200, 120);
        // Sun
        ctx.fillStyle = '#ffeb3b'; ctx.beginPath(); ctx.arc(200, 120, 40, 0, Math.PI*2); ctx.fill();
      } else if (bg === 1) { // Dusk
        ctx.fillStyle = '#ff7a00'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#3a8c3a'; ctx.fillRect(0, 480, 1200, 120);
        // Sunset sun
        ctx.fillStyle = '#ff4500'; ctx.beginPath(); ctx.arc(950, 140, 35, 0, Math.PI*2); ctx.fill();
      } else { // Night
        ctx.fillStyle = '#112233'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#223322'; ctx.fillRect(0, 480, 1200, 120);
        // Moon
        ctx.fillStyle = '#f4f4f4'; ctx.beginPath(); ctx.arc(200, 120, 35, 0, Math.PI*2); ctx.fill();
        // Stars
        ctx.fillStyle = '#fff'; ctx.fillRect(400, 80, 4, 4); ctx.fillRect(650, 50, 3, 3); ctx.fillRect(900, 110, 5, 5);
      }
    }

    function drawFireTruck(x, y) {
      // Detailed red ladder fire truck (upscaled from your image)
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x, y-95, 260, 85); // main body
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+200, y-115, 80, 55); // cab
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x+215, y-105, 35, 30); // window
      // Ladder
      ctx.fillStyle = '#bdc6d0'; ctx.fillRect(x+30, y-125, 160, 18);
      ctx.fillStyle = '#bdc6d0'; ctx.fillRect(x+40, y-140, 12, 30);
      // Wheels
      ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(x+55, y-15, 25, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+155, y-15, 25, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+225, y-15, 25, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.arc(x+55, y-15, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+155, y-15, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+225, y-15, 12, 0, Math.PI*2); ctx.fill();
      // Blue light on top
      ctx.fillStyle = '#3498db'; ctx.fillRect(x+240, y-135, 18, 12);
    }

    function drawBlueCar(x, y) {
      ctx.fillStyle = '#3498db'; ctx.fillRect(x, y-55, 160, 55);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+110, y-72, 55, 35);
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+15, y-50, 35, 22); ctx.fillRect(x+60, y-50, 35, 22);
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(x+35, y-8, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+125, y-8, 18, 0, Math.PI*2); ctx.fill();
    }

    function drawHouse(x, y) {
      ctx.fillStyle = '#f4d9b8'; ctx.fillRect(x, y-160, 200, 160);
      ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(x, y-160); ctx.lineTo(x+100, y-220); ctx.lineTo(x+200, y-160); ctx.fill();
      ctx.fillStyle = '#34495e';
      ctx.fillRect(x+25, y-130, 35, 35); ctx.fillRect(x+80, y-130, 35, 35); ctx.fillRect(x+135, y-130, 35, 35);
      ctx.fillRect(x+25, y-80, 35, 35); ctx.fillRect(x+80, y-80, 35, 35);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+145, y-80, 35, 80);
    }

    function drawFire(x, y, size) {
      const intensity = Math.random() * 0.3 + 0.7;
      ctx.fillStyle = `rgba(255, ${80 + Math.random()*100}, 0, ${intensity})`;
      ctx.beginPath(); ctx.arc(x, y, size * (0.8 + Math.random()*0.4), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255, 180, 0, ${intensity})`;
      ctx.beginPath(); ctx.arc(x + Math.random()*8-4, y - size*0.6, size*0.6, 0, Math.PI*2); ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, 1200, 600);
      drawBackground(currentBg);
      drawGrid();

      drawFireTruck(120, 480);
      drawBlueCar(520, 480);
      drawHouse(860, 480);

      fires.forEach(f => drawFire(f.x, f.y, f.size));
    }

    function igniteFires() {
      fires = [];
      // Fire Truck
      fires.push({x: 190, y: 405, size: 13}); // engine
      fires.push({x: 325, y: 435, size: 11}); // gas tank
      // Blue Car
      fires.push({x: 555, y: 430, size: 11}); // engine
      fires.push({x: 630, y: 450, size: 9});  // gas tank
      // House
      fires.push({x: 885, y: 370, size: 10});
      fires.push({x: 940, y: 370, size: 10});
      fires.push({x: 995, y: 370, size: 10});
      fires.push({x: 1005, y: 410, size: 12});
      fires.push({x: 910, y: 280, size: 8});
      fires.push({x: 960, y: 280, size: 8});
      render();
    }

    function extinguishAll() {
      fires = [];
      render();
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      for (let i = fires.length - 1; i >= 0; i--) {
        const f = fires[i];
        const dx = f.x - clickX;
        const dy = f.y - clickY;
        if (Math.sqrt(dx*dx + dy*dy) < f.size + 18) {
          fires.splice(i, 1);
          render();
          return;
        }
      }
    });

    function changeBackground(bg) {
      currentBg = bg;
      render();
    }

    setInterval(() => { if (fires.length > 0) render(); }, 80);
    render();
  </script>
</body>
</html>
