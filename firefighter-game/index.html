<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 12px; padding: 14px 32px; font-size: 22px;
    background: #C00; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #F00; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:58px; margin-top:80px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:20px 0 40px;">For KVFD • Kennard, Indiana</p>
    <div style="margin-top:30px;">
      <button onclick="startWithDifficulty(1)">EASY</button>
      <button onclick="startWithDifficulty(2)">MEDIUM</button>
      <button onclick="startWithDifficulty(3)">HARD</button>
      <button onclick="startWithDifficulty(4)">EXPERT</button>
    </div>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:80px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0; margin-bottom:20px;"></h1>
    <div style="background:rgba(0,0,0,0.8); padding:25px 40px; border-radius:12px; display:inline-block; max-width:680px;">
      <p id="encourageText" style="font-size:32px; margin:10px 0 15px;"></p>
      <p id="safetyTip" style="font-size:26px; line-height:1.5; margin:15px 0;"></p>
    </div>
    <div style="margin-top:30px;">
      <button onclick="nextLevel()">NEXT LEVEL</button>
      <button onclick="resetGame()">PLAY AGAIN</button>
      <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
    </div>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; 
  Level: <span id="level">1</span> &nbsp;&nbsp;&nbsp; 
  Difficulty: <span id="difficulty">Easy</span>
</div>

<canvas id="game" width="1150" height="600"></canvas>

<script>
// ============== KVFD – Toned Down Flames + Fixed Win Flow + Easier Extinguishing on Easy ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const diffEl = document.getElementById('difficulty');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let currentDifficulty = 1;
let fireSpots = [];
let particles = [];
let explosions = [];

const truckX = 48;
const truckY = 505;

const safetyTipsPool = [
  "Never hide from fire – get low and go!",
  "Smoke alarms save lives – test yours monthly.",
  "Stop, drop, and roll if your clothes catch fire.",
  "Have an escape plan and practice it with your family.",
  "Call 911 first – then get out fast.",
  "For grease fires: Smother with a lid – never use water!",
  "Outdoor fires: Keep a hose or water nearby and never leave them unattended.",
  "Electrical fires: Unplug if safe, then use a fire extinguisher – never water.",
  "If your home fills with smoke, crawl low where the air is cleaner."
];

const levels = [
  { name: "Level 1 – Yellow House", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 2800, maxHealth: 2800, type: 'window', points: 10, entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 2800, maxHealth: 2800, type: 'window', points: 10, entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 4200, maxHealth: 4200, type: 'roof', points: 25, entity: 0},
    {x: 780, y: 410, w: 45, h: 110, health: 2200, maxHealth: 2200, type: 'door', points: 15, entity: 0}
  ], entities: [{type:'house', x:680, color:'#FFEE66', short:false}] },

  { name: "Level 2 – Short House + Full House", fireSpots: [
    {x: 380, y: 268, w: 55, h: 65, health: 2600, maxHealth: 2600, type: 'window', points: 10, entity: 0},
    {x: 470, y: 268, w: 55, h: 65, health: 2600, maxHealth: 2600, type: 'window', points: 10, entity: 0},
    {x: 355, y: 193, w: 210, h: 46, health: 3800, maxHealth: 3800, type: 'roof', points: 25, entity: 0},
    {x: 720, y: 228, w: 55, h: 85, health: 2800, maxHealth: 2800, type: 'window', points: 10, entity: 1},
    {x: 810, y: 228, w: 55, h: 85, health: 2800, maxHealth: 2800, type: 'window', points: 10, entity: 1},
    {x: 695, y: 141, w: 210, h: 46, health: 4200, maxHealth: 4200, type: 'roof', points: 25, entity: 1},
    {x: 780, y: 410, w: 45, h: 110, health: 2400, maxHealth: 2400, type: 'door', points: 15, entity: 1}
  ], entities: [{type:'house', x:355, color:'#66CCFF', short:true}, {type:'house', x:695, color:'#66FF99', short:false}] },

  { name: "Level 3 – Yellow House + Blue Sedan", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 3000, maxHealth: 3000, type: 'window', points: 10, entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 3000, maxHealth: 3000, type: 'window', points: 10, entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 4500, maxHealth: 4500, type: 'roof', points: 25, entity: 0},
    {x: 210, y: 345, w: 105, h: 55, health: 2400, maxHealth: 2400, type: 'hood', points: 15, entity: 1},
    {x: 235, y: 310, w: 65, h: 42, health: 2000, maxHealth: 2000, type: 'cab', points: 20, entity: 1}
  ], entities: [{type:'house', x:680, color:'#FFEE66', short:false}, {type:'sedan', x:170}] },

  { name: "Level 4 – Pink House + Red Pickup", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 3000, maxHealth: 3000, type: 'window', points: 10, entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 3000, maxHealth: 3000, type: 'window', points: 10, entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 4500, maxHealth: 4500, type: 'roof', points: 25, entity: 0},
    {x: 195, y: 338, w: 130, h: 50, health: 2600, maxHealth: 2600, type: 'bed', points: 15, entity: 1},
    {x: 212, y: 306, w: 80, h: 40, health: 2100, maxHealth: 2100, type: 'cab', points: 20, entity: 1}
  ], entities: [{type:'house', x:680, color:'#FF99CC', short:false}, {type:'pickup', x:170}] },

  { name: "Level 5 – Semi Tanker Fire", fireSpots: [
    {x: 520, y: 300, w: 85, h: 75, health: 3800, maxHealth: 3800, type: 'cab', points: 20, entity: 0},
    {x: 610, y: 275, w: 270, h: 102, health: 6200, maxHealth: 6200, type: 'tanker', points: 30, entity: 0}
  ], entities: [{type:'semi', x:480}] },

  { name: "Level 6 – Wrecked Cars on Grass", fireSpots: [
    {x: 680, y: 345, w: 105, h: 55, health: 2800, maxHealth: 2800, type: 'hood', points: 15, entity: 0},
    {x: 705, y: 310, w: 65, h: 42, health: 2200, maxHealth: 2200, type: 'cab', points: 20, entity: 0},
    {x: 820, y: 338, w: 130, h: 50, health: 2800, maxHealth: 2800, type: 'bed', points: 15, entity: 1},
    {x: 837, y: 306, w: 80, h: 40, health: 2200, maxHealth: 2200, type: 'cab', points: 20, entity: 1}
  ], entities: [{type:'sedan', x:650}, {type:'pickup', x:790}] }
];

function startWithDifficulty(diff) {
  currentDifficulty = diff;
  diffEl.textContent = ['Easy','Medium','Hard','Expert'][diff-1];
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const data = levels[lvl-1];
  fireSpots = data.fireSpots.map(s => ({...s, lastHit: Date.now(), lastSpread: Date.now()}));
  particles = [];
  explosions = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    const tipIndex = (currentLevel - 1) % safetyTipsPool.length;
    const tip = safetyTipsPool[tipIndex];
    document.getElementById('levelTitle').textContent = levels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Excellent work, Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: " + tip;
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < levels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all levels! Great job protecting Kennard!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  loadLevel(1);
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.18 + Math.random() * 0.22; this.vx += (Math.random() - 0.5) * 1.8; }
    if (this.type === 'smoke') { this.vy -= 0.05; this.vx += (Math.random() - 0.5) * 0.4; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.15, this.life / 45);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2, this.y - 2.5, 4, 7);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  const count = Math.max(2, Math.floor(intensity * 0.28)); // very conservative for performance
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 2.8;
    const vy = -3.2 - Math.random() * 4.5;
    const colors = ['#FF4400', '#FF8800', '#FFCC00'];
    particles.push(new Particle(x + (Math.random()-0.5)*35, y + (Math.random()-0.5)*28, vx, vy, colors[Math.floor(Math.random()*colors.length)], 32, 5 + Math.random()*8, 'fire'));
  }
}

function createWaterParticles() {
  const count = 9;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random() - 0.5) * 4;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*5, mouseY + (Math.random()-0.5)*5, dirX + spread, dirY + spread - 5, '#33CCFF', 24, 3.2, 'water'));
  }
}

function createSmoke(x, y) {
  const count = 5;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*40, y + (Math.random()-0.5)*22, (Math.random()-0.5)*1.8, -0.9 - Math.random()*1.2, '#666666', 420, 9 + Math.random()*10, 'smoke'));
  }
}

function createSmallExplosion(x, y) {
  const count = 8;
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 6.5;
    const vy = (Math.random() - 0.5) * 5.5 - 2.5;
    particles.push(new Particle(x, y, vx, vy, '#FFAA00', 16, 4.5 + Math.random()*5, 'fire'));
  }
  explosions.push({x, y, life: 16});
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF'); grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);
  ctx.fillStyle = '#777';
  ctx.fillRect(0, 510, canvas.width, 12);
}

function drawSouthParkHouse(x, color, short, burned) {
  const alpha = burned ? 0.7 : 1;
  const houseHeight = short ? 195 : 315;
  const baseY = short ? 325 : 205;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = burned ? '#222' : color;
  ctx.fillRect(x, baseY, 265, houseHeight);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 10;
  ctx.strokeRect(x+5, baseY, 255, houseHeight);
  ctx.fillStyle = burned ? '#111' : '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-25, baseY - 10);
  ctx.lineTo(x+132, short ? baseY - 60 : baseY - 100);
  ctx.lineTo(x+290, baseY - 10);
  ctx.fill();
  ctx.fillStyle = burned ? '#111' : '#A33';
  ctx.fillRect(x + 175, baseY - 85, 28, 55);
  ctx.fillStyle = burned ? '#111' : '#3C2F1F';
  ctx.fillRect(x+105, baseY + (short ? 115 : 205), 45, 110);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+122, baseY + (short ? 170 : 260), 10, 10);
  ctx.fillStyle = burned ? '#111' : '#AACCFF';
  ctx.fillRect(x+35, baseY + 40, 55, short ? 55 : 82);
  ctx.fillRect(x+175, baseY + 40, 55, short ? 55 : 82);
  ctx.strokeRect(x+30, baseY + 35, 65, short ? 62 : 92);
  ctx.strokeRect(x+170, baseY + 35, 65, short ? 62 : 92);
  ctx.globalAlpha = 1;
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(truckX+20, truckY+39, 175, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX+45, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+125, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX+45, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+125, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C00';
  ctx.fillRect(truckX, truckY-44, 185, 74);
  ctx.fillStyle = '#A00';
  ctx.fillRect(truckX+12, truckY-76, 85, 40);
  ctx.fillStyle = '#113344';
  ctx.fillRect(truckX+20, truckY-71, 38, 29);
  ctx.fillRect(truckX+65, truckY-71, 28, 29);
  ctx.fillStyle = '#222';
  ctx.fillRect(truckX+100, truckY-40, 75, 52);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX+8, truckY-20, 173, 10);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(truckX+145, truckY-72, 20, 40);
  ctx.fillStyle = '#AAA';
  for (let i = 0; i < 7; i++) ctx.fillRect(truckX+148, truckY-68 + i*6, 14, 3);
}

function drawSedan(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+12, truckY+33, 118, 16);
  ctx.fillStyle = '#1E5A9E';
  ctx.fillRect(x+12, 348, 115, 52);
  ctx.fillStyle = '#0F3A6B';
  ctx.fillRect(x+25, 315, 85, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+35, 322, 38, 26);
  ctx.fillRect(x+78, 322, 25, 26);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+38, 390, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+98, 390, 17, 0, Math.PI*2); ctx.fill();
}

function drawPickup(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+8, truckY+33, 138, 16);
  ctx.fillStyle = '#1F2A3C';
  ctx.fillRect(x+8, 350, 135, 50);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+22, 314, 80, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+30, 320, 40, 27);
  ctx.fillRect(x+75, 320, 20, 27);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+35, 392, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+108, 392, 17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+118, 355, 24, 24);
}

function drawSemi(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+18, truckY+33, 315, 16);
  ctx.fillStyle = '#C00';
  ctx.fillRect(x, 300, 88, 78);
  ctx.fillStyle = '#113344';
  ctx.fillRect(x+14, 312, 44, 38);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+85, 275, 280, 105);
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+92, 285, 265, 15);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+120, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+190, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+260, 370, 19, 0, Math.PI*2); ctx.fill();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = levels[currentLevel-1];
  const now = Date.now();

  data.entities.forEach((ent, i) => {
    const burned = fireSpots.filter(s => s.entity === i).every(s => s.health <= 0) && fireSpots.some(s => s.entity === i && now - s.lastHit > 16000);
    if (ent.type === 'house') drawSouthParkHouse(ent.x, ent.color, ent.short || false, burned);
    if (ent.type === 'sedan') drawSedan(ent.x);
    if (ent.type === 'pickup') drawPickup(ent.x);
    if (ent.type === 'semi') drawSemi(ent.x);
  });

  drawSideFireTruck();

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', canvas.width - 20, 545);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;

    const growthRate = currentDifficulty === 4 ? 0.042 : currentDifficulty === 3 ? 0.035 : 0.025;
    if (Math.random() < growthRate) spot.health = Math.min(spot.health + 8, spot.maxHealth);

    const reigniteTime = currentDifficulty >= 3 ? 6500 : 8800;
    if (now - spot.lastSpread > reigniteTime && spot.health > spot.maxHealth * 0.35) {
      fireSpots.push({...spot, x: spot.x + (Math.random()*95 - 47), y: spot.y + (Math.random()*75 - 37), health: currentDifficulty === 4 ? 260 : 180, lastSpread: now});
      spot.lastSpread = now;
    }

    const intensity = Math.floor(spot.health / 14); // lower intensity for smaller flames
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        const damage = currentDifficulty === 4 ? 0.65 : currentDifficulty === 3 ? 0.78 : 1.05;
        spot.health -= damage;
        spot.lastHit = now;
        p.life = 6;
        if (spot.type === 'tanker' && Math.random() < 0.22) createSmallExplosion(spot.x + spot.w/2, spot.y + spot.h/2);
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += spot.points || 10;
      scoreEl.textContent = score;
      if (Math.random() < 0.35) showPutOutMessage();
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    ctx.globalAlpha = e.life / 24;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(e.x - 14, e.y - 14, 28, 28);
    ctx.globalAlpha = 1;
    e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 148, truckY - 34);
  ctx.quadraticCurveTo(truckX + 235, truckY - 150, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 9, mouseY - 9, 18, 18);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 5, mouseY - 14, 10, 8);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
