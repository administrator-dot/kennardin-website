function startWithDifficulty(diff) {
  currentDifficulty = diff;
  diffEl.textContent = ['Easy','Medium','Hard','Expert'][diff-1];
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const data = levels[lvl-1];
  fireSpots = data.fireSpots.map(s => ({...s, lastHit: Date.now(), lastSpread: Date.now()}));
  particles = [];
  explosions = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    const tipIndex = (currentLevel - 1) % safetyTipsPool.length;
    const tip = safetyTipsPool[tipIndex];
    document.getElementById('levelTitle').textContent = levels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: " + tip;
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < levels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels! Great job protecting Kennard!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  loadLevel(1);
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.18 + Math.random() * 0.22; this.vx += (Math.random() - 0.5) * 1.8; }
    if (this.type === 'smoke') { this.vy -= 0.05; this.vx += (Math.random() - 0.5) * 0.4; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.2, this.life / 40);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2, this.y - 2.5, 4, 7);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  const count = Math.max(2, Math.floor(intensity * 0.22));
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 2.6;
    const vy = -3.2 - Math.random() * 4.4;
    const colors = ['#FF4400', '#FF8800', '#FFCC00'];
    particles.push(new Particle(x + (Math.random()-0.5)*30, y + (Math.random()-0.5)*18, vx, vy, colors[Math.floor(Math.random()*colors.length)], 26, 4.5 + Math.random()*6.5, 'fire'));
  }
}

function createWaterParticles() {
  const count = 7;
  for (let i = 0; i < count; i++) {
    const spread = (Math.random() - 0.5) * 3.2;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*4, mouseY + (Math.random()-0.5)*4, dirX + spread, dirY + spread - 4.8, '#33CCFF', 20, 3, 'water'));
  }
}

function createSmoke(x, y) {
  const count = 4;
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*35, y + (Math.random()-0.5)*18, (Math.random()-0.5)*1.6, -0.9 - Math.random()*1.2, '#666666', 360, 8 + Math.random()*8, 'smoke'));
  }
}

function createSmallExplosion(x, y) {
  const count = 7;
  for (let i = 0; i < count; i++) {
    const vx = (Math.random() - 0.5) * 6;
    const vy = (Math.random() - 0.5) * 5 - 2;
    particles.push(new Particle(x, y, vx, vy, '#FFAA00', 15, 4 + Math.random()*5, 'fire'));
  }
  explosions.push({x, y, life: 15});
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF'); grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);
  ctx.fillStyle = '#777';
  ctx.fillRect(0, 510, canvas.width, 12);
}

function drawKennardShortHouse(x, color, burned) {
  const alpha = burned ? 0.7 : 1;
  const baseY = 325;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = burned ? '#222' : color;
  ctx.fillRect(x, baseY, 265, 195);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 10;
  ctx.strokeRect(x+5, baseY, 255, 195);
  ctx.fillStyle = burned ? '#111' : '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-25, baseY - 10);
  ctx.lineTo(x+132, baseY - 60);
  ctx.lineTo(x+290, baseY - 10);
  ctx.fill();
  ctx.fillStyle = burned ? '#111' : '#A33';
  ctx.fillRect(x + 175, baseY - 85, 28, 55); // chimney
  ctx.fillStyle = burned ? '#111' : '#3C2F1F';
  ctx.fillRect(x+105, baseY + 115, 45, 80); // door - CORRECTLY CENTERED AT BOTTOM
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+122, baseY + 170, 10, 10); // knob
  ctx.fillStyle = burned ? '#111' : '#AACCFF';
  ctx.fillRect(x+35, baseY + 40, 55, 55); // left window
  ctx.fillRect(x+175, baseY + 40, 55, 55); // right window
  ctx.strokeRect(x+30, baseY + 35, 65, 62);
  ctx.strokeRect(x+170, baseY + 35, 65, 62);
  ctx.globalAlpha = 1;
}

function drawMobileHome(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x+15, truckY+33, 260, 18);
  ctx.fillStyle = '#C0C0C0';
  ctx.fillRect(x+15, 305, 260, 95);
  ctx.fillStyle = '#333';
  ctx.fillRect(x+35, 315, 50, 35);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+95, 315, 50, 35);
  ctx.fillRect(x+155, 315, 50, 35);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, 390, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+120, 390, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+200, 390, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+260, 390, 19, 0, Math.PI*2); ctx.fill();
}

function drawCornfield(x) {
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(x, 340, 160, 80);
  ctx.fillStyle = '#228B22';
  for (let i = 0; i < 12; i++) ctx.fillRect(x + 15 + i*12, 320 - Math.random()*25, 8, 60);
}

function drawGrassfield(x) {
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(x, 340, 260, 80);
  ctx.fillStyle = '#228B22';
  for (let i = 0; i < 20; i++) ctx.fillRect(x + 15 + i*12, 340 - Math.random()*20, 6, 40);
}

function drawSportsCar(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x+12, truckY+33, 118, 18);
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(x+12, 348, 115, 52);
  ctx.fillStyle = '#0F3A6B';
  ctx.fillRect(x+25, 315, 85, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+35, 322, 38, 26);
  ctx.fillRect(x+78, 322, 25, 26);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+38, 390, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+98, 390, 17, 0, Math.PI*2); ctx.fill();
}

function drawCrashedUFO(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x+20, truckY+33, 160, 18);
  ctx.fillStyle = '#A0A0A0';
  ctx.fillRect(x+25, 310, 140, 65);
  ctx.fillStyle = '#00FFFF';
  ctx.fillRect(x+45, 320, 90, 30);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+45, 390, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+145, 390, 18, 0, Math.PI*2); ctx.fill();
}

function drawShed(x) {
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x, 320, 95, 95);
  ctx.fillStyle = '#A52A2A';
  ctx.beginPath();
  ctx.moveTo(x-10, 320);
  ctx.lineTo(x+47, 280);
  ctx.lineTo(x+105, 320);
  ctx.fill();
}

function drawRV(x) {
  ctx.fillStyle = '#C0C0C0';
  ctx.fillRect(x, 300, 160, 95);
  ctx.fillStyle = '#333';
  ctx.fillRect(x+20, 310, 50, 35);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+80, 310, 50, 35);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+35, 390, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+115, 390, 19, 0, Math.PI*2); ctx.fill();
}

function drawTree(x) {
  ctx.fillStyle = '#228B22';
  ctx.fillRect(x+30, 220, 40, 160);
  ctx.fillStyle = '#006400';
  ctx.beginPath(); ctx.arc(x+50, 220, 40, 0, Math.PI*2); ctx.fill();
}

function drawHayBale(x) {
  ctx.fillStyle = '#DAA520';
  ctx.fillRect(x, 340, 85, 55);
  ctx.fillStyle = '#B8860B';
  ctx.fillRect(x+10, 350, 65, 10);
}

function drawFence(x) {
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x, 355, 260, 25);
  ctx.fillStyle = '#A0522D';
  for (let i = 0; i < 8; i++) ctx.fillRect(x + 20 + i*30, 340, 8, 40);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = levels[currentLevel-1];
  const now = Date.now();

  data.entities.forEach((ent, i) => {
    const burned = fireSpots.filter(s => s.entity === i).every(s => s.health <= 0) && fireSpots.some(s => s.entity === i && now - s.lastHit > 16000);
    if (ent.type === 'house' && ent.short) drawKennardShortHouse(ent.x, ent.color, burned);
    if (ent.type === 'house' && !ent.short) drawKennardTallHouse(ent.x, ent.color, burned);
    if (ent.type === 'sedan') drawSedan(ent.x);
    if (ent.type === 'pickup') drawPickup(ent.x);
    if (ent.type === 'semi') drawSemi(ent.x);
    if (ent.type === 'tractor') drawTractor(ent.x);
    if (ent.type === 'lawnmower') drawLawnmower(ent.x);
    if (ent.type === 'boat') drawBoatOnTrailer(ent.x);
    if (ent.type === 'mobilehome') drawMobileHome(ent.x);
    if (ent.type === 'cornfield') drawCornfield(ent.x);
    if (ent.type === 'grassfield') drawGrassfield(ent.x);
    if (ent.type === 'sportscar') drawSportsCar(ent.x);
    if (ent.type === 'crashedufo') drawCrashedUFO(ent.x);
    if (ent.type === 'shed') drawShed(ent.x);
    if (ent.type === 'rv') drawRV(ent.x);
    if (ent.type === 'tree') drawTree(ent.x);
    if (ent.type === 'haybale') drawHayBale(ent.x);
    if (ent.type === 'fence') drawFence(ent.x);
  });

  drawSideFireTruck();

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', canvas.width - 20, 545);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;

    let growthRate = 0.025;
    let reigniteTime = 8800;
    let damage = 1.1;
    if (currentDifficulty === 2) { growthRate = 0.032; reigniteTime = 7200; damage = 0.95; }
    if (currentDifficulty === 3) { growthRate = 0.042; reigniteTime = 5800; damage = 0.72; }
    if (currentDifficulty === 4) { growthRate = 0.048; reigniteTime = 4800; damage = 0.58; }

    if (Math.random() < growthRate) spot.health = Math.min(spot.health + 8, spot.maxHealth);

    if (now - spot.lastSpread > reigniteTime && spot.health > spot.maxHealth * 0.35) {
      fireSpots.push({...spot, x: spot.x + (Math.random()*95 - 47), y: spot.y + (Math.random()*75 - 37), health: currentDifficulty >= 3 ? 260 : 180, lastSpread: now});
      spot.lastSpread = now;
    }

    const intensity = Math.floor(spot.health / 16);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= damage;
        spot.lastHit = now;
        p.life = 6;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += spot.points || 10;
      scoreEl.textContent = score;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    ctx.globalAlpha = e.life / 24;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(e.x - 14, e.y - 14, 28, 28);
    ctx.globalAlpha = 1;
    e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 148, truckY - 34);
  ctx.quadraticCurveTo(truckX + 235, truckY - 150, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 9, mouseY - 9, 18, 18);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 5, mouseY - 14, 10, 8);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
