<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 15px; padding: 14px 28px; font-size: 20px;
    background: #C00; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #F00; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
  .encourage {
    position: absolute; font-size: 26px; font-weight: bold; color: #FF0;
    text-shadow: 0 0 12px #000; pointer-events: none; animation: floatUp 2.2s forwards;
  }
  @keyframes floatUp { to { transform: translateY(-140px); opacity: 0; } }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:58px; margin-top:80px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:20px 0 60px;">For Kennard Volunteer Fire Department • Kennard, Indiana</p>
    <button onclick="startGame()" style="font-size:22px; padding:16px 40px;">START MISSION</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>

<canvas id="game" width="1150" height="600"></canvas>

<script>
// ============== Kennard Fire Defender – FINAL VERSION (No Floating + Much Harder Fires + Correct Layouts) ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let fireSpots = [];
let particles = [];
let explosions = [];

const truckX = 48;   // moved further left as requested
const truckY = 505;

const levels = [
  // Level 1 – Single full house on right
  { name: "Level 1 – Yellow House", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 420, maxHealth: 420, type: 'window', entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 420, maxHealth: 420, type: 'window', entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 560, maxHealth: 560, type: 'roof', entity: 0}
  ], entities: [{type:'house', x:680, color:'#FFEE66', short:false}] },

  // Level 2 – Two homes: LEFT = short/one-story (2 windows + roof), RIGHT = full house
  { name: "Level 2 – Short House + Full House", fireSpots: [
    {x: 380, y: 260, w: 55, h: 65, health: 400, maxHealth: 400, type: 'window', entity: 0}, // short house
    {x: 470, y: 260, w: 55, h: 65, health: 400, maxHealth: 400, type: 'window', entity: 0},
    {x: 355, y: 185, w: 210, h: 46, health: 520, maxHealth: 520, type: 'roof', entity: 0},
    {x: 720, y: 228, w: 55, h: 85, health: 410, maxHealth: 410, type: 'window', entity: 1},
    {x: 810, y: 228, w: 55, h: 85, health: 410, maxHealth: 410, type: 'window', entity: 1},
    {x: 695, y: 141, w: 210, h: 46, health: 540, maxHealth: 540, type: 'roof', entity: 1}
  ], entities: [{type:'house', x:355, color:'#66CCFF', short:true}, {type:'house', x:695, color:'#66FF99', short:false}] },

  // Level 3 – One car on left grass/sidewalk (replaces left house position)
  { name: "Level 3 – Yellow House + Blue Sedan", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 430, maxHealth: 430, type: 'window', entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 430, maxHealth: 430, type: 'window', entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 570, maxHealth: 570, type: 'roof', entity: 0},
    {x: 210, y: 345, w: 105, h: 55, health: 290, maxHealth: 290, type: 'hood', entity: 1},
    {x: 235, y: 310, w: 65, h: 42, health: 230, maxHealth: 230, type: 'cab', entity: 1}
  ], entities: [{type:'house', x:680, color:'#FFEE66', short:false}, {type:'sedan', x:170}] },

  // Level 4 – One car on left grass/sidewalk
  { name: "Level 4 – Pink House + Red Pickup", fireSpots: [
    {x: 720, y: 228, w: 58, h: 88, health: 430, maxHealth: 430, type: 'window', entity: 0},
    {x: 840, y: 228, w: 58, h: 88, health: 430, maxHealth: 430, type: 'window', entity: 0},
    {x: 695, y: 138, w: 235, h: 48, health: 570, maxHealth: 570, type: 'roof', entity: 0},
    {x: 195, y: 338, w: 130, h: 50, health: 310, maxHealth: 310, type: 'bed', entity: 1},
    {x: 212, y: 306, w: 80, h: 40, health: 250, maxHealth: 250, type: 'cab', entity: 1}
  ], entities: [{type:'house', x:680, color:'#FF99CC', short:false}, {type:'pickup', x:170}] },

  // Level 5 – NO house, Semi only in center-right on grass/sidewalk
  { name: "Level 5 – Semi Tanker Fire", fireSpots: [
    {x: 135, y: 300, w: 85, h: 75, health: 410, maxHealth: 410, type: 'cab', entity: 0},
    {x: 225, y: 275, w: 270, h: 102, health: 630, maxHealth: 630, type: 'tanker', entity: 0}
  ], entities: [{type:'semi', x:105}] },

  // Level 6 – Two wrecked cars on right grass/sidewalk (replaces homes)
  { name: "Level 6 – Wrecked Cars on Grass", fireSpots: [
    {x: 680, y: 345, w: 105, h: 55, health: 320, maxHealth: 320, type: 'hood', entity: 0},
    {x: 705, y: 310, w: 65, h: 42, health: 260, maxHealth: 260, type: 'cab', entity: 0},
    {x: 820, y: 338, w: 130, h: 50, health: 320, maxHealth: 320, type: 'bed', entity: 1},
    {x: 837, y: 306, w: 80, h: 40, health: 260, maxHealth: 260, type: 'cab', entity: 1}
  ], entities: [{type:'sedan', x:650}, {type:'pickup', x:790}] }
];

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(60, Math.min(e.clientX - rect.left, canvas.width - 30));
  mouseY = Math.max(110, Math.min(e.clientY - rect.top, canvas.height - 90));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.23 + Math.random() * 0.29; this.vx += (Math.random() - 0.5) * 2.2; }
    if (this.type === 'smoke') { this.vy -= 0.06; this.vx += (Math.random() - 0.5) * 0.5; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 4.3;
    const vy = -4.9 - Math.random() * 7.2;
    const colors = ['#FF1100', '#FF5500', '#FFAA00', '#FF3300', '#FF7700'];
    particles.push(new Particle(x + (Math.random()-0.5)*58, y + (Math.random()-0.5)*42, vx, vy, colors[Math.floor(Math.random()*colors.length)], 58 + Math.random()*42, 9 + Math.random()*16, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 28; i++) {
    const spread = (Math.random() - 0.5) * 5;
    const dirX = (mouseX - (truckX + 148)) * 0.042;
    const dirY = (mouseY - (truckY - 34)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*7, mouseY + (Math.random()-0.5)*7, dirX + spread, dirY + spread - 6.2, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*32, (Math.random()-0.5)*2.8, -1.3 - Math.random()*2, '#666666', 650, 14 + Math.random()*18, 'smoke'));
  }
}

function createSmallExplosion(x, y) {
  for (let i = 0; i < 30; i++) {
    const vx = (Math.random() - 0.5) * 9;
    const vy = (Math.random() - 0.5) * 8 - 4;
    particles.push(new Particle(x, y, vx, vy, '#FFAA00', 24, 8 + Math.random()*9, 'fire'));
  }
  explosions.push({x, y, life: 24});
}

function showPutOutMessage() {
  const msg = document.createElement('div');
  msg.className = 'encourage';
  msg.textContent = "FIRE OUT!";
  msg.style.left = (Math.random() * 320 + 420) + 'px';
  msg.style.top = '240px';
  document.getElementById('overlay').appendChild(msg);
  setTimeout(() => msg.remove(), 2300);
}

const safetyTips = [
  "Never hide from fire – get low and go!",
  "Smoke alarms save lives – test yours monthly.",
  "Stop, drop, and roll if your clothes catch fire.",
  "Have an escape plan and practice it with your family.",
  "Call 911 first – then get out fast.",
  "Kitchen fires? Smother with a lid, never water!"
];

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF'); grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 520, canvas.width, 80);

  // sidewalk
  ctx.fillStyle = '#777';
  ctx.fillRect(0, 510, canvas.width, 12);
  // driveways
  ctx.fillStyle = '#555';
  ctx.fillRect(170, 510, 130, 25);   // left car driveway
  ctx.fillRect(650, 510, 140, 25);   // right house driveway
}

function drawSouthParkHouse(x, color, short, burned) {
  const alpha = burned ? 0.7 : 1;
  const height = short ? 200 : 315;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = burned ? '#222' : color;
  ctx.fillRect(x, 205, 265, height);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 10;
  ctx.strokeRect(x+5, 205, 255, height);
  ctx.fillStyle = burned ? '#111' : '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-25, 195);
  ctx.lineTo(x+132, short ? 165 : 105);
  ctx.lineTo(x+290, 195);
  ctx.fill();
  ctx.fillStyle = burned ? '#111' : '#A33';
  ctx.fillRect(x+175, short ? 155 : 115, 30, 60);
  ctx.fillStyle = burned ? '#222' : '#6B4E2A';
  ctx.fillRect(x+35, 460, 100, 60);
  ctx.fillStyle = burned ? '#111' : '#3C2F1F';
  ctx.fillRect(x+105, 410, 45, 110);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+122, 465, 10, 10);
  ctx.fillStyle = burned ? '#111' : '#AACCFF';
  ctx.fillRect(x+35, short ? 255 : 260, 55, short ? 55 : 82);
  ctx.fillRect(x+175, short ? 255 : 260, 55, short ? 55 : 82);
  ctx.strokeRect(x+30, short ? 250 : 255, 65, short ? 62 : 92);
  ctx.strokeRect(x+170, short ? 250 : 255, 65, short ? 62 : 92);
  ctx.globalAlpha = 1;
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(truckX+20, truckY+39, 175, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX+45, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+125, truckY+27, 27, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX+45, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX+125, truckY+27, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#C00';
  ctx.fillRect(truckX, truckY-44, 185, 74);
  ctx.fillStyle = '#A00';
  ctx.fillRect(truckX+12, truckY-76, 85, 40);
  ctx.fillStyle = '#113344';
  ctx.fillRect(truckX+20, truckY-71, 38, 29);
  ctx.fillRect(truckX+65, truckY-71, 28, 29);
  ctx.fillStyle = '#222';
  ctx.fillRect(truckX+100, truckY-40, 75, 52);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX+8, truckY-20, 173, 10);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(truckX+145, truckY-72, 20, 40);
  ctx.fillStyle = '#AAA';
  for (let i = 0; i < 7; i++) ctx.fillRect(truckX+148, truckY-68 + i*6, 14, 3);
}

function drawSedan(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+12, truckY+33, 118, 16);
  ctx.fillStyle = '#1E5A9E';
  ctx.fillRect(x+12, 348, 115, 52);
  ctx.fillStyle = '#0F3A6B';
  ctx.fillRect(x+25, 315, 85, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+35, 322, 38, 26);
  ctx.fillRect(x+78, 322, 25, 26);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+38, 390, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+98, 390, 17, 0, Math.PI*2); ctx.fill();
}

function drawPickup(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+8, truckY+33, 138, 16);
  ctx.fillStyle = '#1F2A3C';
  ctx.fillRect(x+8, 350, 135, 50);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+22, 314, 80, 40);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+30, 320, 40, 27);
  ctx.fillRect(x+75, 320, 20, 27);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+35, 392, 17, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+108, 392, 17, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+118, 355, 24, 24);
}

function drawSemi(x) {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x+18, truckY+33, 315, 16);
  ctx.fillStyle = '#C00';
  ctx.fillRect(x, 300, 88, 78);
  ctx.fillStyle = '#113344';
  ctx.fillRect(x+14, 312, 44, 38);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+85, 275, 280, 105);
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+92, 285, 265, 15);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+120, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+190, 370, 19, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+260, 370, 19, 0, Math.PI*2); ctx.fill();
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const data = levels[lvl-1];
  fireSpots = data.fireSpots.map(s => ({...s, lastHit: Date.now(), lastSpread: Date.now()}));
  particles = [];
  explosions = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    const tip = safetyTips[Math.floor(Math.random() * safetyTips.length)];
    document.getElementById('levelTitle').textContent = levels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Excellent work, Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: " + tip;
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < levels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all levels! Great job protecting Kennard!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  loadLevel(1);
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = levels[currentLevel-1];
  const now = Date.now();

  data.entities.forEach((ent, i) => {
    const burned = fireSpots.filter(s => s.entity === i).every(s => s.health <= 0) && fireSpots.some(s => s.entity === i && now - s.lastHit > 16000);
    if (ent.type === 'house') drawSouthParkHouse(ent.x, ent.color, ent.short || false, burned);
    if (ent.type === 'sedan') drawSedan(ent.x);
    if (ent.type === 'pickup') drawPickup(ent.x);
    if (ent.type === 'semi') drawSemi(ent.x);
  });

  drawSideFireTruck();

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;

    // Harder fires – grow faster on higher levels
    const growth = currentLevel >= 4 ? 0.038 : 0.032;
    if (Math.random() < growth) spot.health = Math.min(spot.health + 7, spot.maxHealth);

    // Reignition / comeback mechanic – stronger on higher levels
    if (now - spot.lastSpread > (currentLevel >= 5 ? 6800 : 8200) && spot.health > spot.maxHealth * 0.35) {
      fireSpots.push({...spot, x: spot.x + (Math.random()*98 - 49), y: spot.y + (Math.random()*78 - 39), health: currentLevel >= 5 ? 220 : 170, lastSpread: now});
      spot.lastSpread = now;
    }

    const intensity = Math.floor(spot.health / 10);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 0.78;   // very slow extinguishing = hard
        spot.lastHit = now;
        p.life = 7;
        if (spot.type === 'tanker' && Math.random() < 0.3) createSmallExplosion(spot.x + spot.w/2, spot.y + spot.h/2);
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += (spot.type === 'roof' || spot.type === 'tanker') ? 25 : 10;
      scoreEl.textContent = score;
      if (Math.random() < 0.45) showPutOutMessage();
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    ctx.globalAlpha = e.life / 24;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(e.x - 16, e.y - 16, 32, 32);
    ctx.globalAlpha = 1;
    e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }

  // hose (spray goes right from left truck)
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 148, truckY - 34);
  ctx.quadraticCurveTo(truckX + 235, truckY - 150, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 9, mouseY - 9, 18, 18);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 5, mouseY - 14, 10, 8);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
