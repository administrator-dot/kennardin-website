<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender - Improved Models</title>
<style>
  body { margin:0; background:#111; font-family:Arial, sans-serif; color:white; text-align:center; }
  h1 { color:#FF0; margin:30px 0 10px; }
  p { margin-bottom:25px; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:20px; padding:20px; max-width:1250px; margin:auto; }
  .model { background:#1a1a1a; border:4px solid #444; border-radius:12px; padding:12px; cursor:pointer; transition:all 0.2s; }
  .model:hover { border-color:#FF0; transform:scale(1.05); }
  canvas { width:100%; height:230px; background:#3D8C40; border-radius:8px; display:block; }
</style>
</head>
<body>
<h1>Improved Models with Larger Wheels & Rounder Shapes</h1>
<p>Click any model to enlarge. Tell me which ones you like (e.g. "Model 1, 2, 5, 7, 9, 10").</p>

<div class="grid" id="grid"></div>

<script>
// ============== MODELS WITH LARGER WHEELS + ROUNDER SHAPES + JOHN DEERE TRACTOR ==============
const models = [
  {id:1, name:"Short Blue House", color:"#66CCFF", type:"house"},
  {id:2, name:"Short Green House", color:"#66FF99", type:"house"},
  {id:3, name:"Blue Sedan", type:"sedan"},
  {id:4, name:"Red Pickup", type:"pickup"},
  {id:5, name:"John Deere Style Tractor", type:"tractor"},
  {id:6, name:"Red Rider Lawn Mower", type:"lawnmower"},
  {id:7, name:"Yacht on Trailer", type:"boat"},
  {id:8, name:"Mobile Home RV", type:"mobilehome"},
  {id:9, name:"Red Sports Car", type:"sportscar"},
  {id:10, name:"Shed", type:"shed"}
];

function createModelCanvas(m) {
  const c = document.createElement('canvas');
  c.width = 220;
  c.height = 230;
  const ctx = c.getContext('2d');
  let time = 0;

  function drawFrame() {
    ctx.clearRect(0, 0, 220, 230);
    time += 0.08;

    ctx.fillStyle = '#3D8C40';
    ctx.fillRect(0, 165, 220, 65);

    if (m.type === "house") {
      const x = 30; const baseY = 145;
      ctx.fillStyle = m.color;
      ctx.fillRect(x, baseY, 160, 120);
      ctx.strokeStyle = '#222'; ctx.lineWidth = 8;
      ctx.strokeRect(x+5, baseY, 150, 120);
      ctx.fillStyle = '#8B2A00';
      ctx.beginPath();
      ctx.moveTo(x-15, baseY - 8);
      ctx.lineTo(x+80, baseY - 48);
      ctx.lineTo(x+175, baseY - 8);
      ctx.fill();
      ctx.fillStyle = '#A33';
      ctx.fillRect(x + 115, baseY - 65, 22, 38);
      ctx.fillStyle = '#3C2F1F';
      ctx.fillRect(x+68, baseY + 70, 32, 55);
      ctx.fillStyle = '#FFCC00';
      ctx.fillRect(x+76, baseY + 98, 8, 8);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(x+28, baseY + 28, 38, 38);
      ctx.fillRect(x+105, baseY + 28, 38, 38);

      animatedFire(ctx, 48, baseY + 48, time);
      animatedFire(ctx, 125, baseY + 48, time);
      animatedFire(ctx, 80, baseY - 22, time);
      animatedFire(ctx, 75, baseY + 98, time);
    } 
    else if (m.type === "sedan") {
      ctx.fillStyle = '#1E5A9E';
      ctx.fillRect(35, 165, 125, 48);
      ctx.fillStyle = '#0F3A6B';
      ctx.fillRect(45, 142, 95, 35);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(55, 148, 40, 24);
      ctx.fillRect(105, 148, 28, 24);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(58, 205, 19, 0, Math.PI*2); ctx.fill(); // larger wheel
      ctx.beginPath(); ctx.arc(123, 205, 19, 0, Math.PI*2); ctx.fill();
      animatedFire(ctx, 65, 155, time);
      animatedFire(ctx, 115, 155, time);
    } 
    else if (m.type === "pickup") {
      ctx.fillStyle = '#C22';
      ctx.fillRect(35, 165, 140, 48);
      ctx.fillStyle = '#111';
      ctx.fillRect(48, 142, 85, 35);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(58, 148, 45, 24);
      ctx.fillRect(110, 148, 22, 24);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(55, 205, 19, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(125, 205, 19, 0, Math.PI*2); ctx.fill();
      animatedFire(ctx, 70, 155, time);
      animatedFire(ctx, 118, 155, time);
    } 
    else if (m.type === "tractor") {
      // John Deere style - rounded shapes
      ctx.fillStyle = '#228B22';
      ctx.fillRect(35, 165, 135, 52);
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(35, 178, 135, 12);
      ctx.fillStyle = '#111';
      ctx.fillRect(48, 140, 80, 38);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(58, 147, 38, 26);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(52, 205, 24, 0, Math.PI*2); ctx.fill(); // large rear wheel
      ctx.beginPath(); ctx.arc(122, 205, 16, 0, Math.PI*2); ctx.fill(); // front wheel
      animatedFire(ctx, 70, 155, time);
      animatedFire(ctx, 112, 155, time);
    } 
    else if (m.type === "lawnmower") {
      ctx.fillStyle = '#C22';
      ctx.fillRect(45, 165, 105, 42);
      ctx.fillStyle = '#111';
      ctx.fillRect(52, 148, 72, 28);
      ctx.fillStyle = '#DDD';
      ctx.fillRect(65, 152, 40, 18);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(58, 200, 14, 0, Math.PI*2); ctx.fill(); // small front wheel
      ctx.beginPath(); ctx.arc(105, 200, 19, 0, Math.PI*2); ctx.fill(); // larger rear wheel
      animatedFire(ctx, 80, 162, time);
    } 
    else if (m.type === "boat") {
      ctx.fillStyle = '#555';
      ctx.fillRect(38, 175, 145, 25);
      ctx.fillStyle = '#228B22';
      ctx.beginPath();
      ctx.moveTo(45, 155);
      ctx.quadraticCurveTo(70, 120, 115, 118);
      ctx.quadraticCurveTo(155, 145, 162, 160);
      ctx.lineTo(45, 165);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.fillRect(75, 130, 55, 25);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(55, 198, 16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(145, 198, 16, 0, Math.PI*2); ctx.fill();
      animatedFire(ctx, 95, 135, time);
    } 
    else if (m.type === "mobilehome") {
      ctx.fillStyle = '#C0C0C0';
      ctx.fillRect(30, 148, 165, 78);
      ctx.fillStyle = '#333';
      ctx.fillRect(40, 155, 55, 32);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(105, 155, 55, 32);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(48, 205, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(135, 205, 18, 0, Math.PI*2); ctx.fill();
      animatedFire(ctx, 75, 165, time);
    } 
    else if (m.type === "sportscar") {
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.moveTo(35, 175);
      ctx.lineTo(35, 162);
      ctx.lineTo(85, 140);
      ctx.lineTo(155, 162);
      ctx.lineTo(155, 175);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.fillRect(48, 145, 90, 32);
      ctx.fillStyle = '#AACCFF';
      ctx.fillRect(58, 150, 32, 18);
      ctx.fillRect(108, 150, 22, 18);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(63, 205, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(125, 205, 18, 0, Math.PI*2); ctx.fill();
      animatedFire(ctx, 72, 155, time);
    } 
    else if (m.type === "shed") {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(35, 150, 130, 95);
      ctx.fillStyle = '#A52A2A';
      ctx.beginPath();
      ctx.moveTo(30, 150);
      ctx.lineTo(80, 110);
      ctx.lineTo(150, 150);
      ctx.fill();
      ctx.fillStyle = '#3C2F1F';
      ctx.fillRect(50, 170, 82, 65);
      ctx.fillStyle = '#FFCC00';
      ctx.fillRect(85, 195, 8, 8);
      animatedFire(ctx, 85, 135, time);
    }

    requestAnimationFrame(drawFrame);
  }

  drawFrame();
  return c;
}

function animatedFire(ctx, x, y, time) {
  const flicker = Math.sin(time * 9) * 2.5 + Math.cos(time * 13) * 1.8;
  ctx.fillStyle = '#FF4400';
  ctx.fillRect(x - 5, y + flicker, 15, 23);
  ctx.fillStyle = '#FF8800';
  ctx.fillRect(x - 2, y - 13 + flicker*0.8, 10, 19);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x + 1, y - 22 + flicker*1.3, 6, 15);
}

function renderAll() {
  const grid = document.getElementById('grid');
  models.forEach(m => {
    const div = document.createElement('div');
    div.className = 'model';
    const c = createModelCanvas(m);
    div.appendChild(c);
    div.onclick = () => alert(`Selected Model ${m.id} - ${m.name}\n\nTell me your favorite models and I will build the full game using them.`);
    grid.appendChild(div);
  });
}

renderAll();
</script>
</body>
</html>
