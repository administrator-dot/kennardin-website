<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { 
    margin:0; 
    background:#000; 
    font-family:Arial, sans-serif; 
    overflow:hidden; 
    touch-action: none;
  }
  canvas { 
    display:block; 
    margin:0 auto; 
    touch-action: none;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
  }
  button {
    pointer-events: auto; margin: 10px 15px; padding: 12px 28px; font-size: 20px;
    background: #0066CC; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #0088FF; }
  .difficulty-btn { background:#C00; }
  .difficulty-btn:hover { background: #F00; }
  .copyright {
    position: absolute; bottom: 8px; left: 20px; font-size: 14px; color:#888;
    text-align: left;
  }
  #landscapeMessage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); color: #FF0; font-size: 28px;
    display: none; align-items: center; justify-content: center;
    text-align: center; z-index: 100;
  }
</style>
</head>
<body>

<div id="landscapeMessage">
  Please rotate your device to Landscape mode<br>
  for the best experience
</div>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:62px; margin-top:70px; color:#FF0; letter-spacing:4px; text-shadow: 4px 4px 0 #000;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:28px; margin:20px 0 40px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button><br>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button><br>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:80px;">
    <div style="background:rgba(0,0,0,0.75); padding:30px 50px; border-radius:12px; max-width:720px; margin:0 auto; text-align:center;">
      <h1 id="levelTitle" style="font-size:48px; color:#0F0; margin-bottom:12px;"></h1>
      <p id="encourageText" style="font-size:32px; margin:15px 0 25px; line-height:1.3;"></p>
      <p id="safetyTip" style="font-size:24px; line-height:1.45; margin:0;"></p>
    </div>
   
    <div style="margin-top:25px;">
      <button onclick="nextLevel()">NEXT LEVEL</button>
      <button onclick="resetGame()">PLAY AGAIN</button>
      <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
    </div>
  </div>
</div>

<canvas id="game" width="1200" height="600"></canvas>

<div class="copyright">
  Free for public use.<br>
  Created by Jason Groce - Kennard, IN<br>
  If you enjoyed please consider a donation to the Kennard Volunteer Fire Department.
</div>

// ==================== LANDSCAPE DETECTION ====================
function checkOrientation() {
  if (window.innerWidth < window.innerHeight) {
    landscapeMsg.style.display = 'flex';
  } else {
    landscapeMsg.style.display = 'none';
  }
}

window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation(); // initial check

// ==================== INPUT HANDLING (Mouse + Touch) ====================
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  let clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  mouseX = Math.max(80, Math.min(clientX - rect.left, canvas.width - 40));
  mouseY = Math.max(120, Math.min(clientY - rect.top, canvas.height - 100));
}

function handleStart(e) {
  e.preventDefault();
  if (gameState === 'playing') isSpraying = true;
  getPos(e);
}

function handleMove(e) {
  e.preventDefault();
  getPos(e);
}

function handleEnd(e) {
  e.preventDefault();
  isSpraying = false;
}

// Desktop mouse
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);

// Mobile touch
canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('touchend', handleEnd, { passive: false });
canvas.addEventListener('touchcancel', handleEnd, { passive: false });

// Day / Dusk / Night buttons (works on touch too)
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const clickX = (e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left;
  const clickY = (e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0)) - rect.top;

  if (clickY > 18 && clickY < 56) {
    if (clickX > 980 && clickX < 1042) setTimeOfDay(0);
    else if (clickX > 1048 && clickX < 1110) setTimeOfDay(1);
    else if (clickX > 1116 && clickX < 1178) setTimeOfDay(2);
  }
});

function setTimeOfDay(mode) { timeOfDay = mode; }

</script>

</html>
