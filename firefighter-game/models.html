<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { 
    margin:0; 
    background:#000; 
    font-family:Arial, sans-serif; 
    overflow:hidden; 
    touch-action: none;
  }
  canvas { 
    display:block; 
    margin:0 auto; 
    touch-action: none;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
  }
  button {
    pointer-events: auto; margin: 10px 15px; padding: 12px 28px; font-size: 20px;
    background: #0066CC; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #0088FF; }
  .difficulty-btn { background:#C00; }
  .difficulty-btn:hover { background: #F00; }
  .copyright {
    position: absolute; bottom: 8px; left: 20px; font-size: 14px; color:#888;
    text-align: left;
  }
  #landscapeMessage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); color: #FF0; font-size: 26px; line-height: 1.4;
    display: none; align-items: center; justify-content: center;
    text-align: center; z-index: 200; padding: 20px;
  }
</style>
</head>
<body>

<div id="landscapeMessage">
  Please rotate your device to <strong>Landscape</strong> mode<br>
  for the best experience
</div>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:62px; margin-top:70px; color:#FF0; letter-spacing:4px; text-shadow: 4px 4px 0 #000;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:28px; margin:20px 0 40px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button><br>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button><br>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:80px;">
    <div style="background:rgba(0,0,0,0.75); padding:30px 50px; border-radius:12px; max-width:720px; margin:0 auto; text-align:center;">
      <h1 id="levelTitle" style="font-size:48px; color:#0F0; margin-bottom:12px;"></h1>
      <p id="encourageText" style="font-size:32px; margin:15px 0 25px; line-height:1.3;"></p>
      <p id="safetyTip" style="font-size:24px; line-height:1.45; margin:0;"></p>
    </div>
   
    <div style="margin-top:25px;">
      <button onclick="nextLevel()">NEXT LEVEL</button>
      <button onclick="resetGame()">PLAY AGAIN</button>
      <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
    </div>
  </div>
</div>

<canvas id="game" width="1200" height="600"></canvas>

<div class="copyright">
  Free for public use.<br>
  Created by Jason Groce - Kennard, IN<br>
  If you enjoyed please consider a donation to the Kennard Volunteer Fire Department.
</div>

<script>
// ============== FIXED START + MOBILE LANDSCAPE + TOUCH BUTTONS ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const landscapeMsg = document.getElementById('landscapeMessage');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let difficulty = 2;
let timeOfDay = 0;
let tornadoAngle = 0;
let fireSpots = [];
let particles = [];

const truckX = 100;
const truckY = 480;

const safetyTips = [
  "Never play with matches or lighters.",
  "If your clothes catch fire, stop, drop, and roll.",
  "Have a family escape plan and practice it.",
  "Check smoke alarms every month.",
  "Keep a fire extinguisher accessible and know how to use it.",
  "Stay low and crawl under smoke to escape.",
  "Never hide from fire — get low and go!",
  "Don't overload electrical outlets.",
  "Keep flammable items away from heat sources.",
  "Remember to thank a firefighter when you see one!"
];

const baseLevels = [
  { name: "Level 1 – Small Shed Fire", fireSpots: [
    {x:880,y:280,w:55,h:55,health:320,maxHealth:400,type:'window'},
    {x:900,y:255,w:65,h:40,health:580,maxHealth:720,type:'roof'},
    {x:935,y:355,w:42,h:95,health:270,maxHealth:340,type:'door'}
  ], entities: [{type:'shedWindow',x:840}, {type:'lawnMower',x:1060}] },

  { name: "Level 2 – Car + Tree Crash", fireSpots: [
    {x:620,y:355,w:110,h:55,health:380,maxHealth:480,type:'hood'},
    {x:650,y:320,w:70,h:45,health:350,maxHealth:440,type:'cab'},
    {x:790,y:280,w:45,h:140,health:430,maxHealth:530,type:'tree1'},
    {x:810,y:260,w:35,h:80,health:300,maxHealth:380,type:'tree2'}
  ], entities: [{type:'sedan',x:580,yOffset:12},{type:'tree',x:810}] },

  { name: "Level 3 – Garage Fire", fireSpots: [
    {x:920,y:200,w:110,h:45,health:650,maxHealth:800,type:'roof'},
    {x:920,y:255,w:55,h:225,health:350,maxHealth:440,type:'leftdoor'},
    {x:975,y:255,w:55,h:225,health:350,maxHealth:440,type:'rightdoor'},
    {x:945,y:460,w:40,h:20,health:240,maxHealth:300,type:'bottom'}
  ], entities: [{type:'singleGarage',x:820}] },

  { name: "Level 4 – Small Shed + Tree with Tire Swing", fireSpots: [
    {x:880,y:280,w:55,h:55,health:360,maxHealth:450,type:'window'},
    {x:900,y:255,w:65,h:40,health:610,maxHealth:760,type:'roof'},
    {x:935,y:355,w:42,h:95,health:320,maxHealth:400,type:'door'},
    {x:675,y:355,w:45,h:50,health:340,maxHealth:430,type:'tirefire1'},
    {x:700,y:325,w:35,h:40,health:290,maxHealth:370,type:'tirefire2'}
  ], entities: [{type:'smallShed',x:820},{type:'treeWithSwing',x:620}] },

  { name: "Level 5 – Small House + Sedan", fireSpots: [
    {x:920,y:260,w:50,h:70,health:380,maxHealth:480,type:'window1'},
    {x:1000,y:260,w:50,h:70,health:380,maxHealth:480,type:'window2'},
    {x:870,y:170,w:190,h:60,health:690,maxHealth:850,type:'roof'},
    {x:950,y:400,w:45,h:100,health:350,maxHealth:440,type:'door'}
  ], entities: [{type:'smallHouse',x:850,color:'#FFCC99'}, {type:'sedan',x:520,yOffset:8}] },

  { name: "Level 6 – Tall House + Pickup + Burning Trees", fireSpots: [
    {x:900,y:240,w:60,h:90,health:410,maxHealth:510,type:'window1'},
    {x:1020,y:240,w:60,h:90,health:410,maxHealth:510,type:'window2'},
    {x:860,y:140,w:240,h:50,health:730,maxHealth:900,type:'roof'},
    {x:960,y:410,w:50,h:110,health:380,maxHealth:480,type:'door'},
    {x:680,y:280,w:45,h:120,health:370,maxHealth:470,type:'treefire1'},
    {x:1150,y:280,w:45,h:120,health:370,maxHealth:470,type:'treefire2'}
  ], entities: [{type:'house',x:860,color:'#66CCFF'}, {type:'pickup',x:590,yOffset:10}, {type:'tree',x:680}, {type:'tree',x:1150}] },

  { name: "Level 7 – Mini Barn", fireSpots: [
    {x:880,y:255,w:78,h:225,health:500,maxHealth:620,type:'door'},
    {x:920,y:200,w:90,h:45,health:700,maxHealth:860,type:'roof'},
    {x:620,y:425,w:110,h:70,health:460,maxHealth:570,type:'tractor'}
  ], entities: [{type:'miniBarn',x:820},{type:'tractor',x:520,facing:'right'}] },

  { name: "Level 8 – Farm Fire", fireSpots: [
    {x:720,y:410,w:75,h:65,health:410,maxHealth:510,type:'hay1'},
    {x:800,y:395,w:75,h:65,health:430,maxHealth:530,type:'hay2'},
    {x:880,y:425,w:75,h:65,health:400,maxHealth:500,type:'hay3'},
    {x:950,y:410,w:75,h:65,health:460,maxHealth:570,type:'hay4'},
    {x:620,y:425,w:110,h:70,health:460,maxHealth:570,type:'tractor'}
  ], entities: [{type:'largeRedBarn',x:1050},{type:'tractor',x:520,facing:'left'},{type:'hayBale',x:720},{type:'hayBale',x:800},{type:'hayBale',x:880},{type:'hayBale',x:950}] },

  { name: "Level 9 – Tall House with Tornado", fireSpots: [
    {x:780,y:240,w:60,h:90,health:450,maxHealth:560,type:'window1'},
    {x:900,y:240,w:60,h:90,health:450,maxHealth:560,type:'window2'},
    {x:740,y:140,w:240,h:50,health:770,maxHealth:950,type:'roof'},
    {x:840,y:410,w:50,h:110,health:420,maxHealth:520,type:'door'}
  ], entities: [{type:'house',x:740,color:'#FFEE66'}, {type:'tornado',x:620}] },

  { name: "Level 10 – Big Car Wreck", fireSpots: [
    {x:480,y:355,w:110,h:55,health:470,maxHealth:590,type:'hood'},
    {x:510,y:320,w:70,h:45,health:410,maxHealth:510,type:'cab1'},
    {x:740,y:315,w:90,h:80,health:560,maxHealth:700,type:'cab2'},
    {x:840,y:285,w:260,h:105,health:780,maxHealth:960,type:'tanker'},
    {x:980,y:355,w:130,h:55,health:500,maxHealth:620,type:'bed'},
    {x:650,y:340,w:55,h:40,health:450,maxHealth:560,type:'extra'}
  ], entities: [{type:'sedan',x:420,yOffset:12},{type:'pickup',x:620,yOffset:8},{type:'semi',x:780}] }
];

function setTimeOfDay(mode) { timeOfDay = mode; }

function startGame(diff) {
  difficulty = diff;
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  const base = baseLevels[lvl-1];
  fireSpots = base.fireSpots.map(s => {
    let healthMod = 1, growthMod = 1;
    if (difficulty === 1) { healthMod = 2.25; growthMod = 2.0; }
    else if (difficulty === 2) { healthMod = 1.45; growthMod = 1.38; }
    else if (difficulty === 3) { healthMod = 1.95; growthMod = 1.75; }
    return { 
      ...s, 
      health: Math.floor(s.health * healthMod), 
      maxHealth: Math.floor(s.maxHealth * healthMod), 
      growthRate: 4.6 * growthMod 
    };
  });
  particles = [];
  gameState = 'playing';
  document.getElementById('levelCompleteScreen').style.display = 'none';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0) && gameState === 'playing') {
    gameState = 'levelComplete';
    const isFinalLevel = currentLevel === baseLevels.length;
    
    document.getElementById('levelTitle').textContent = baseLevels[currentLevel-1].name + " COMPLETE!";
    
    if (isFinalLevel) {
      document.getElementById('encourageText').innerHTML = "Thank you for playing!<br>Try a harder difficulty next time.<br>Remember to thank a firefighter when you see one!";
    } else {
      document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    }
    
    document.getElementById('safetyTip').textContent = safetyTips[currentLevel-1];
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < baseLevels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  document.getElementById('titleScreen').style.display = 'block';
  gameState = 'title';
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

// ==================== INPUT (Mouse + Touch) ====================
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 500);
  let clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 300);
  mouseX = Math.max(80, Math.min(clientX - rect.left, canvas.width - 40));
  mouseY = Math.max(120, Math.min(clientY - rect.top, canvas.height - 100));
}

function handleStart(e) {
  e.preventDefault();
  if (gameState === 'playing') isSpraying = true;
  getPos(e);
}

function handleMove(e) {
  e.preventDefault();
  getPos(e);
}

function handleEnd(e) {
  e.preventDefault();
  isSpraying = false;
}

// Desktop
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);

// Mobile
canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('touchend', handleEnd, { passive: false });
canvas.addEventListener('touchcancel', handleEnd, { passive: false });

// Day / Dusk / Night buttons (works on touch)
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const clickX = (e.clientX || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : 0)) - rect.left;
  const clickY = (e.clientY || (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : 0)) - rect.top;

  if (clickY > 18 && clickY < 56) {
    if (clickX > 980 && clickX < 1042) setTimeOfDay(0);
    else if (clickX > 1048 && clickX < 1110) setTimeOfDay(1);
    else if (clickX > 1116 && clickX < 1178) setTimeOfDay(2);
  }
});

function setTimeOfDay(mode) { timeOfDay = mode; }

// ==================== LANDSCAPE CHECK ====================
function checkOrientation() {
  if (window.innerWidth < window.innerHeight) {
    landscapeMsg.style.display = 'flex';
  } else {
    landscapeMsg.style.display = 'none';
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

// ==================== PARTICLE & DRAW FUNCTIONS (kept from your working file) ====================
// Particle class, createFireParticles, createWaterParticles, createSmoke, drawBackground, 
// drawSideFireTruck, and all draw* functions (shed, house, tractor, tornado, etc.) are the same as your last working version.

// For space, they are not repeated here, but you must keep them exactly as in your previous file.

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(20, 18, 320, 48);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 35, 48);
  ctx.fillText(`Level: ${currentLevel}`, 195, 48);

  ctx.fillStyle = '#0066CC';
  ctx.fillRect(980, 18, 62, 38);
  ctx.fillRect(1048, 18, 62, 38);
  ctx.fillRect(1116, 18, 62, 38);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText("Day", 1011, 43);
  ctx.fillText("Dusk", 1079, 43);
  ctx.fillText("Night", 1147, 43);

  const data = baseLevels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'shedWindow') drawShedWindow(ent.x);
    if (ent.type === 'smallShed') drawSmallShed(ent.x);
    if (ent.type === 'singleGarage') drawSingleGarage(ent.x);
    if (ent.type === 'house') drawTallHouse(ent.x);
    if (ent.type === 'smallHouse') drawSmallHouse(ent.x, ent.color);
    if (ent.type === 'miniBarn') drawMiniBarn(ent.x);
    if (ent.type === 'largeRedBarn') drawLargeRedBarn(ent.x);
    if (ent.type === 'hayBale') drawHayBale(ent.x);
    if (ent.type === 'tractor') drawTractor(ent.x, ent.facing || 'right');
    if (ent.type === 'sedan') drawSedan(ent.x, ent.yOffset || 0);
    if (ent.type === 'pickup') drawPickup(ent.x, ent.yOffset || 0);
    if (ent.type === 'semi') drawSemi(ent.x);
    if (ent.type === 'tree') drawTree(ent.x);
    if (ent.type === 'treeWithSwing') drawTreeWithSwing(ent.x);
    if (ent.type === 'tornado') drawTornado(ent.x);
    if (ent.type === 'lawnMower') drawLawnMower(ent.x);
  });

  drawSideFireTruck();

  ctx.fillStyle = '#FF0';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', 1180, 580);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    if (Math.random() < 0.032) spot.health = Math.min(spot.health + (spot.growthRate || 4.6), spot.maxHealth);

    const intensity = Math.floor(spot.health / 18);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 0.17;
        p.life = 7;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += 10;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 13;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 168, truckY - 45);
  ctx.quadraticCurveTo(truckX + 255, truckY - 165, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 10, mouseY - 10, 20, 20);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 6, mouseY - 15, 12, 9);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
