<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender - 10 Models</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; color:white; text-align:center; }
  h1 { color:#FF0; margin:20px; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:20px; padding:20px; max-width:1200px; margin:auto; }
  .model { background:#112; border:4px solid #444; border-radius:12px; padding:10px; cursor:pointer; }
  .model:hover { border-color:#FF0; transform:scale(1.05); }
  canvas { width:100%; height:220px; background:#3D8C40; border-radius:8px; }
  .label { margin-top:8px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>
<h1>10 Models with Burn Points - Choose Your Favorites</h1>
<p>Click any model to see it larger. Tell me which ones you like (e.g. "Model 1, 3, 5, 8").</p>

<div class="grid" id="grid"></div>

<script>
// ============== 10 MODELS WITH BURN POINTS ==============
const models = [
  {name:"Model 1 - Short Blue House", color:"#66CCFF", short:true},
  {name:"Model 2 - Short Green House", color:"#66FF99", short:true},
  {name:"Model 3 - Blue Sedan", type:"sedan"},
  {name:"Model 4 - Red Pickup", type:"pickup"},
  {name:"Model 5 - Tractor", type:"tractor"},
  {name:"Model 6 - Lawn Mower", type:"lawnmower"},
  {name:"Model 7 - Boat on Trailer", type:"boat"},
  {name:"Model 8 - Mobile Home", type:"mobilehome"},
  {name:"Model 9 - Sports Car", type:"sportscar"},
  {name:"Model 10 - Shed", type:"shed"}
];

function createModelCanvas(model) {
  const c = document.createElement('canvas');
  c.width = 220;
  c.height = 220;
  const ctx = c.getContext('2d');

  // background grass
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 160, 220, 60);

  if (model.type === 'sedan') {
    ctx.fillStyle = '#1E5A9E';
    ctx.fillRect(30, 165, 115, 52);
    ctx.fillStyle = '#0F3A6B';
    ctx.fillRect(43, 140, 85, 40);
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(53, 147, 38, 26);
    ctx.fillRect(96, 147, 25, 26);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(58, 205, 17, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(118, 205, 17, 0, Math.PI*2); ctx.fill();
    // fire zones
    createSmallFire(ctx, 55, 155); // window
    createSmallFire(ctx, 118, 155); // window
  } else if (model.type === 'pickup') {
    // similar to sedan but pickup shape
    ctx.fillStyle = '#1F2A3C';
    ctx.fillRect(30, 165, 135, 52);
    ctx.fillStyle = '#111';
    ctx.fillRect(44, 140, 80, 40);
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(52, 147, 40, 27);
    ctx.fillRect(97, 147, 20, 27);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(52, 205, 17, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(125, 205, 17, 0, Math.PI*2); ctx.fill();
    createSmallFire(ctx, 65, 155); // hood
    createSmallFire(ctx, 110, 155); // cab
  } else if (model.type === 'tractor') {
    ctx.fillStyle = '#1F2A3C';
    ctx.fillRect(30, 165, 135, 52);
    ctx.fillStyle = '#333';
    ctx.fillRect(45, 140, 75, 40);
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(55, 147, 35, 26);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(50, 205, 22, 0, Math.PI*2); ctx.fill(); // large rear
    ctx.beginPath(); ctx.arc(120, 205, 14, 0, Math.PI*2); ctx.fill(); // small front
    createSmallFire(ctx, 70, 155); // body
    createSmallFire(ctx, 105, 155); // cab
  } else if (model.type === 'lawnmower') {
    ctx.fillStyle = '#228B22';
    ctx.fillRect(40, 165, 95, 38);
    ctx.fillStyle = '#111';
    ctx.fillRect(50, 150, 65, 28);
    ctx.fillStyle = '#DDD';
    ctx.beginPath(); ctx.arc(55, 195, 12, 0, Math.PI*2); ctx.fill();
    createSmallFire(ctx, 75, 165); // body
  } else if (model.type === 'boat') {
    ctx.fillStyle = '#228B22';
    ctx.fillRect(40, 165, 140, 45);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(60, 150, 100, 20);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(55, 195, 18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(145, 195, 18, 0, Math.PI*2); ctx.fill();
    createSmallFire(ctx, 90, 165); // boat
  } else if (model.type === 'mobilehome') {
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(30, 150, 160, 95);
    ctx.fillStyle = '#333';
    ctx.fillRect(45, 160, 50, 35);
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(105, 160, 50, 35);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(45, 205, 19, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(125, 205, 19, 0, Math.PI*2); ctx.fill();
    createSmallFire(ctx, 75, 165); // body
  } else if (model.type === 'sportscar') {
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(30, 165, 115, 52);
    ctx.fillStyle = '#0F3A6B';
    ctx.fillRect(43, 140, 85, 40);
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(53, 147, 38, 26);
    ctx.fillRect(96, 147, 25, 26);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(58, 205, 17, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(118, 205, 17, 0, Math.PI*2); ctx.fill();
    createSmallFire(ctx, 65, 155); // hood
  } else if (model.type === 'shed') {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(40, 150, 95, 95);
    ctx.fillStyle = '#A52A2A';
    ctx.beginPath();
    ctx.moveTo(30, 150);
    ctx.lineTo(80, 110);
    ctx.lineTo(135, 150);
    ctx.fill();
    createSmallFire(ctx, 70, 130); // roof
  } else {
    // default short house
    const x = 30;
    const baseY = 150;
    ctx.fillStyle = model.color || '#66CCFF';
    ctx.fillRect(x, baseY, 160, model.short ? 120 : 195);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 8;
    ctx.strokeRect(x+5, baseY, 150, model.short ? 120 : 195);
    ctx.fillStyle = '#8B2A00';
    ctx.beginPath();
    ctx.moveTo(x-15, baseY - 10);
    ctx.lineTo(x+80, baseY - (model.short ? 40 : 70));
    ctx.lineTo(x+175, baseY - 10);
    ctx.fill();
    ctx.fillStyle = '#A33';
    ctx.fillRect(x + 105, baseY - 55, 22, 40); // chimney
    ctx.fillStyle = '#3C2F1F';
    ctx.fillRect(x+65, baseY + 70, 30, 55); // door
    ctx.fillStyle = '#FFCC00';
    ctx.fillRect(x+72, baseY + 95, 7, 7); // knob
    ctx.fillStyle = '#AACCFF';
    ctx.fillRect(x+25, baseY + 25, 35, 40); // left window
    ctx.fillRect(x+100, baseY + 25, 35, 40); // right window
    createSmallFire(ctx, 42, baseY + 45); // left window fire
    createSmallFire(ctx, 117, baseY + 45); // right window fire
    createSmallFire(ctx, 80, baseY - 10); // roof fire
    createSmallFire(ctx, 72, baseY + 95); // door fire
  }

  return c;
}

function createSmallFire(ctx, x, y) {
  ctx.fillStyle = '#FF4400';
  ctx.fillRect(x, y, 12, 18);
  ctx.fillStyle = '#FF8800';
  ctx.fillRect(x+3, y-8, 8, 14);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+5, y-14, 4, 10);
}

function renderAll() {
  const grid = document.getElementById('grid');
  models.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'model';
    div.innerHTML = `<div class="label">${m.name}</div>`;
    const c = createModelCanvas(m);
    div.prepend(c);
    div.onclick = () => {
      alert(`You chose ${m.name}\n\nTell me which models you want to keep for the game.`);
    };
    grid.appendChild(div);
  });
}

renderAll();
</script>
</body>
</html>
