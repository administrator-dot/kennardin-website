<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender - 20px Grid (Model)</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 15px; padding: 14px 28px; font-size: 20px;
    background: #C00; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #F00; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
</style>
</head>
<body>
<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:58px; margin-top:70px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:10px 0 40px;">For KVFD • Kennard, Indiana</p>
    <button onclick="startGame()">START MISSION</button>
  </div>
  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>
<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>
<canvas id="game" width="1200" height="600"></canvas>
<script>
// ============== 20px GRID - LEVEL 6 CAR MOVED RIGHT + KVFD TEXT ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let fireSpots = [];
let particles = [];

const truckX = 100;
const truckY = 480;

const levels = [
  // Level 1: Small Shed
  { name: "Level 1 – Small Shed Fire", fireSpots: [
    {x: 920, y: 320, w: 80, h: 100, health: 180, maxHealth: 180, type: 'wall'},
    {x: 940, y: 260, w: 60, h: 40, health: 140, maxHealth: 140, type: 'roof'}
  ], entities: [{type:'shed', x:880, color:'#A38D6B'}] },

  // Level 2: Medium Garage
  { name: "Level 2 – Medium Garage Fire", fireSpots: [
    {x: 900, y: 280, w: 110, h: 130, health: 220, maxHealth: 220, type: 'door'},
    {x: 920, y: 220, w: 90, h: 50, health: 180, maxHealth: 180, type: 'roof'},
    {x: 980, y: 310, w: 50, h: 80, health: 160, maxHealth: 160, type: 'window'}
  ], entities: [{type:'garage', x:860, color:'#8B9E7A'}] },

  // Level 3: Tall Pink House + Sedan
  { name: "Level 3 – Tall Pink House + Sedan", fireSpots: [
    {x: 900, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 1020, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 860, y: 140, w: 240, h: 50, health: 340, maxHealth: 340, type: 'roof'},
    {x: 960, y: 410, w: 50, h: 110, health: 220, maxHealth: 220, type: 'door'}
  ], entities: [{type:'house', x:860, color:'#FF99CC'}, {type:'sedan', x:520}] },

  // Level 4: Tall Blue House + Pickup
  { name: "Level 4 – Tall Blue House + Pickup", fireSpots: [
    {x: 900, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 1020, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 860, y: 140, w: 240, h: 50, health: 340, maxHealth: 340, type: 'roof'},
    {x: 960, y: 410, w: 50, h: 110, health: 220, maxHealth: 220, type: 'door'}
  ], entities: [{type:'house', x:860, color:'#66CCFF'}, {type:'pickup', x:580}] },

  // Level 5: Semi & Sedan Wreck
  { name: "Level 5 – Semi & Sedan Wreck", fireSpots: [
    {x: 720, y: 345, w: 105, h: 55, health: 210, maxHealth: 210, type: 'hood'},
    {x: 745, y: 310, w: 65, h: 42, health: 160, maxHealth: 160, type: 'cab'},
    {x: 860, y: 300, w: 90, h: 80, health: 280, maxHealth: 280, type: 'cab'},
    {x: 960, y: 270, w: 260, h: 105, health: 420, maxHealth: 420, type: 'tanker'}
  ], entities: [{type:'sedan', x:680}, {type:'semi', x:820}] },

  // Level 6: Tall Green House + Vehicles (sedan moved right)
  { name: "Level 6 – Tall Green House + Vehicles", fireSpots: [
    {x: 900, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 1020, y: 240, w: 60, h: 90, health: 240, maxHealth: 240, type: 'window'},
    {x: 860, y: 140, w: 240, h: 50, health: 340, maxHealth: 340, type: 'roof'},
    {x: 960, y: 410, w: 50, h: 110, health: 220, maxHealth: 220, type: 'door'},
    {x: 580, y: 350, w: 110, h: 60, health: 195, maxHealth: 195, type: 'hood'},
    {x: 610, y: 310, w: 70, h: 45, health: 145, maxHealth: 145, type: 'cab'}
  ], entities: [{type:'house', x:860, color:'#66FF99'}, {type:'sedan', x:540}, {type:'pickup', x:740}] }
];

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const data = levels[lvl-1];
  fireSpots = data.fireSpots.map(s => ({...s, lastHit: 0}));
  particles = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    document.getElementById('levelTitle').textContent = levels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: Never hide from fire – get low and go!";
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < levels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all levels! Great job!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  loadLevel(1);
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(80, Math.min(e.clientX - rect.left, canvas.width - 40));
  mouseY = Math.max(120, Math.min(e.clientY - rect.top, canvas.height - 100));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.17 + Math.random() * 0.2; this.vx += (Math.random() - 0.5) * 1.7; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 3.4;
    const vy = -3.8 - Math.random() * 5.8;
    const colors = ['#FF1100', '#FF5500', '#FFAA00'];
    particles.push(new Particle(x + (Math.random()-0.5)*50, y + (Math.random()-0.5)*40, vx, vy, colors[Math.floor(Math.random()*colors.length)], 48, 8 + Math.random()*14, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 34; i++) {
    const spread = (Math.random() - 0.5) * 6;
    const dirX = (mouseX - (truckX + 165)) * 0.042;
    const dirY = (mouseY - (truckY - 45)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*8, mouseY + (Math.random()-0.5)*8, dirX + spread, dirY + spread - 5.2, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*35, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 14 + Math.random()*19, 'smoke'));
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF');
  grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 480, canvas.width, 120);
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(truckX + 20, truckY + 42, 185, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 13, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 13, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#E22';
  ctx.fillRect(truckX + 8, truckY - 48, 195, 82);
  ctx.fillStyle = '#C11';
  ctx.fillRect(truckX + 18, truckY - 78, 72, 38);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(truckX + 26, truckY - 72, 28, 24);
  ctx.fillRect(truckX + 58, truckY - 72, 26, 24);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX + 12, truckY - 18, 185, 14);
  ctx.fillStyle = '#DD0';
  ctx.fillRect(truckX + 85, truckY - 88, 118, 12);
  ctx.fillStyle = '#BB0';
  for (let i = 0; i < 7; i++) {
    ctx.fillRect(truckX + 92 + i*16, truckY - 92, 6, 20);
  }
  ctx.fillStyle = '#B22';
  ctx.fillRect(truckX + 145, truckY - 45, 55, 38);
  ctx.fillStyle = '#00F';
  ctx.fillRect(truckX + 25, truckY - 82, 12, 6);
}

function drawShed(x) {
  ctx.fillStyle = '#A38D6B';
  ctx.fillRect(x + 20, 320, 140, 160);
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x + 10, 320);
  ctx.lineTo(x + 90, 240);
  ctx.lineTo(x + 170, 320);
  ctx.fill();
  ctx.fillStyle = '#3C2F1F';
  ctx.fillRect(x + 70, 380, 40, 100);
}

function drawGarage(x) {
  ctx.fillStyle = '#8B9E7A';
  ctx.fillRect(x + 10, 280, 190, 200);
  ctx.fillStyle = '#6B4E2A';
  ctx.fillRect(x + 30, 340, 60, 140);
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x, 280);
  ctx.lineTo(x + 105, 200);
  ctx.lineTo(x + 210, 280);
  ctx.fill();
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x + 140, 310, 50, 60);
}

function drawTallHouse(x) {
  ctx.fillStyle = '#E8D5B8';
  ctx.fillRect(x, 200, 270, 320);
  ctx.strokeStyle = '#C9B89A';
  ctx.lineWidth = 4;
  for (let i = 0; i < 13; i++) {
    ctx.beginPath(); ctx.moveTo(x+12, 212 + i*24); ctx.lineTo(x+258, 212 + i*24); ctx.stroke();
  }
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath();
  ctx.moveTo(x-25, 190);
  ctx.lineTo(x+135, 100);
  ctx.lineTo(x+290, 190);
  ctx.fill();
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+175, 115, 32, 60);
  ctx.fillStyle = '#3C2F1F';
  ctx.fillRect(x+105, 405, 48, 115);
  ctx.fillStyle = '#FFCC00';
  ctx.fillRect(x+122, 465, 10, 10);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 8;
  ctx.strokeRect(x+30, 255, 68, 95);
  ctx.strokeRect(x+172, 255, 68, 95);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+35, 260, 58, 85);
  ctx.fillRect(x+177, 260, 58, 85);
}

function drawSedan(x) {
  const groundY = 480;
  ctx.fillStyle = '#1E5A9E';
  ctx.fillRect(x+15, groundY-52, 120, 55);
  ctx.fillStyle = '#0F3A6B';
  ctx.fillRect(x+28, groundY-85, 90, 42);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+38, groundY-78, 40, 28);
  ctx.fillRect(x+82, groundY-78, 27, 28);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+102, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawPickup(x) {
  const groundY = 480;
  ctx.fillStyle = '#1F2A3C';
  ctx.fillRect(x+10, groundY-52, 140, 54);
  ctx.fillStyle = '#111';
  ctx.fillRect(x+25, groundY-88, 85, 42);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(x+33, groundY-80, 42, 29);
  ctx.fillRect(x+80, groundY-80, 22, 29);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+37, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+112, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawSemi(x) {
  const groundY = 480;
  ctx.fillStyle = '#C00';
  ctx.fillRect(x, groundY-82, 92, 82);
  ctx.fillStyle = '#113344';
  ctx.fillRect(x+16, groundY-70, 46, 40);
  ctx.fillStyle = '#DDD';
  ctx.fillRect(x+88, groundY-107, 290, 110);
  ctx.fillStyle = '#A33';
  ctx.fillRect(x+95, groundY-97, 275, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+42, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+125, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+195, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+265, groundY+12, 20, 0, Math.PI*2); ctx.fill();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = levels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'shed') drawShed(ent.x);
    if (ent.type === 'garage') drawGarage(ent.x);
    if (ent.type === 'house') drawTallHouse(ent.x);
    if (ent.type === 'sedan') drawSedan(ent.x);
    if (ent.type === 'pickup') drawPickup(ent.x);
    if (ent.type === 'semi') drawSemi(ent.x);
  });

  drawSideFireTruck();

  // Draw KVFD text in top-right corner
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', 1180, 45);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    if (Math.random() < 0.024) spot.health = Math.min(spot.health + 3.8, spot.maxHealth);

    const intensity = Math.floor(spot.health / 13);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && 
          p.x > spot.x && p.x < spot.x + spot.w && 
          p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 1.1;
        p.life = 7;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += 10;
      scoreEl.textContent = score;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 13;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 168, truckY - 45);
  ctx.quadraticCurveTo(truckX + 255, truckY - 165, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 10, mouseY - 10, 20, 20);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 6, mouseY - 15, 12, 9);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
