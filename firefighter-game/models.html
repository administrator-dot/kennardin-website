<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kennard Fire Defender - Grid Test</title>
  <style>
    body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; color:#fff; text-align:center; }
    canvas { display:block; margin:0 auto; image-rendering:pixelated; }
    #overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    button { pointer-events:auto; margin:15px; padding:14px 28px; font-size:20px; background:#C00; color:white; border:none; border-radius:8px; cursor:pointer; }
    button:hover { background:#F00; }
    .info { position:absolute; top:15px; left:15px; font-size:24px; pointer-events:none; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="font-size:58px; margin-top:40px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:10px 0 30px;">KVFD • Kennard, Indiana</p>

    <div class="controls">
      <button onclick="changeBackground(0)">☀️ Day</button>
      <button onclick="changeBackground(1)">🌅 Dusk</button>
      <button onclick="changeBackground(2)">🌙 Night</button>
      <button onclick="igniteFires()">🔥 Ignite Fires</button>
      <button onclick="extinguishAll()">🧯 Put Out All</button>
    </div>
  </div>

  <div class="info">Score: <span id="score">0</span></div>

  <canvas id="gameCanvas" width="1200" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentBg = 0;
    let fires = [];
    let particles = [];
    let isSpraying = false;
    let mouseX = 600, mouseY = 300;

    // Exact truck position from your game
    const truckX = 120;
    const truckY = 480;

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= 1200; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke(); }
      for (let y = 0; y <= 600; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke(); }
    }

    function drawBackground(bg) {
      if (bg === 0) { // Day
        ctx.fillStyle = '#5cc8ff'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#4caf50'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#ffeb3b'; ctx.beginPath(); ctx.arc(1000, 120, 40, 0, Math.PI*2); ctx.fill();
      } else if (bg === 1) { // Dusk
        ctx.fillStyle = '#ff7a00'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#3a8c3a'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#ff9800'; ctx.beginPath(); ctx.arc(900, 180, 35, 0, Math.PI*2); ctx.fill();
      } else { // Night
        ctx.fillStyle = '#112233'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#223322'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#f4f4f4'; ctx.beginPath(); ctx.arc(1000, 120, 35, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#112233'; ctx.beginPath(); ctx.arc(1020, 115, 25, 0, Math.PI*2); ctx.fill();
      }
    }

    function drawFireTruck(x, y) {
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x, y-85, 240, 75);
      ctx.fillStyle = '#fff'; ctx.fillRect(x+10, y-65, 220, 18);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+190, y-105, 70, 50);
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x+30, y-115, 150, 18);
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(x+35, y-130, 8, 25); ctx.fillRect(x+55, y-130, 8, 25);
      ctx.fillRect(x+75, y-130, 8, 25); ctx.fillRect(x+95, y-130, 8, 25);
      ctx.fillRect(x+115, y-130, 8, 25); ctx.fillRect(x+135, y-130, 8, 25);
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+205, y-95, 40, 30);
      ctx.fillStyle = '#3498db'; ctx.fillRect(x+225, y-125, 18, 12);
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(x+50, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+130, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+200, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ecf0f1';
      ctx.beginPath(); ctx.arc(x+50, y-10, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+130, y-10, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+200, y-10, 12, 0, Math.PI*2); ctx.fill();
    }

    function drawBlueCar(x, y) {
      ctx.fillStyle = '#3498db'; ctx.fillRect(x, y-55, 160, 55);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+110, y-72, 55, 35);
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+15, y-50, 35, 22); ctx.fillRect(x+60, y-50, 35, 22);
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(x+35, y-8, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+125, y-8, 18, 0, Math.PI*2); ctx.fill();
    }

    function drawHouse(x, y) {
      ctx.fillStyle = '#f4d9b8'; ctx.fillRect(x, y-160, 200, 160);
      ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(x, y-160); ctx.lineTo(x+100, y-220); ctx.lineTo(x+200, y-160); ctx.fill();
      ctx.fillStyle = '#34495e';
      ctx.fillRect(x+25, y-130, 35, 35); ctx.fillRect(x+80, y-130, 35, 35); ctx.fillRect(x+135, y-130, 35, 35);
      ctx.fillRect(x+25, y-80, 35, 35); ctx.fillRect(x+80, y-80, 35, 35);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+145, y-80, 35, 80);
    }

    function drawWaterSpray() {
      for (let i = 0; i < 34; i++) {
        const spread = (Math.random() - 0.5) * 6;
        const dirX = (mouseX - (truckX + 145)) * 0.042;
        const dirY = (mouseY - (truckY - 34)) * 0.042;
        const px = mouseX + (Math.random()-0.5)*7;
        const py = mouseY + (Math.random()-0.5)*7;
        ctx.fillStyle = `rgba(100, 200, 255, ${0.6 + Math.random() * 0.4})`;
        ctx.fillRect(px, py, 5, 5);
      }
    }

    function drawFire(x, y, size) {
      const intensity = Math.random() * 0.4 + 0.8;
      ctx.fillStyle = `rgba(255, ${60 + Math.random()*120}, 0, ${intensity})`;
      ctx.beginPath(); ctx.arc(x, y, size * (0.9 + Math.random()*0.5), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255, 200, 0, ${intensity * 0.8})`;
      ctx.beginPath(); ctx.arc(x + Math.random()*10-5, y - size*0.7, size*0.7, 0, Math.PI*2); ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, 1200, 600);
      drawBackground(currentBg);
      drawGrid();

      drawFireTruck(truckX, truckY);
      drawBlueCar(520, 480);
      drawHouse(860, 480);

      fires.forEach(f => drawFire(f.x, f.y, f.size));

      if (isSpraying) {
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 14;
        ctx.beginPath();
        ctx.moveTo(truckX + 148, truckY - 34);
        ctx.quadraticCurveTo(truckX + 225, truckY - 145, mouseX, mouseY);
        ctx.stroke();
        drawWaterSpray();
      }
    }

    function igniteFires() {
      fires = [];
      fires.push({x: 170, y: 405, size: 13}); // truck engine
      fires.push({x: 310, y: 435, size: 11}); // truck gas tank
      fires.push({x: 555, y: 430, size: 11}); // car engine
      fires.push({x: 630, y: 450, size: 9});  // car gas tank
      fires.push({x: 885, y: 370, size: 10}); // house
      fires.push({x: 940, y: 370, size: 10});
      fires.push({x: 995, y: 370, size: 10});
      fires.push({x: 1005, y: 410, size: 12});
      fires.push({x: 910, y: 280, size: 8});
      fires.push({x: 960, y: 280, size: 8});
      render();
    }

    function extinguishAll() { fires = []; render(); }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      if (isSpraying) render();
    });

    canvas.addEventListener('mousedown', () => { isSpraying = true; render(); });
    canvas.addEventListener('mouseup', () => { isSpraying = false; render(); });
    canvas.addEventListener('mouseleave', () => { isSpraying = false; render(); });

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      for (let i = fires.length - 1; i >= 0; i--) {
        const f = fires[i];
        const dx = f.x - clickX;
        const dy = f.y - clickY;
        if (Math.sqrt(dx*dx + dy*dy) < f.size + 20) {
          fires.splice(i, 1);
          render();
          return;
        }
      }
    });

    function changeBackground(bg) {
      currentBg = bg;
      render();
    }

    setInterval(() => { if (fires.length > 0) render(); }, 70);
    render();
  </script>
</body>
</html>
