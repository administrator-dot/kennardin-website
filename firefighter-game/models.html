<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 8px; padding: 10px 20px; font-size: 18px;
    background: #0066CC; color: white; border: none; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #0088FF; }
  .difficulty-btn { background:#C00; }
  .difficulty-btn:hover { background: #F00; }
  #ui {
    position: absolute; top: 15px; left: 15px; font-size: 24px; color:#FFF;
    background: rgba(0,0,0,0.65); padding: 8px 16px; border-radius: 8px;
    pointer-events: none;
  }
  .bottom-label {
    position: absolute; bottom: 15px; right: 20px; font-size: 22px; color:#FF0;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  }
  .copyright {
    position: absolute; bottom: 8px; left: 20px; font-size: 14px; color:#888;
    text-shadow: none;
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:62px; margin-top:70px; color:#FF0; letter-spacing:4px; text-shadow: 4px 4px 0 #000;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:28px; margin:20px 0 40px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button><br>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button><br>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>
<div class="bottom-label">KVFD - Kennard, IN</div>
<div class="copyright">
  Free for public use with credit.<br>
  Created by Jason Groce, Kennard, Indiana.<br>
  A donation to the KVFD is always appreciated.
</div>

<!-- Time of Day Buttons - Top Right -->
<div style="position:absolute; top:15px; right:20px; z-index:10;">
  <button onclick="setTimeOfDay(0)">Day</button>
  <button onclick="setTimeOfDay(1)">Dusk</button>
  <button onclick="setTimeOfDay(2)">Night</button>
</div>

<canvas id="game" width="1200" height="600"></canvas>

function setTimeOfDay(mode) {
  timeOfDay = mode;
}

function startGame(diff) {
  difficulty = diff;
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const base = baseLevels[lvl-1];
  
  fireSpots = base.fireSpots.map(s => {
    let healthMod = 1, growthMod = 1;
    if (difficulty === 1) { healthMod = 0.75; growthMod = 1.3; }
    else if (difficulty === 2) { healthMod = 1.0; growthMod = 1.0; }
    else if (difficulty === 3) { healthMod = 1.45; growthMod = 0.75; }
    return {
      ...s,
      health: Math.floor(s.health * healthMod),
      maxHealth: Math.floor(s.maxHealth * healthMod),
      growthRate: 6.8 * growthMod
    };
  });
  
  particles = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    document.getElementById('levelTitle').textContent = baseLevels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: Never hide from fire – get low and go!";
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < baseLevels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  document.getElementById('titleScreen').style.display = 'block';
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(80, Math.min(e.clientX - rect.left, canvas.width - 40));
  mouseY = Math.max(120, Math.min(e.clientY - rect.top, canvas.height - 100));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.17 + Math.random() * 0.2; this.vx += (Math.random() - 0.5) * 1.7; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 3.4;
    const vy = -3.8 - Math.random() * 5.8;
    const colors = ['#FF1100', '#FF5500', '#FFAA00'];
    particles.push(new Particle(x + (Math.random()-0.5)*50, y + (Math.random()-0.5)*40, vx, vy, colors[Math.floor(Math.random()*colors.length)], 48, 8 + Math.random()*14, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 38; i++) {
    const dirX = (mouseX - (truckX + 165)) * 0.042;
    const dirY = (mouseY - (truckY - 45)) * 0.042;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*8, mouseY + (Math.random()-0.5)*8, dirX + (Math.random()-0.5)*7, dirY + (Math.random()-0.5)*7 - 5.2, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*35, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 14 + Math.random()*19, 'smoke'));
  }
}

function drawBackground() {
  let sky1, sky2, sunColor, sunX, sunY, grassColor;
  if (timeOfDay === 0) { // Day
    sky1 = '#7BC4FF'; sky2 = '#C0E4FF';
    sunColor = '#FFDD00'; sunX = 300; sunY = 120;
    grassColor = '#3D8C40';
  } else if (timeOfDay === 1) { // Dusk
    sky1 = '#FF8800'; sky2 = '#FFBB66';
    sunColor = '#FFAA00'; sunX = 900; sunY = 140;
    grassColor = '#2A6B2F';
  } else { // Night
    sky1 = '#112244'; sky2 = '#223366';
    sunColor = '#EEEEEE'; sunX = 600; sunY = 130;
    grassColor = '#1F4A22';
  }

  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, sky1);
  grad.addColorStop(1, sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);

  // Sun / Moon
  ctx.fillStyle = sunColor;
  ctx.beginPath(); ctx.arc(sunX, sunY, 45, 0, Math.PI*2); ctx.fill();

  // Grass
  ctx.fillStyle = grassColor;
  ctx.fillRect(0, 480, canvas.width, 120);

  // Stars at night
  if (timeOfDay === 2) {
    ctx.fillStyle = '#FFFFFF';
    ctx.globalAlpha = 0.8;
    ctx.fillRect(200, 80, 3, 3);
    ctx.fillRect(450, 50, 2, 2);
    ctx.fillRect(720, 110, 3, 3);
    ctx.fillRect(950, 70, 2, 2);
    ctx.fillRect(1100, 40, 3, 3);
    ctx.globalAlpha = 1;
  }
}

  ctx.beginPath();
  ctx.moveTo(x, 180);
  ctx.quadraticCurveTo(x+30, 300, x-20, 420);
  ctx.quadraticCurveTo(x+40, 380, x+10, 480);

}

  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+48, 382, 35, 30);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+50, 465, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+120, 465, 18, 0, Math.PI*2); ctx.fill();
}

function drawSedan(x, yOffset = 0) {
  const groundY = 480 + yOffset;
  ctx.fillStyle = '#1E5A9E'; ctx.fillRect(x+15, groundY-52, 120, 55);
  ctx.fillStyle = '#0F3A6B'; ctx.fillRect(x+28, groundY-85, 90, 42);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+38, groundY-78, 40, 28); ctx.fillRect(x+82, groundY-78, 27, 28);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+102, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawPickup(x, yOffset = 0) {
  const groundY = 480 + yOffset;
  ctx.fillStyle = '#1F2A3C'; ctx.fillRect(x+10, groundY-52, 140, 54);
  ctx.fillStyle = '#111'; ctx.fillRect(x+25, groundY-88, 85, 42);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+33, groundY-80, 42, 29); ctx.fillRect(x+80, groundY-80, 22, 29);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+37, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+112, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawSemi(x) {
  const groundY = 480;
  ctx.fillStyle = '#C00'; ctx.fillRect(x, groundY-82, 92, 82);
  ctx.fillStyle = '#113344'; ctx.fillRect(x+16, groundY-70, 46, 40);
  ctx.fillStyle = '#DDD'; ctx.fillRect(x+88, groundY-107, 290, 110);
  ctx.fillStyle = '#A33'; ctx.fillRect(x+95, groundY-97, 275, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+42, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+125, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+195, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+265, groundY+12, 20, 0, Math.PI*2); ctx.fill();
}

function drawTree(x) {
  ctx.fillStyle = '#3C2F1F'; ctx.fillRect(x+35, 370, 18, 110);
  ctx.fillStyle = '#1E8C2E';
  ctx.beginPath(); ctx.moveTo(x+8, 380); ctx.lineTo(x+44, 310); ctx.lineTo(x+80, 380); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+12, 340); ctx.lineTo(x+44, 280); ctx.lineTo(x+76, 340); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+18, 310); ctx.lineTo(x+44, 250); ctx.lineTo(x+70, 310); ctx.fill();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = baseLevels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'shedWindow') drawShedWindow(ent.x);
    if (ent.type === 'leanToShed') drawLeanToShed(ent.x);
    if (ent.type === 'singleGarage') drawSingleGarage(ent.x);
    if (ent.type === 'house') drawTallHouse(ent.x);
    if (ent.type === 'smallHouse') drawSmallHouse(ent.x, ent.color);
    if (ent.type === 'miniBarn') drawMiniBarn(ent.x);
    if (ent.type === 'largeRedBarn') drawLargeRedBarn(ent.x);
    if (ent.type === 'hayBale') drawHayBale(ent.x);
    if (ent.type === 'tractor') drawTractor(ent.x);
    if (ent.type === 'sedan') drawSedan(ent.x, ent.yOffset || 0);
    if (ent.type === 'pickup') drawPickup(ent.x, ent.yOffset || 0);
    if (ent.type === 'semi') drawSemi(ent.x);
    if (ent.type === 'tree') drawTree(ent.x);
    if (ent.type === 'tornado') drawTornado(ent.x);
  });

  drawSideFireTruck();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', 1180, 580);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    if (Math.random() < 0.042) spot.health = Math.min(spot.health + (spot.growthRate || 6.8), spot.maxHealth);

    const intensity = Math.floor(spot.health / 10);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 1.3;
        p.life = 7;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += 10;
      scoreEl.textContent = score;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 13;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 168, truckY - 45);
  ctx.quadraticCurveTo(truckX + 255, truckY - 165, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 10, mouseY - 10, 20, 20);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 6, mouseY - 15, 12, 9);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
