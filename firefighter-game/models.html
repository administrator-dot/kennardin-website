<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Models Showcase - Fire Simulation Game</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #111; color: #fff; }
    h1, h2 { text-align: center; }
    .canvas-container { margin: 30px auto; border: 4px solid #333; background: #222; padding: 10px; }
    canvas { image-rendering: pixelated; display: block; margin: 0 auto; }
    .controls { text-align: center; margin: 20px 0; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; background: #001f3f; color: white; border: none; cursor: pointer; }
    button:hover { background: #003366; }
    .info { max-width: 1000px; margin: 20px auto; background: #222; padding: 15px; border-radius: 8px; font-size: 15px; line-height: 1.5; }
  </style>
</head>
<body>

  <h1>Models Showcase - Fire Simulation Game</h1>
  <p class="info">Grid: 1200×600 canvas • 40px cells • All objects mathematically aligned on ground line (y=480). No flying cars. House has no porch. Fire burn zones pre-marked in red/orange on realistic parts (engine/gas tank for vehicles, windows/door/roof for house).</p>

  <div class="controls">
    <button onclick="changeBackground(0)">Level 1 - Day Sky</button>
    <button onclick="changeBackground(1)">Level 2 - Sunset</button>
    <button onclick="changeBackground(2)">Level 3 - Night</button>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="1200" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentBg = 0;

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= 1200; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke();
      }
      for (let y = 0; y <= 600; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke();
      }
    }

    function drawBackground(bg) {
      if (bg === 0) { // Day Sky
        ctx.fillStyle = '#5cc8ff'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#4caf50'; ctx.fillRect(0, 480, 1200, 120);
      } else if (bg === 1) { // Sunset
        ctx.fillStyle = '#ff7a00'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#ff4500'; ctx.fillRect(0, 480, 1200, 120);
      } else { // Night
        ctx.fillStyle = '#112233'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#223322'; ctx.fillRect(0, 480, 1200, 120);
      }
    }

    function drawRedTruck(x, y) {
      // Realistic red truck body
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x, y-60, 180, 60); // cab + body
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+140, y-80, 60, 40); // trailer
      // Windows
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+20, y-55, 35, 25); // cab window
      ctx.fillRect(x+70, y-55, 35, 25);
      // Wheels
      ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(x+40, y-10, 20, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+120, y-10, 20, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.arc(x+40, y-10, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+120, y-10, 10, 0, Math.PI*2); ctx.fill();
      // Fire zones
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // engine
      ctx.fillRect(x+10, y-65, 30, 15);
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // gas tank
      ctx.fillRect(x+150, y-45, 25, 15);
    }

    function drawBlueCar(x, y) {
      ctx.fillStyle = '#3498db'; ctx.fillRect(x, y-50, 140, 50); // body
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+100, y-65, 50, 30); // cab
      // Windows
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+15, y-45, 30, 20);
      ctx.fillRect(x+55, y-45, 30, 20);
      // Wheels
      ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(x+30, y-5, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+110, y-5, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.arc(x+30, y-5, 9, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+110, y-5, 9, 0, Math.PI*2); ctx.fill();
      // Fire zones
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // engine
      ctx.fillRect(x+5, y-55, 28, 12);
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // gas tank
      ctx.fillRect(x+115, y-35, 20, 12);
    }

    function drawHouse(x, y) {
      ctx.fillStyle = '#f4d9b8'; ctx.fillRect(x, y-140, 160, 140); // walls
      ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(x, y-140); ctx.lineTo(x+80, y-200); ctx.lineTo(x+160, y-140); ctx.fill(); // roof
      // Windows (properly designed)
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+20, y-110, 30, 30);
      ctx.fillRect(x+70, y-110, 30, 30);
      ctx.fillRect(x+120, y-110, 30, 30);
      ctx.fillRect(x+20, y-60, 30, 30);
      ctx.fillRect(x+70, y-60, 30, 30);
      // Door
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+100, y-50, 30, 50);
      // Fire zones
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // bottom windows
      ctx.fillRect(x+25, y-85, 20, 8);
      ctx.fillRect(x+75, y-85, 20, 8);
      ctx.fillRect(x+125, y-85, 20, 8);
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // door bottom
      ctx.fillRect(x+105, y-10, 20, 8);
      ctx.fillStyle = 'rgba(255, 80, 0, 0.7)'; // roof points
      ctx.fillRect(x+40, y-185, 15, 8);
      ctx.fillRect(x+80, y-185, 15, 8);
      ctx.fillRect(x+120, y-185, 15, 8);
    }

    function render() {
      ctx.clearRect(0, 0, 1200, 600);
      drawBackground(currentBg);
      drawGrid();

      // Mathematically placed objects
      drawRedTruck(150, 480);   // Red truck on grid
      drawBlueCar(480, 480);    // Blue car on grid
      drawHouse(820, 480);      // House on grid (no porch)
    }

    function changeBackground(bg) {
      currentBg = bg;
      render();
    }

    // Initial render
    render();
  </script>
</body>
</html>
