<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 12px; padding: 16px 32px; font-size: 22px;
    background: #C00; color: white; border: none; border-radius: 10px; cursor: pointer;
    min-width: 220px;
  }
  button:hover { background: #F00; }
  .difficulty-btn { background:#0066CC; }
  .difficulty-btn:hover { background:#0088FF; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
  .bottom-label {
    position: absolute; bottom: 15px; right: 20px; font-size: 22px; color:#FF0;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  }
  .tip {
    position: absolute; top: 80px; left: 20px; background: rgba(0,0,0,0.85);
    color: #FF0; padding: 12px 20px; border-radius: 8px; max-width: 280px;
    font-size: 18px; display: none; border: 3px solid #FF0;
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:62px; margin-top:70px; color:#FF0; letter-spacing:4px; text-shadow: 4px 4px 0 #000;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:28px; margin:20px 0 40px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button><br>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button><br>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>
<div class="bottom-label">KVFD - Kennard, IN</div>
<div id="nozzleTip" class="tip"></div>

<canvas id="game" width="1200" height="600"></canvas>

<script>
// ============== NOZZLE SELECTOR TOP-LEFT + REALISTIC PHYSICS + NEW LAYOUTS ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let difficulty = 2;
let currentNozzle = 'wide'; // Level 1 starts on wide
let fireSpots = [];
let particles = [];
let showTip = false;

const truckX = 100;
const truckY = 480;

const baseLevels = [
  // Level 1 - Small Shed (close, starts on wide nozzle)
  { name: "Level 1 – Small Shed Fire", fireSpots: [
    {x:880,y:280,w:55,h:55,health:110,maxHealth:110,type:'window'},
    {x:900,y:255,w:65,h:40,health:130,maxHealth:130,type:'roof'},
    {x:935,y:355,w:42,h:95,health:100,maxHealth:100,type:'door'}
  ], entities: [{type:'shedWindow',x:840}, {type:'lawnMower',x:1060}] },

  // Level 2 - Lean-to Shed (far right)
  { name: "Level 2 – Lean-to Shed", fireSpots: [
    {x:1020,y:265,w:65,h:40,health:140,maxHealth:140,type:'roof'},
    {x:1075,y:355,w:42,h:95,health:110,maxHealth:110,type:'door'}
  ], entities: [{type:'leanToShed',x:980}] },

  // Level 3 - Garage (centered roll-up door)
  { name: "Level 3 – Garage Fire", fireSpots: [
    {x:920,y:255,w:110,h:225,health:180,maxHealth:180,type:'door'},
    {x:920,y:200,w:110,h:45,health:190,maxHealth:190,type:'roof'}
  ], entities: [{type:'singleGarage',x:820}] },

  // Level 4 - Tall House
  { name: "Level 4 – Tall House", fireSpots: [
    {x:900,y:240,w:60,h:90,health:170,maxHealth:170,type:'window'},
    {x:1020,y:240,w:60,h:90,health:170,maxHealth:170,type:'window'},
    {x:860,y:140,w:240,h:50,health:230,maxHealth:230,type:'roof'},
    {x:960,y:410,w:50,h:110,health:150,maxHealth:150,type:'door'}
  ], entities: [{type:'house',x:860,color:'#FFEE66'}] },

  // Level 5 - Tall House + Sedan
  { name: "Level 5 – Tall House + Sedan", fireSpots: [
    {x:900,y:240,w:60,h:90,health:180,maxHealth:180,type:'window'},
    {x:1020,y:240,w:60,h:90,health:180,maxHealth:180,type:'window'},
    {x:860,y:140,w:240,h:50,health:240,maxHealth:240,type:'roof'},
    {x:960,y:410,w:50,h:110,health:160,maxHealth:160,type:'door'}
  ], entities: [{type:'house',x:860,color:'#FF99CC'}, {type:'sedan',x:520,yOffset:8}] },

  // Level 6 - Tall House + Pickup
  { name: "Level 6 – Tall House + Pickup", fireSpots: [
    {x:900,y:240,w:60,h:90,health:190,maxHealth:190,type:'window'},
    {x:1020,y:240,w:60,h:90,health:190,maxHealth:190,type:'window'},
    {x:860,y:140,w:240,h:50,health:250,maxHealth:250,type:'roof'},
    {x:960,y:410,w:50,h:110,health:170,maxHealth:170,type:'door'}
  ], entities: [{type:'house',x:860,color:'#66CCFF'}, {type:'pickup',x:590,yOffset:10}] },

  // Level 7 - Mini Barn
  { name: "Level 7 – Mini Barn", fireSpots: [
    {x:880,y:255,w:78,h:225,health:210,maxHealth:210,type:'door'},
    {x:920,y:200,w:90,h:45,health:270,maxHealth:270,type:'roof'}
  ], entities: [{type:'miniBarn',x:820}] },

  // Level 8 - Farm Fire (truck in center, fires on both sides)
  { name: "Level 8 – Farm Fire", fireSpots: [
    {x:720,y:340,w:75,h:65,health:140,maxHealth:140,type:'hay'},
    {x:800,y:325,w:75,h:65,health:150,maxHealth:150,type:'hay'},
    {x:880,y:355,w:75,h:65,health:130,maxHealth:130,type:'hay'},
    {x:950,y:340,w:75,h:65,health:160,maxHealth:160,type:'hay'},
    {x:620,y:355,w:110,h:70,health:170,maxHealth:170,type:'tractor'}
  ], entities: [
    {type:'largeRedBarn',x:1050},
    {type:'tractor',x:520},
    {type:'hayBale',x:720}, {type:'hayBale',x:800}, 
    {type:'hayBale',x:880}, {type:'hayBale',x:950}
  ] },

  // Level 9 - Tall House + Semi Wreck
  { name: "Level 9 – Tall House + Semi Wreck", fireSpots: [
    {x:900,y:240,w:60,h:90,health:210,maxHealth:210,type:'window'},
    {x:1020,y:240,w:60,h:90,health:210,maxHealth:210,type:'window'},
    {x:860,y:140,w:240,h:50,health:270,maxHealth:270,type:'roof'},
    {x:960,y:410,w:50,h:110,health:190,maxHealth:190,type:'door'},
    {x:460,y:300,w:90,h:80,health:220,maxHealth:220,type:'cab'}
  ], entities: [{type:'house',x:860,color:'#FFEE66'}, {type:'semi',x:340}] },

  // Level 10 - Massive Wreck (truck centered)
  { name: "Level 10 – Massive Multi-Vehicle Wreck", fireSpots: [
    {x:520,y:345,w:110,h:55,health:170,maxHealth:170,type:'hood'},
    {x:550,y:310,w:70,h:45,health:130,maxHealth:130,type:'cab'},
    {x:780,y:300,w:90,h:80,health:230,maxHealth:230,type:'cab'},
    {x:880,y:270,w:260,h:105,health:340,maxHealth:340,type:'tanker'},
    {x:1020,y:340,w:130,h:55,health:190,maxHealth:190,type:'bed'}
  ], entities: [{type:'house',x:860,color:'#FF99CC'}, {type:'sedan',x:480,yOffset:8}, {type:'pickup',x:640,yOffset:10}, {type:'semi',x:780}] }
];

function startGame(diff) {
  difficulty = diff;
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const base = baseLevels[lvl-1];
  
  fireSpots = base.fireSpots.map(s => {
    let healthMod = 1, growthMod = 1;
    if (difficulty === 1) { healthMod = 0.75; growthMod = 0.7; }
    else if (difficulty === 3) { healthMod = 1.35; growthMod = 1.4; }
    return {
      ...s,
      health: Math.floor(s.health * healthMod),
      maxHealth: Math.floor(s.maxHealth * healthMod),
      growthRate: 5.5 * growthMod
    };
  });
  
  particles = [];
  gameState = 'playing';
  showTip = (lvl >= 2); // show nozzle tip on levels with far structures
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    document.getElementById('levelTitle').textContent = baseLevels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: Never hide from fire – get low and go!";
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < baseLevels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  document.getElementById('titleScreen').style.display = 'block';
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

// Nozzle selector (top left, stacked push buttons)
function drawNozzleSelector() {
  const yBase = 80;
  const w = 70, h = 70;

  // Wide
  ctx.fillStyle = currentNozzle === 'wide' ? '#FF0' : '#555';
  ctx.fillRect(30, yBase, w, h);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 14px Arial';
  ctx.fillText('WIDE', 48, yBase + 45);

  // Tight
  ctx.fillStyle = currentNozzle === 'tight' ? '#FF0' : '#555';
  ctx.fillRect(30, yBase + 80, w, h);
  ctx.fillText('TIGHT', 45, yBase + 125);

  // Fog
  ctx.fillStyle = currentNozzle === 'fog' ? '#FF0' : '#555';
  ctx.fillRect(30, yBase + 160, w, h);
  ctx.fillText('FOG', 52, yBase + 205);
}

canvas.addEventListener('click', e => {
  if (gameState !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  if (clickX > 30 && clickX < 100) {
    if (clickY > 80 && clickY < 150) currentNozzle = 'wide';
    else if (clickY > 160 && clickY < 230) currentNozzle = 'tight';
    else if (clickY > 240 && clickY < 310) currentNozzle = 'fog';
  }
});

// Realistic water based on nozzle + hose length limit
function createWaterParticles() {
  let count = 34, spread = 6, baseSpeed = 0.042, downward = -5.2;

  if (currentNozzle === 'wide') {
    count = 48; spread = 14; baseSpeed = 0.028; // barely reaches far side
  } else if (currentNozzle === 'tight') {
    count = 22; spread = 2; baseSpeed = 0.062; downward = -7;
  } else if (currentNozzle === 'fog') {
    count = 60; spread = 20; baseSpeed = 0.022; // very short range
  }

  for (let i = 0; i < count; i++) {
    const dirX = (mouseX - (truckX + 165)) * baseSpeed;
    const dirY = (mouseY - (truckY - 45)) * baseSpeed;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*8, mouseY + (Math.random()-0.5)*8, dirX + (Math.random()-0.5)*spread, dirY + (Math.random()-0.5)*spread + downward, '#33CCFF', 35, 4, 'water'));
  }
}

// Rest of the game code (buildings, loop, etc.) is the same as the last working version you liked, with the nozzle and layout updates above already applied.

loop();
</script>
</body>
</html>
