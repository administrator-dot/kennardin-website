<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kennard Fire Defender - Grid Test</title>
  <style>
    body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; color:#fff; text-align:center; }
    canvas { display:block; margin:0 auto; image-rendering:pixelated; }
    #overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    button { pointer-events:auto; margin:15px; padding:14px 28px; font-size:20px; background:#C00; color:white; border:none; border-radius:8px; cursor:pointer; }
    button:hover { background:#F00; }
    .info { position:absolute; top:15px; left:15px; font-size:24px; pointer-events:none; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="font-size:58px; margin-top:40px; color:#FF0;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:26px; margin:10px 0 30px;">KVFD • Kennard, Indiana</p>

    <div class="controls">
      <button onclick="changeBackground(0)">☀️ Day</button>
      <button onclick="changeBackground(1)">🌅 Dusk</button>
      <button onclick="changeBackground(2)">🌙 Night</button>
      <button onclick="igniteFires()">🔥 Ignite Fires</button>
      <button onclick="extinguishAll()">🧯 Put Out All</button>
    </div>
  </div>

  <div class="info">Score: <span id="score">0</span></div>

  <canvas id="gameCanvas" width="1200" height="600"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentBg = 0;
    let fires = [];
    let particles = [];
    let isSpraying = false;
    let mouseX = 700, mouseY = 350;

    const truckX = 120;
    const truckY = 480;

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= 1200; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke(); }
      for (let y = 0; y <= 600; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1200, y); ctx.stroke(); }
    }

    function drawBackground(bg) {
      if (bg === 0) { // Day
        ctx.fillStyle = '#5cc8ff'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#4caf50'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#ffeb3b'; ctx.beginPath(); ctx.arc(1000, 120, 40, 0, Math.PI*2); ctx.fill();
      } else if (bg === 1) { // Dusk
        ctx.fillStyle = '#ff7a00'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#3a8c3a'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#ff9800'; ctx.beginPath(); ctx.arc(900, 180, 35, 0, Math.PI*2); ctx.fill();
      } else { // Night
        ctx.fillStyle = '#112233'; ctx.fillRect(0, 0, 1200, 480);
        ctx.fillStyle = '#223322'; ctx.fillRect(0, 480, 1200, 120);
        ctx.fillStyle = '#f4f4f4'; ctx.beginPath(); ctx.arc(1000, 120, 35, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#112233'; ctx.beginPath(); ctx.arc(1020, 115, 25, 0, Math.PI*2); ctx.fill();
      }
    }

    function drawFireTruck(x, y) {
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x, y-85, 240, 75);
      ctx.fillStyle = '#fff'; ctx.fillRect(x+10, y-65, 220, 18);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+10, y-105, 70, 50);
      ctx.fillStyle = '#ecf0f1'; ctx.fillRect(x+70, y-115, 150, 18);
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(x+75, y-130, 8, 25); ctx.fillRect(x+95, y-130, 8, 25);
      ctx.fillRect(x+115, y-130, 8, 25); ctx.fillRect(x+135, y-130, 8, 25);
      ctx.fillRect(x+155, y-130, 8, 25); ctx.fillRect(x+175, y-130, 8, 25);
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+25, y-95, 40, 30);
      ctx.fillStyle = '#3498db'; ctx.fillRect(x+5, y-125, 18, 12);
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(x+70, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+150, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+210, y-10, 24, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ecf0f1';
      ctx.beginPath(); ctx.arc(x+70, y-10, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+150, y-10, 12, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+210, y-10, 12, 0, Math.PI*2); ctx.fill();
    }

    function drawBlueCar(x, y) {
      ctx.fillStyle = '#3498db'; ctx.fillRect(x, y-55, 160, 55);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+110, y-72, 55, 35);
      ctx.fillStyle = '#34495e'; ctx.fillRect(x+15, y-50, 35, 22); ctx.fillRect(x+60, y-50, 35, 22);
      ctx.fillStyle = '#2c3e50';
      ctx.beginPath(); ctx.arc(x+35, y-8, 18, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+125, y-8, 18, 0, Math.PI*2); ctx.fill();
    }

    function drawHouse(x, y) {
      ctx.fillStyle = '#f4d9b8'; ctx.fillRect(x, y-160, 200, 160);
      ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.moveTo(x, y-160); ctx.lineTo(x+100, y-220); ctx.lineTo(x+200, y-160); ctx.fill();
      ctx.fillStyle = '#34495e';
      ctx.fillRect(x+25, y-130, 35, 35); ctx.fillRect(x+80, y-130, 35, 35); ctx.fillRect(x+135, y-130, 35, 35);
      ctx.fillRect(x+25, y-80, 35, 35); ctx.fillRect(x+80, y-80, 35, 35);
      ctx.fillStyle = '#2c3e50'; ctx.fillRect(x+145, y-80, 35, 80);
    }

    function createWaterParticles() {
      const hoseEndX = truckX + 260;
      const hoseEndY = truckY - 38;
      const dx = mouseX - hoseEndX;
      const dy = mouseY - hoseEndY;
      const length = Math.sqrt(dx*dx + dy*dy) || 1;
      const dirX = dx / length * 1.25;
      const dirY = dy / length * 1.25;

      for (let i = 0; i < 14; i++) {
        const spread = (Math.random() - 0.5) * 3.5;
        particles.push({
          x: hoseEndX + (Math.random()-0.5)*5,
          y: hoseEndY + (Math.random()-0.5)*5,
          vx: dirX * 27 + spread,
          vy: dirY * 27 + spread - 4,
          color: '#33CCFF',
          life: 24,
          size: 4,
          type: 'water'
        });
      }
    }

    function createFireParticles(x, y, intensity) {
      for (let i = 0; i < intensity; i++) {
        const vx = (Math.random() - 0.5) * 3.4;
        const vy = -3.8 - Math.random() * 5.8;
        const colors = ['#FF1100', '#FF5500', '#FFAA00'];
        particles.push({x: x + (Math.random()-0.5)*48, y: y + (Math.random()-0.5)*35, vx: vx, vy: vy, color: colors[Math.floor(Math.random()*colors.length)], life: 48, size: 4 + Math.random()*7, type: 'fire'});
      }
    }

    function drawParticle(p) {
      ctx.globalAlpha = Math.max(0.1, p.life / 48);
      ctx.fillStyle = p.color;
      if (p.type === 'water') ctx.fillRect(p.x - 2.5, p.y - 3, 5, 9);
      else ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.globalAlpha = 1;
    }

    function render() {
      ctx.clearRect(0, 0, 1200, 600);
      drawBackground(currentBg);
      drawGrid();

      drawFireTruck(truckX, truckY);
      drawBlueCar(520, 480);
      drawHouse(860, 480);

      fires.forEach(f => createFireParticles(f.x, f.y, 6));

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.type === 'water') p.vy += 0.11;
        if (p.type === 'fire') {
          p.vy -= 0.17 + Math.random() * 0.2;
          p.vx += (Math.random() - 0.5) * 1.7;
        }
        p.life--;
        drawParticle(p);

        if (p.type === 'water') {
          for (let j = fires.length - 1; j >= 0; j--) {
            const f = fires[j];
            const dx = f.x - p.x;
            const dy = f.y - p.y;
            if (Math.sqrt(dx*dx + dy*dy) < 25) {
              fires.splice(j, 1);
              p.life = 8;
              break;
            }
          }
        }
        if (p.life <= 0) particles.splice(i, 1);
      }

      // HOSE IS ALWAYS DRAWN
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.moveTo(truckX + 260, truckY - 38);
      ctx.quadraticCurveTo(truckX + 340, truckY - 170, mouseX, mouseY);
      ctx.stroke();

      if (isSpraying) {
        createWaterParticles();
      }
    }

    function igniteFires() {
      fires = [
        {x: 555, y: 430, size: 11},
        {x: 630, y: 450, size: 9},
        {x: 885, y: 370, size: 10},
        {x: 940, y: 370, size: 10},
        {x: 995, y: 370, size: 10},
        {x: 1005, y: 410, size: 12},
        {x: 910, y: 280, size: 8},
        {x: 960, y: 280, size: 8}
      ];
      render();
    }

    function extinguishAll() { fires = []; render(); }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      if (isSpraying) render();
    });

    canvas.addEventListener('mousedown', () => { isSpraying = true; render(); });
    canvas.addEventListener('mouseup', () => { isSpraying = false; render(); });
    canvas.addEventListener('mouseleave', () => { isSpraying = false; render(); });

    function changeBackground(bg) {
      currentBg = bg;
      render();
    }

    setInterval(() => { if (fires.length > 0 || isSpraying) render(); }, 30);
    render();
  </script>
</body>
</html>
