<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender</title>
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; }
  canvas { display:block; margin:0 auto; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
  }
  button {
    pointer-events: auto; margin: 12px; padding: 16px 32px; font-size: 22px;
    background: #C00; color: white; border: none; border-radius: 10px; cursor: pointer;
    min-width: 220px;
  }
  button:hover { background: #F00; }
  .difficulty-btn { background:#0066CC; }
  .difficulty-btn:hover { background:#0088FF; }
  #ui { position: absolute; top: 15px; left: 15px; font-size: 24px; pointer-events: none; color:#FFF; }
  .bottom-label {
    position: absolute; bottom: 15px; right: 20px; font-size: 22px; color:#FF0;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="titleScreen">
    <h1 style="font-size:62px; margin-top:70px; color:#FF0; letter-spacing:4px; text-shadow: 4px 4px 0 #000;">KENNARD FIRE DEFENDER</h1>
    <p style="font-size:28px; margin:20px 0 40px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button><br>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button><br>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>

  <div id="levelCompleteScreen" style="display:none; margin-top:120px;">
    <h1 id="levelTitle" style="font-size:48px; color:#0F0;"></h1>
    <p id="encourageText" style="font-size:32px; margin:20px;"></p>
    <p id="safetyTip" style="font-size:26px; max-width:620px; margin:0 auto 30px; line-height:1.4;"></p>
    <button onclick="nextLevel()">NEXT LEVEL</button>
    <button onclick="resetGame()">PLAY AGAIN</button>
    <button onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
  </div>
</div>

<div id="ui">
  Score: <span id="score">0</span> &nbsp;&nbsp;&nbsp; Level: <span id="level">1</span>
</div>
<div class="bottom-label">KVFD - Kennard, IN</div>

<canvas id="game" width="1200" height="600"></canvas>

<script>
// ============== FULL WORKING GAME - NOZZLE + FARM SCENE + DISTINCT BUILDINGS ==============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');

let score = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let difficulty = 2;
let currentNozzle = 'tight'; // 'wide', 'tight', 'fog'
let fireSpots = [];
let particles = [];

const truckX = 100;
const truckY = 480;

const baseLevels = [
  { name: "Level 1 – Small Shed Fire", fireSpots: [
    {x:920,y:280,w:55,h:55,health:110,maxHealth:110,type:'window'},
    {x:940,y:255,w:65,h:40,health:130,maxHealth:130,type:'roof'},
    {x:975,y:355,w:42,h:95,health:100,maxHealth:100,type:'door'}
  ], entities: [{type:'shedWindow',x:880}, {type:'lawnMower',x:1080}] },

  { name: "Level 2 – Lean-to Shed", fireSpots: [
    {x:920,y:265,w:65,h:40,health:140,maxHealth:140,type:'roof'},
    {x:975,y:355,w:42,h:95,health:110,maxHealth:110,type:'door'}
  ], entities: [{type:'leanToShed',x:880}] },

  { name: "Level 3 – Garage Fire", fireSpots: [
    {x:920,y:255,w:110,h:225,health:180,maxHealth:180,type:'door'},
    {x:920,y:200,w:110,h:45,health:190,maxHealth:190,type:'roof'}
  ], entities: [{type:'singleGarage',x:820}] },

  { name: "Level 4 – Tall House", fireSpots: [
    {x:900,y:240,w:60,h:90,health:170,maxHealth:170,type:'window'},
    {x:1020,y:240,w:60,h:90,health:170,maxHealth:170,type:'window'},
    {x:860,y:140,w:240,h:50,health:230,maxHealth:230,type:'roof'},
    {x:960,y:410,w:50,h:110,health:150,maxHealth:150,type:'door'}
  ], entities: [{type:'house',x:860,color:'#FFEE66'}] },

  { name: "Level 5 – Tall House + Sedan", fireSpots: [
    {x:900,y:240,w:60,h:90,health:180,maxHealth:180,type:'window'},
    {x:1020,y:240,w:60,h:90,health:180,maxHealth:180,type:'window'},
    {x:860,y:140,w:240,h:50,health:240,maxHealth:240,type:'roof'},
    {x:960,y:410,w:50,h:110,health:160,maxHealth:160,type:'door'}
  ], entities: [{type:'house',x:860,color:'#FF99CC'}, {type:'sedan',x:520,yOffset:8}] },

  { name: "Level 6 – Tall House + Pickup", fireSpots: [
    {x:900,y:240,w:60,h:90,health:190,maxHealth:190,type:'window'},
    {x:1020,y:240,w:60,h:90,health:190,maxHealth:190,type:'window'},
    {x:860,y:140,w:240,h:50,health:250,maxHealth:250,type:'roof'},
    {x:960,y:410,w:50,h:110,health:170,maxHealth:170,type:'door'}
  ], entities: [{type:'house',x:860,color:'#66CCFF'}, {type:'pickup',x:590,yOffset:10}] },

  { name: "Level 7 – Mini Barn", fireSpots: [
    {x:880,y:255,w:78,h:225,health:210,maxHealth:210,type:'door'},
    {x:920,y:200,w:90,h:45,health:270,maxHealth:270,type:'roof'}
  ], entities: [{type:'miniBarn',x:820}] },

  { name: "Level 8 – Farm Fire", fireSpots: [
    {x:720,y:340,w:75,h:65,health:140,maxHealth:140,type:'hay'},
    {x:800,y:325,w:75,h:65,health:150,maxHealth:150,type:'hay'},
    {x:880,y:355,w:75,h:65,health:130,maxHealth:130,type:'hay'},
    {x:950,y:340,w:75,h:65,health:160,maxHealth:160,type:'hay'},
    {x:620,y:355,w:110,h:70,health:170,maxHealth:170,type:'tractor'}
  ], entities: [
    {type:'largeRedBarn',x:1050},
    {type:'tractor',x:520},
    {type:'hayBale',x:720}, {type:'hayBale',x:800}, 
    {type:'hayBale',x:880}, {type:'hayBale',x:950}
  ] },

  { name: "Level 9 – Tall House + Semi Wreck", fireSpots: [
    {x:900,y:240,w:60,h:90,health:210,maxHealth:210,type:'window'},
    {x:1020,y:240,w:60,h:90,health:210,maxHealth:210,type:'window'},
    {x:860,y:140,w:240,h:50,health:270,maxHealth:270,type:'roof'},
    {x:960,y:410,w:50,h:110,health:190,maxHealth:190,type:'door'},
    {x:460,y:300,w:90,h:80,health:220,maxHealth:220,type:'cab'}
  ], entities: [{type:'house',x:860,color:'#FFEE66'}, {type:'semi',x:340}] },

  { name: "Level 10 – Massive Multi-Vehicle Wreck", fireSpots: [
    {x:620,y:345,w:110,h:55,health:170,maxHealth:170,type:'hood'},
    {x:650,y:310,w:70,h:45,health:130,maxHealth:130,type:'cab'},
    {x:780,y:300,w:90,h:80,health:230,maxHealth:230,type:'cab'},
    {x:880,y:270,w:260,h:105,health:340,maxHealth:340,type:'tanker'},
    {x:520,y:340,w:130,h:55,health:190,maxHealth:190,type:'bed'}
  ], entities: [{type:'house',x:860,color:'#FF99CC'}, {type:'sedan',x:480,yOffset:8}, {type:'pickup',x:640,yOffset:10}, {type:'semi',x:780}] }
];

function startGame(diff) {
  difficulty = diff;
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelEl.textContent = currentLevel;
  const base = baseLevels[lvl-1];
  
  fireSpots = base.fireSpots.map(s => {
    let healthMod = 1, growthMod = 1;
    if (difficulty === 1) { healthMod = 0.75; growthMod = 0.7; }
    else if (difficulty === 3) { healthMod = 1.35; growthMod = 1.4; }
    return {
      ...s,
      health: Math.floor(s.health * healthMod),
      maxHealth: Math.floor(s.maxHealth * healthMod),
      growthRate: 5.5 * growthMod
    };
  });
  
  particles = [];
  gameState = 'playing';
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0)) {
    gameState = 'levelComplete';
    document.getElementById('levelTitle').textContent = baseLevels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = "Safety Tip: Never hide from fire – get low and go!";
    document.getElementById('levelCompleteScreen').style.display = 'block';
  }
}

function nextLevel() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  if (currentLevel < baseLevels.length) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels!"); resetGame(); }
}

function resetGame() {
  document.getElementById('levelCompleteScreen').style.display = 'none';
  score = 0;
  scoreEl.textContent = 0;
  document.getElementById('titleScreen').style.display = 'block';
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

document.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = Math.max(80, Math.min(e.clientX - rect.left, canvas.width - 40));
  mouseY = Math.max(120, Math.min(e.clientY - rect.top, canvas.height - 100));
});

canvas.addEventListener('mousedown', () => { if (gameState === 'playing') isSpraying = true; });
canvas.addEventListener('mouseup', () => isSpraying = false);
canvas.addEventListener('mouseleave', () => isSpraying = false);

class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.17 + Math.random() * 0.2; this.vx += (Math.random() - 0.5) * 1.7; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity; i++) {
    const vx = (Math.random() - 0.5) * 3.4;
    const vy = -3.8 - Math.random() * 5.8;
    const colors = ['#FF1100', '#FF5500', '#FFAA00'];
    particles.push(new Particle(x + (Math.random()-0.5)*50, y + (Math.random()-0.5)*40, vx, vy, colors[Math.floor(Math.random()*colors.length)], 48, 8 + Math.random()*14, 'fire'));
  }
}

function createWaterParticles() {
  let count = 34;
  let spread = 6;
  let baseSpeed = 0.042;
  let downward = -5.2;

  if (currentNozzle === 'wide') {
    count = 48; spread = 12; baseSpeed = 0.032;
  } else if (currentNozzle === 'tight') {
    count = 22; spread = 2; baseSpeed = 0.058; downward = -6.5;
  } else if (currentNozzle === 'fog') {
    count = 55; spread = 18; baseSpeed = 0.025;
  }

  for (let i = 0; i < count; i++) {
    const dirX = (mouseX - (truckX + 165)) * baseSpeed;
    const dirY = (mouseY - (truckY - 45)) * baseSpeed;
    particles.push(new Particle(mouseX + (Math.random()-0.5)*8, mouseY + (Math.random()-0.5)*8, dirX + (Math.random()-0.5)*spread, dirY + (Math.random()-0.5)*spread + downward, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*35, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 14 + Math.random()*19, 'smoke'));
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, '#7BC4FF');
  grad.addColorStop(1, '#C0E4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, 520);
  ctx.fillStyle = '#3D8C40';
  ctx.fillRect(0, 480, canvas.width, 120);
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(truckX + 20, truckY + 42, 185, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 13, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 13, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#E22';
  ctx.fillRect(truckX + 8, truckY - 48, 195, 82);
  ctx.fillStyle = '#C11';
  ctx.fillRect(truckX + 18, truckY - 78, 72, 38);
  ctx.fillStyle = '#AACCFF';
  ctx.fillRect(truckX + 26, truckY - 72, 28, 24);
  ctx.fillRect(truckX + 58, truckY - 72, 26, 24);
  ctx.fillStyle = '#FF0';
  ctx.fillRect(truckX + 12, truckY - 18, 185, 14);
  ctx.fillStyle = '#DD0';
  ctx.fillRect(truckX + 85, truckY - 88, 118, 12);
  ctx.fillStyle = '#BB0';
  for (let i = 0; i < 7; i++) {
    ctx.fillRect(truckX + 92 + i*16, truckY - 92, 6, 20);
  }
  ctx.fillStyle = '#B22';
  ctx.fillRect(truckX + 145, truckY - 45, 55, 38);
  ctx.fillStyle = '#00F';
  ctx.fillRect(truckX + 25, truckY - 82, 12, 6);
}

// Nozzle selector
function drawNozzleSelector() {
  ctx.fillStyle = currentNozzle === 'wide' ? '#FF0' : '#666';
  ctx.fillRect(30, 520, 60, 60);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 14px Arial';
  ctx.fillText('WIDE', 45, 555);

  ctx.fillStyle = currentNozzle === 'tight' ? '#FF0' : '#666';
  ctx.fillRect(100, 520, 60, 60);
  ctx.fillText('TIGHT', 112, 555);

  ctx.fillStyle = currentNozzle === 'fog' ? '#FF0' : '#666';
  ctx.fillRect(170, 520, 60, 60);
  ctx.fillText('FOG', 190, 555);
}

canvas.addEventListener('click', e => {
  if (gameState !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  if (clickY > 520 && clickY < 580) {
    if (clickX > 30 && clickX < 90) currentNozzle = 'wide';
    else if (clickX > 100 && clickX < 160) currentNozzle = 'tight';
    else if (clickX > 170 && clickX < 230) currentNozzle = 'fog';
  }
});

// Building functions (thinner lines, distinct designs)
function drawShedWindow(x) {
  ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+30, 255, 190, 225);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  for (let i = 0; i < 9; i++) {
    ctx.beginPath(); ctx.moveTo(x+38, 270 + i*24); ctx.lineTo(x+210, 270 + i*24); ctx.stroke();
  }
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath(); ctx.moveTo(x+10, 255); ctx.lineTo(x+125, 185); ctx.lineTo(x+240, 255); ctx.fill();
  ctx.fillStyle = '#3C2F1F'; ctx.fillRect(x+75, 340, 48, 140);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+155, 275, 52, 52);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4; ctx.strokeRect(x+155, 275, 52, 52);
}

function drawLeanToShed(x) {
  ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+30, 255, 190, 225);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  for (let i = 0; i < 9; i++) {
    ctx.beginPath(); ctx.moveTo(x+38, 270 + i*24); ctx.lineTo(x+210, 270 + i*24); ctx.stroke();
  }
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath(); ctx.moveTo(x+10, 255); ctx.lineTo(x+125, 210); ctx.lineTo(x+240, 255); ctx.fill();
  ctx.fillStyle = '#3C2F1F'; ctx.fillRect(x+75, 340, 48, 140);
}

function drawSingleGarage(x) {
  ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+20, 230, 260, 250);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  for (let i = 0; i < 11; i++) {
    ctx.beginPath(); ctx.moveTo(x+30, 245 + i*22); ctx.lineTo(x+270, 245 + i*22); ctx.stroke();
  }
  ctx.fillStyle = '#777'; // silver roll-up door
  ctx.fillRect(x+91, 255, 118, 225);
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath(); ctx.moveTo(x, 230); ctx.lineTo(x+150, 160); ctx.lineTo(x+300, 230); ctx.fill();
}

function drawTallHouse(x) {
  ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x, 200, 270, 320);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  for (let i = 0; i < 13; i++) {
    ctx.beginPath(); ctx.moveTo(x+12, 212 + i*24); ctx.lineTo(x+258, 212 + i*24); ctx.stroke();
  }
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath(); ctx.moveTo(x-25, 190); ctx.lineTo(x+135, 100); ctx.lineTo(x+290, 190); ctx.fill();
  ctx.fillStyle = '#A33'; ctx.fillRect(x+175, 115, 32, 60);
  ctx.fillStyle = '#3C2F1F'; ctx.fillRect(x+105, 405, 48, 115);
  ctx.fillStyle = '#FFCC00'; ctx.fillRect(x+122, 465, 10, 10);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  ctx.strokeRect(x+30, 255, 68, 95); ctx.strokeRect(x+172, 255, 68, 95);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+35, 260, 58, 85); ctx.fillRect(x+177, 260, 58, 85);
}

function drawLargeRedBarn(x) {
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#C22'; ctx.fillRect(x+20, 180, 260, 300);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  for (let i = 0; i < 13; i++) {
    ctx.beginPath(); ctx.moveTo(x+30, 195 + i*22); ctx.lineTo(x+270, 195 + i*22); ctx.stroke();
  }
  ctx.fillStyle = '#8B2A00';
  ctx.beginPath(); ctx.moveTo(x, 180); ctx.lineTo(x+130, 100); ctx.lineTo(x+280, 180); ctx.fill();
  ctx.fillStyle = '#FFF'; ctx.fillRect(x+95, 340, 70, 140); // open doors with white trim
  ctx.globalAlpha = 1;
}

function drawHayBale(x) {
  ctx.fillStyle = '#E8B070'; ctx.fillRect(x, 390, 80, 60);
  ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
  ctx.strokeRect(x, 390, 80, 60);
  ctx.fillStyle = '#D9A060';
  for (let i = 0; i < 5; i++) ctx.fillRect(x + 10 + i*12, 395, 8, 50);
}

function drawTractor(x) {
  ctx.fillStyle = '#228B22'; ctx.fillRect(x+20, 390, 130, 70);
  ctx.fillStyle = '#111'; ctx.fillRect(x+40, 355, 60, 45);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+48, 362, 35, 30);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+50, 445, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+120, 445, 18, 0, Math.PI*2); ctx.fill();
}

function drawSedan(x, yOffset = 0) {
  const groundY = 480 + yOffset;
  ctx.fillStyle = '#1E5A9E'; ctx.fillRect(x+15, groundY-52, 120, 55);
  ctx.fillStyle = '#0F3A6B'; ctx.fillRect(x+28, groundY-85, 90, 42);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+38, groundY-78, 40, 28); ctx.fillRect(x+82, groundY-78, 27, 28);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+40, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+102, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawPickup(x, yOffset = 0) {
  const groundY = 480 + yOffset;
  ctx.fillStyle = '#1F2A3C'; ctx.fillRect(x+10, groundY-52, 140, 54);
  ctx.fillStyle = '#111'; ctx.fillRect(x+25, groundY-88, 85, 42);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(x+33, groundY-80, 42, 29); ctx.fillRect(x+80, groundY-80, 22, 29);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+37, groundY+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+112, groundY+8, 18, 0, Math.PI*2); ctx.fill();
}

function drawSemi(x) {
  const groundY = 480;
  ctx.fillStyle = '#C00'; ctx.fillRect(x, groundY-82, 92, 82);
  ctx.fillStyle = '#113344'; ctx.fillRect(x+16, groundY-70, 46, 40);
  ctx.fillStyle = '#DDD'; ctx.fillRect(x+88, groundY-107, 290, 110);
  ctx.fillStyle = '#A33'; ctx.fillRect(x+95, groundY-97, 275, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x+42, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+125, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+195, groundY+12, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+265, groundY+12, 20, 0, Math.PI*2); ctx.fill();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  const data = baseLevels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'shedWindow') drawShedWindow(ent.x);
    if (ent.type === 'leanToShed') drawLeanToShed(ent.x);
    if (ent.type === 'singleGarage') drawSingleGarage(ent.x);
    if (ent.type === 'house') drawTallHouse(ent.x);
    if (ent.type === 'largeRedBarn') drawLargeRedBarn(ent.x);
    if (ent.type === 'hayBale') drawHayBale(ent.x);
    if (ent.type === 'tractor') drawTractor(ent.x);
    if (ent.type === 'sedan') drawSedan(ent.x, ent.yOffset || 0);
    if (ent.type === 'pickup') drawPickup(ent.x, ent.yOffset || 0);
    if (ent.type === 'semi') drawSemi(ent.x);
  });

  drawSideFireTruck();
  drawNozzleSelector();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN', 1180, 580);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    if (Math.random() < 0.038) spot.health = Math.min(spot.health + (spot.growthRate || 5.5), spot.maxHealth);

    const intensity = Math.floor(spot.health / 12);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 1.2;
        p.life = 7;
      }
    }

    if (spot.health <= 0) {
      createSmoke(spot.x + spot.w/2, spot.y + spot.h/2);
      score += 10;
      scoreEl.textContent = score;
    }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 13;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + 168, truckY - 45);
  ctx.quadraticCurveTo(truckX + 255, truckY - 165, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222';
  ctx.fillRect(mouseX - 10, mouseY - 10, 20, 20);
  ctx.fillStyle = '#555';
  ctx.fillRect(mouseX - 6, mouseY - 15, 12, 9);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
