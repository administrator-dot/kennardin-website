<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kennard Fire Defender - Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { margin:0; background:#000; font-family:Arial, sans-serif; overflow:hidden; touch-action: none; }
  #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
  canvas { display: block; max-width: 100%; max-height: 100%; image-rendering: crisp-edges; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; text-align: center; z-index: 10; }

  button { 
    pointer-events: auto; 
    margin: 8px auto; 
    padding: 14px 40px; 
    font-size: 21px; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    display: block;
    width: 210px;
  }
  button:hover { filter: brightness(1.15); }

  /* Difficulty buttons - blue */
  .difficulty-btn {
    background: #0066CC;
  }
  .difficulty-btn:hover {
    background: #0088FF;
  }

  .copyright { position: absolute; bottom: 6px; left: 10px; font-size: 9px; color:#777; text-align: left; z-index: 20; line-height: 1.1; }

  #landscapeMessage { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.95); color: #FFDD00; font-size: 26px; line-height: 1.4; 
    display: none; align-items: center; justify-content: center; text-align: center; z-index: 200; padding: 30px; 
  }

  /* Level Complete Screen - Slides in from left */
  #levelCompleteScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: none; align-items: center; justify-content: center; z-index: 30;
  }
  #levelCompleteScreen > div {
    background: rgba(0,0,0,0.92); 
    padding: 25px 35px; 
    border-radius: 16px; 
    max-width: 85%; 
    text-align: center;
    transform: translateX(-120%);
    transition: transform 0.45s ease-out;
  }
  #levelCompleteScreen.show > div {
    transform: translateX(0);
  }

  #levelCompleteScreen h1 { font-size: 34px; color: #0F0; margin: 0 0 12px 0; }
  #levelCompleteScreen p { font-size: 20px; line-height: 1.35; margin: 8px 0; }

  /* Promoted Next Level */
  #nextLevelBtn {
    font-size: 23px; 
    padding: 16px 45px; 
    width: 230px; 
    background: #00CC00; 
    box-shadow: 0 4px 15px rgba(0,255,0,0.5);
  }
  #nextLevelBtn:hover { background: #00FF00; transform: scale(1.05); }

  /* Smaller secondary buttons */
  .secondary-btn {
    font-size: 17px; 
    padding: 11px 35px; 
    width: 195px; 
    background: #0066CC; 
  }
  .secondary-btn:hover { background: #0088FF; }

  @media (max-width: 820px) {
    #titleScreen h1 { font-size: 38px !important; margin-top: 18px !important; letter-spacing: 1px; }
    #titleScreen p { font-size: 22px; margin: 10px 0 24px; }
  }
</style>
</head>
<body>

<div id="landscapeMessage">Please rotate your device to <strong>Landscape</strong> mode<br>for the best experience</div>

<div id="gameContainer">
  <canvas id="game" width="1200" height="600"></canvas>
</div>

<div id="overlay">
  <div id="titleScreen">
    <!-- Dark backing for title to prevent overlap with top bar -->
    <div style="position:relative; display:inline-block; margin-top:20px;">
      <div style="position:absolute; top:-8px; left:-20px; right:-20px; bottom:-8px; background:rgba(0,0,0,0.85); border-radius:16px; z-index:-1;"></div>
      <h1 style="font-size:52px; margin:0; color:#FF0; letter-spacing:3px; text-shadow: 
        0 0 10px #FF0, 
        0 0 20px #FF8800, 
        0 0 30px #FF4400, 
        3px 3px 0 #000, 
        -2px -2px 0 #000; 
        font-style: italic; 
        font-weight: 900;
        position:relative; z-index:2;">KENNARD FIRE DEFENDER</h1>
    </div>
    <p style="font-size:24px; margin:12px 0 28px; color:#FFDD88;">Choose Difficulty</p>
    <button class="difficulty-btn" onclick="startGame(1)">EASY</button>
    <button class="difficulty-btn" onclick="startGame(2)">MEDIUM</button>
    <button class="difficulty-btn" onclick="startGame(3)">HARD</button>
  </div>
</div>

<div id="levelCompleteScreen">
  <div>
    <h1 id="levelTitle"></h1>
    <p id="encourageText"></p>
    <p id="safetyTip" style="font-size:19px; color:#FFEE88; margin-top:15px;"></p>
    
    <div class="buttons">
      <button id="nextLevelBtn" onclick="nextLevel()">NEXT LEVEL</button>
      <button class="secondary-btn" onclick="redoLevel()">PLAY AGAIN</button>
      <button class="secondary-btn" onclick="returnToFirePage()">RETURN TO FIRE PAGE</button>
    </div>
  </div>
</div>

<div class="copyright">
  Free for public use.<br>
  Created by Jason Groce - Kennard, IN<br>
  If you enjoyed please consider a donation to the Kennard Volunteer Fire Department.
</div>

<script>
// ============== FINAL COMPLETE VERSION - TITLE BACKING + SAFETY TIPS RESTORED ==============

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const landscapeMsg = document.getElementById('landscapeMessage');
const levelCompleteScreen = document.getElementById('levelCompleteScreen');

let score = 0;
let levelStartScore = 0;
let mouseX = 500, mouseY = 300;
let isSpraying = false;
let gameState = 'title';
let currentLevel = 1;
let difficulty = 2;
let timeOfDay = 0;
let tornadoAngle = 0;
let fireSpots = [];
let particles = [];

const truckX = 100;
const truckY = 480;
const nozzleAttachX = 168;
const nozzleAttachY = -45;

const safetyTips = [
  "Never play with matches or lighters.",
  "If your clothes catch fire, stop, drop, and roll.",
  "Have a family escape plan and practice it.",
  "Check smoke alarms every month.",
  "Keep a fire extinguisher accessible and know how to use it.",
  "Stay low and crawl under smoke to escape.",
  "Never hide from fire — get low and go!",
  "Don't overload electrical outlets.",
  "Keep flammable items away from heat sources.",
  "Practice fire safety every day — it could save lives."
];

const baseLevels = [
  { name: "Level 1 – Small Shed Fire", fireSpots: [{x:880,y:280,w:55,h:55,health:320,maxHealth:400},{x:900,y:255,w:65,h:40,health:580,maxHealth:720},{x:935,y:355,w:42,h:95,health:270,maxHealth:340}], entities: [{type:'shedWindow',x:840}, {type:'lawnMower',x:1060}] },
  { name: "Level 2 – Car + Tree Crash", fireSpots: [{x:620,y:355,w:110,h:55,health:380,maxHealth:480},{x:650,y:320,w:70,h:45,health:350,maxHealth:440},{x:790,y:280,w:45,h:140,health:430,maxHealth:530},{x:810,y:260,w:35,h:80,health:300,maxHealth:380}], entities: [{type:'sedan',x:580,yOffset:12},{type:'tree',x:810}] },
  { name: "Level 3 – Garage Fire", fireSpots: [{x:920,y:200,w:110,h:45,health:650,maxHealth:800},{x:920,y:255,w:55,h:225,health:350,maxHealth:440},{x:975,y:255,w:55,h:225,health:350,maxHealth:440},{x:945,y:460,w:40,h:20,health:240,maxHealth:300}], entities: [{type:'singleGarage',x:820}] },
  { name: "Level 4 – Small Shed + Tree with Tire Swing", fireSpots: [{x:880,y:280,w:55,h:55,health:360,maxHealth:450},{x:900,y:255,w:65,h:40,health:610,maxHealth:760},{x:935,y:355,w:42,h:95,health:320,maxHealth:400},{x:675,y:355,w:45,h:50,health:340,maxHealth:430},{x:700,y:325,w:35,h:40,health:290,maxHealth:370}], entities: [{type:'smallShed',x:820},{type:'treeWithSwing',x:620}] },
  { name: "Level 5 – Small House + Sedan", fireSpots: [{x:920,y:260,w:50,h:70,health:380,maxHealth:480},{x:1000,y:260,w:50,h:70,health:380,maxHealth:480},{x:870,y:170,w:190,h:60,health:690,maxHealth:850},{x:950,y:400,w:45,h:100,health:350,maxHealth:440}], entities: [{type:'smallHouse',x:850,color:'#FFCC99'}, {type:'sedan',x:520,yOffset:8}] },
  { name: "Level 6 – Tall House + Pickup + Burning Trees", fireSpots: [{x:900,y:240,w:60,h:90,health:410,maxHealth:510},{x:1020,y:240,w:60,h:90,health:410,maxHealth:510},{x:860,y:140,w:240,h:50,health:730,maxHealth:900},{x:960,y:410,w:50,h:110,health:380,maxHealth:480},{x:680,y:280,w:45,h:120,health:370,maxHealth:470},{x:1150,y:280,w:45,h:120,health:370,maxHealth:470}], entities: [{type:'house',x:860,color:'#66CCFF'}, {type:'pickup',x:590,yOffset:10}, {type:'tree',x:680}, {type:'tree',x:1150}] },
  { name: "Level 7 – Mini Barn", fireSpots: [{x:880,y:255,w:78,h:225,health:500,maxHealth:620},{x:920,y:200,w:90,h:45,health:700,maxHealth:860},{x:620,y:425,w:110,h:70,health:460,maxHealth:570}], entities: [{type:'miniBarn',x:820},{type:'tractor',x:520,facing:'right'}] },
  { name: "Level 8 – Farm Fire", fireSpots: [{x:720,y:410,w:75,h:65,health:410,maxHealth:510},{x:800,y:395,w:75,h:65,health:430,maxHealth:530},{x:880,y:425,w:75,h:65,health:400,maxHealth:500},{x:950,y:410,w:75,h:65,health:460,maxHealth:570},{x:620,y:425,w:110,h:70,health:460,maxHealth:570}], entities: [{type:'largeRedBarn',x:1050},{type:'tractor',x:520,facing:'left'},{type:'hayBale',x:720},{type:'hayBale',x:800},{type:'hayBale',x:880},{type:'hayBale',x:950}] },
  { name: "Level 9 – Tall House with Tornado", fireSpots: [{x:780,y:240,w:60,h:90,health:450,maxHealth:560},{x:900,y:240,w:60,h:90,health:450,maxHealth:560},{x:740,y:140,w:240,h:50,health:770,maxHealth:950},{x:840,y:410,w:50,h:110,health:420,maxHealth:520}], entities: [{type:'house',x:740,color:'#FFEE66'}, {type:'tornado',x:620}] },
  { name: "Level 10 – Big Car Wreck", fireSpots: [{x:480,y:355,w:110,h:55,health:470,maxHealth:590},{x:510,y:320,w:70,h:45,health:410,maxHealth:510},{x:740,y:315,w:90,h:80,health:560,maxHealth:700},{x:840,y:285,w:260,h:105,health:780,maxHealth:960},{x:980,y:355,w:130,h:55,health:500,maxHealth:620},{x:650,y:340,w:55,h:40,health:450,maxHealth:560}], entities: [{type:'sedan',x:420,yOffset:12},{type:'pickup',x:620,yOffset:8},{type:'semi',x:780}] }
];

// Input handling
function isInTimeSelector(x, y) { return y > 8 && y < 82 && x > 950 && x < 1195; }
function handleTimeSelection(x, y) {
  if (x > 980 && x < 1042) setTimeOfDay(0);
  else if (x > 1048 && x < 1110) setTimeOfDay(1);
  else if (x > 1116 && x < 1178) setTimeOfDay(2);
}

function resizeCanvas() {
  const aspect = 1200 / 600;
  let w = window.innerWidth * 0.98;
  let h = window.innerHeight * 0.92;
  if (w / h > aspect) {
    canvas.style.width = (h * aspect) + 'px';
    canvas.style.height = h + 'px';
  } else {
    canvas.style.width = w + 'px';
    canvas.style.height = (w / aspect) + 'px';
  }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function checkOrientation() {
  landscapeMsg.style.display = (window.innerWidth < window.innerHeight) ? 'flex' : 'none';
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

function setTimeOfDay(mode) { timeOfDay = mode; }

function startGame(diff) {
  difficulty = diff;
  document.getElementById('titleScreen').style.display = 'none';
  loadLevel(1);
}

function loadLevel(lvl) {
  currentLevel = lvl;
  levelStartScore = score;
  const base = baseLevels[lvl-1];
  fireSpots = base.fireSpots.map(s => {
    let healthMod = 1, growthMod = 1;
    if (difficulty === 1) { healthMod = 2.25; growthMod = 2.0; }
    else if (difficulty === 2) { healthMod = 1.45; growthMod = 1.38; }
    else if (difficulty === 3) { healthMod = 1.95; growthMod = 1.75; }
    return { ...s, health: Math.floor(s.health * healthMod), maxHealth: Math.floor(s.maxHealth * healthMod), growthRate: 4.6 * growthMod };
  });
  particles = [];
  gameState = 'playing';
  levelCompleteScreen.style.display = 'none';
  levelCompleteScreen.classList.remove('show');
}

function checkWin() {
  if (fireSpots.every(s => s.health <= 0) && gameState === 'playing') {
    gameState = 'levelComplete';
    const isFinal = currentLevel === 10;
    document.getElementById('levelTitle').textContent = baseLevels[currentLevel-1].name + " COMPLETE!";
    document.getElementById('encourageText').innerHTML = isFinal ? "Thank you for playing!<br>Try a harder difficulty next time." : "Great Work, Kennard Fire Defender!<br>You saved the day!";
    document.getElementById('safetyTip').textContent = safetyTips[currentLevel-1];
    
    levelCompleteScreen.style.display = 'flex';
    setTimeout(() => levelCompleteScreen.classList.add('show'), 50);
  }
}

function nextLevel() {
  levelCompleteScreen.style.display = 'none';
  levelCompleteScreen.classList.remove('show');
  if (currentLevel < 10) loadLevel(currentLevel + 1);
  else { alert("🎉 You completed all 10 levels!"); resetGame(); }
}

function redoLevel() {
  levelCompleteScreen.style.display = 'none';
  levelCompleteScreen.classList.remove('show');
  score = levelStartScore;
  loadLevel(currentLevel);
}

function resetGame() {
  levelCompleteScreen.style.display = 'none';
  levelCompleteScreen.classList.remove('show');
  score = 0;
  document.getElementById('titleScreen').style.display = 'block';
  gameState = 'title';
}

function returnToFirePage() {
  window.location.href = 'https://kennardin.com/fire-department.html';
}

// Input handling
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 500);
  let clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 300);
  mouseX = (clientX - rect.left) * (1200 / rect.width);
  mouseY = (clientY - rect.top) * (600 / rect.height);
  mouseX = Math.max(80, Math.min(mouseX, 1160));
  mouseY = Math.max(80, Math.min(mouseY, 520));
}

function handleStart(e) {
  e.preventDefault();
  getPos(e);
  if (gameState === 'playing') {
    if (isInTimeSelector(mouseX, mouseY)) {
      handleTimeSelection(mouseX, mouseY);
      return;
    }
    isSpraying = true;
  }
}

function handleMove(e) { e.preventDefault(); getPos(e); }
function handleEnd(e) { e.preventDefault(); isSpraying = false; }

canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);
canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('touchend', handleEnd, { passive: false });
canvas.addEventListener('touchcancel', handleEnd, { passive: false });

canvas.addEventListener('click', function(e) {
  getPos(e);
  if (isInTimeSelector(mouseX, mouseY)) handleTimeSelection(mouseX, mouseY);
});

// Particle System
class Particle {
  constructor(x, y, vx, vy, color, life, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.size = size; this.type = type;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life--;
    if (this.type === 'water') this.vy += 0.11;
    if (this.type === 'fire') { this.vy -= 0.17 + Math.random() * 0.2; this.vx += (Math.random() - 0.5) * 1.7; }
  }
  draw() {
    ctx.globalAlpha = Math.max(0.1, this.life / 48);
    ctx.fillStyle = this.color;
    if (this.type === 'water') ctx.fillRect(this.x - 2.5, this.y - 3, 5, 9);
    else ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

function createFireParticles(x, y, intensity) {
  for (let i = 0; i < intensity * 0.6; i++) {
    const vx = (Math.random() - 0.5) * 3.4;
    const vy = -3.8 - Math.random() * 5.8;
    const colors = ['#FF1100', '#FF5500', '#FFAA00'];
    particles.push(new Particle(x + (Math.random()-0.5)*50, y + (Math.random()-0.5)*40, vx, vy, colors[Math.floor(Math.random()*colors.length)], 48, 8 + Math.random()*14, 'fire'));
  }
}

function createWaterParticles() {
  for (let i = 0; i < 52; i++) {
    const tipX = mouseX * 0.90 + (truckX + nozzleAttachX) * 0.10;
    const tipY = mouseY * 0.88 + (truckY + nozzleAttachY) * 0.12;
    let dirX = (mouseX - (truckX + nozzleAttachX)) * 0.048;
    let dirY = (mouseY - (truckY + nozzleAttachY)) * 0.048 + 5.5;
    particles.push(new Particle(tipX + (Math.random() - 0.5) * 5, tipY + (Math.random() - 0.5) * 5, dirX + (Math.random() - 0.5) * 4.8, dirY + (Math.random() - 0.5) * 4.8 - 3, '#33CCFF', 35, 4, 'water'));
  }
}

function createSmoke(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push(new Particle(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*35, (Math.random()-0.5)*2.6, -1.2 - Math.random()*1.9, '#666666', 650, 14 + Math.random()*19, 'smoke'));
  }
}

// Draw Functions
function drawBackground() {
  let sky1, sky2, sunColor, sunX, sunY, grassColor;
  if (timeOfDay === 0) { sky1 = '#7BC4FF'; sky2 = '#C0E4FF'; sunColor = '#FFDD00'; sunX = 300; sunY = 120; grassColor = '#3D8C40'; }
  else if (timeOfDay === 1) { sky1 = '#FF8800'; sky2 = '#FFBB66'; sunColor = '#FFAA00'; sunX = 900; sunY = 140; grassColor = '#2A6B2F'; }
  else { sky1 = '#112244'; sky2 = '#223366'; sunColor = '#EEEEEE'; sunX = 600; sunY = 130; grassColor = '#1F4A22'; }
  const grad = ctx.createLinearGradient(0, 0, 0, 520);
  grad.addColorStop(0, sky1); grad.addColorStop(1, sky2);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 520);
  ctx.fillStyle = sunColor; ctx.beginPath(); ctx.arc(sunX, sunY, 45, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = grassColor; ctx.fillRect(0, 480, 1200, 120);
  if (timeOfDay === 2) {
    ctx.fillStyle = '#FFFFFF'; ctx.globalAlpha = 0.8;
    ctx.fillRect(200,80,3,3); ctx.fillRect(450,50,2,2); ctx.fillRect(720,110,3,3); ctx.fillRect(950,70,2,2); ctx.fillRect(1100,40,3,3);
    ctx.globalAlpha = 1;
  }
}

function drawSideFireTruck() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(truckX + 20, truckY + 42, 185, 16);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#DDD';
  ctx.beginPath(); ctx.arc(truckX + 52, truckY + 38, 13, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(truckX + 135, truckY + 38, 13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#E22'; ctx.fillRect(truckX + 8, truckY - 48, 195, 82);
  ctx.fillStyle = '#C11'; ctx.fillRect(truckX + 18, truckY - 78, 72, 38);
  ctx.fillStyle = '#AACCFF'; ctx.fillRect(truckX + 26, truckY - 72, 28, 24); ctx.fillRect(truckX + 58, truckY - 72, 26, 24);
  ctx.fillStyle = '#FF0'; ctx.fillRect(truckX + 12, truckY - 18, 185, 14);
  ctx.fillStyle = '#DD0'; ctx.fillRect(truckX + 85, truckY - 88, 118, 12);
  ctx.fillStyle = '#BB0';
  for (let i = 0; i < 7; i++) ctx.fillRect(truckX + 92 + i*16, truckY - 92, 6, 20);
  ctx.fillStyle = '#B22'; ctx.fillRect(truckX + 145, truckY - 45, 55, 38);
  ctx.fillStyle = '#00F'; ctx.fillRect(truckX + 25, truckY - 82, 12, 6);
}

function drawShedWindow(x) { ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+30,255,190,225); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<9;i++){ctx.beginPath();ctx.moveTo(x+38,270+i*24);ctx.lineTo(x+210,270+i*24);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x+10,255);ctx.lineTo(x+125,185);ctx.lineTo(x+240,255);ctx.fill(); ctx.fillStyle='#3C2F1F';ctx.fillRect(x+82,340,48,140); ctx.fillStyle='#AACCFF';ctx.fillRect(x+155,275,52,52); ctx.strokeRect(x+155,275,52,52); }
function drawSmallShed(x) { ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+30,255,160,225); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(x+38,270+i*26);ctx.lineTo(x+180,270+i*26);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x+10,255);ctx.lineTo(x+110,195);ctx.lineTo(x+200,255);ctx.fill(); ctx.fillStyle='#3C2F1F';ctx.fillRect(x+72,340,42,140); }
function drawSingleGarage(x) { ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x+20,230,260,250); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<11;i++){ctx.beginPath();ctx.moveTo(x+30,245+i*22);ctx.lineTo(x+270,245+i*22);ctx.stroke();} ctx.fillStyle='#555';ctx.fillRect(x+91,255,118,225); ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x,230);ctx.lineTo(x+150,160);ctx.lineTo(x+300,230);ctx.fill(); }
function drawTallHouse(x) { ctx.fillStyle = '#E8D5B8'; ctx.fillRect(x,200,270,320); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<13;i++){ctx.beginPath();ctx.moveTo(x+12,212+i*24);ctx.lineTo(x+258,212+i*24);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x-25,190);ctx.lineTo(x+135,100);ctx.lineTo(x+290,190);ctx.fill(); ctx.fillStyle='#A33';ctx.fillRect(x+175,115,32,60); ctx.fillStyle='#3C2F1F';ctx.fillRect(x+105,405,48,115); ctx.fillStyle='#FFCC00';ctx.fillRect(x+122,465,10,10); ctx.strokeStyle='#222';ctx.lineWidth=4; ctx.strokeRect(x+30,255,68,95);ctx.strokeRect(x+172,255,68,95); ctx.fillStyle='#AACCFF';ctx.fillRect(x+35,260,58,85);ctx.fillRect(x+177,260,58,85); }
function drawSmallHouse(x,color='#FFCC99') { ctx.fillStyle = color; ctx.fillRect(x+40,240,180,240); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(x+48,252+i*26);ctx.lineTo(x+212,252+i*26);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x+20,240);ctx.lineTo(x+130,150);ctx.lineTo(x+220,240);ctx.fill(); ctx.fillStyle='#3C2F1F';ctx.fillRect(x+92,390,45,90); ctx.fillStyle='#FFCC00';ctx.fillRect(x+102,440,8,8); ctx.strokeStyle='#222';ctx.lineWidth=4; ctx.strokeRect(x+55,270,48,65);ctx.strokeRect(x+145,270,48,65); ctx.fillStyle='#AACCFF';ctx.fillRect(x+58,273,42,58);ctx.fillRect(x+148,273,42,58); }
function drawMiniBarn(x) { ctx.fillStyle = '#C22'; ctx.fillRect(x+40,230,180,250); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<9;i++){ctx.beginPath();ctx.moveTo(x+48,245+i*24);ctx.lineTo(x+212,245+i*24);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x+20,230);ctx.lineTo(x+130,170);ctx.lineTo(x+220,230);ctx.fill(); ctx.fillStyle='#FFF';ctx.fillRect(x+78,310,55,170); }
function drawLargeRedBarn(x) { ctx.globalAlpha = 0.75; ctx.fillStyle = '#C22'; ctx.fillRect(x+20,180,260,300); ctx.strokeStyle='#222'; ctx.lineWidth=4; for(let i=0;i<13;i++){ctx.beginPath();ctx.moveTo(x+30,195+i*22);ctx.lineTo(x+270,195+i*22);ctx.stroke();} ctx.fillStyle='#8B2A00'; ctx.beginPath();ctx.moveTo(x,180);ctx.lineTo(x+130,100);ctx.lineTo(x+280,180);ctx.fill(); ctx.fillStyle='#FFF';ctx.fillRect(x+95,340,70,140); ctx.globalAlpha = 1; }
function drawHayBale(x) { ctx.fillStyle = '#E8B070'; ctx.fillRect(x,415,80,60); ctx.strokeStyle='#222'; ctx.lineWidth=4; ctx.strokeRect(x,415,80,60); ctx.fillStyle='#D9A060'; for(let i=0;i<5;i++) ctx.fillRect(x+10+i*12,420,8,50); }
function drawTractor(x,facing) { const flip = facing==='left'?-1:1; ctx.save(); ctx.translate(x+75,410); ctx.scale(flip,1); ctx.fillStyle='#228B22';ctx.fillRect(-65,0,130,65); ctx.fillStyle='#111';ctx.fillRect(-45,-30,65,38); ctx.fillStyle='#AACCFF';ctx.fillRect(-38,-25,38,28); ctx.fillStyle='#1A6B1A';ctx.fillRect(10,-10,55,38); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(-45,65,22,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#DDD';ctx.beginPath();ctx.arc(-45,65,12,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(35,65,14,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#DDD';ctx.beginPath();ctx.arc(35,65,7,0,Math.PI*2);ctx.fill(); ctx.restore(); }
function drawSedan(x,yOffset=0) { const gy=480+yOffset; ctx.fillStyle='#1E5A9E';ctx.fillRect(x+15,gy-52,120,55); ctx.fillStyle='#0F3A6B';ctx.fillRect(x+28,gy-85,90,42); ctx.fillStyle='#AACCFF';ctx.fillRect(x+38,gy-78,40,28);ctx.fillRect(x+82,gy-78,27,28); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(x+40,gy+8,18,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+102,gy+8,18,0,Math.PI*2);ctx.fill(); }
function drawPickup(x,yOffset=0) { const gy=480+yOffset; ctx.fillStyle='#1F2A3C';ctx.fillRect(x+10,gy-52,140,54); ctx.fillStyle='#111';ctx.fillRect(x+25,gy-88,85,42); ctx.fillStyle='#AACCFF';ctx.fillRect(x+33,gy-80,42,29);ctx.fillRect(x+80,gy-80,22,29); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(x+37,gy+8,18,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+112,gy+8,18,0,Math.PI*2);ctx.fill(); }
function drawSemi(x) { const gy=480; ctx.fillStyle='#C00';ctx.fillRect(x,gy-82,92,82); ctx.fillStyle='#113344';ctx.fillRect(x+16,gy-70,46,40); ctx.fillStyle='#DDD';ctx.fillRect(x+88,gy-107,290,110); ctx.fillStyle='#A33';ctx.fillRect(x+95,gy-97,275,16); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(x+42,gy+12,20,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+125,gy+12,20,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+195,gy+12,20,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+265,gy+12,20,0,Math.PI*2);ctx.fill(); }
function drawTree(x) { ctx.fillStyle='#3C2F1F';ctx.fillRect(x+35,370,18,110); ctx.fillStyle='#1E8C2E'; ctx.beginPath();ctx.moveTo(x+8,380);ctx.lineTo(x+44,310);ctx.lineTo(x+80,380);ctx.fill(); ctx.beginPath();ctx.moveTo(x+12,340);ctx.lineTo(x+44,280);ctx.lineTo(x+76,340);ctx.fill(); ctx.beginPath();ctx.moveTo(x+18,310);ctx.lineTo(x+44,250);ctx.lineTo(x+70,310);ctx.fill(); }
function drawTreeWithSwing(x) { ctx.fillStyle='#3C2F1F';ctx.fillRect(x+35,370,18,110); ctx.fillStyle='#1E8C2E'; ctx.beginPath();ctx.moveTo(x+8,380);ctx.lineTo(x+44,310);ctx.lineTo(x+80,380);ctx.fill(); ctx.beginPath();ctx.moveTo(x+12,340);ctx.lineTo(x+44,280);ctx.lineTo(x+76,340);ctx.fill(); ctx.beginPath();ctx.moveTo(x+18,310);ctx.lineTo(x+44,250);ctx.lineTo(x+70,310);ctx.fill(); ctx.strokeStyle='#222';ctx.lineWidth=6; ctx.beginPath();ctx.moveTo(x+55,310);ctx.lineTo(x+55,405);ctx.stroke(); ctx.fillStyle='#222'; ctx.beginPath();ctx.arc(x+55,420,18,0,Math.PI*2);ctx.fill(); ctx.fillStyle='#555'; ctx.beginPath();ctx.arc(x+55,420,12,0,Math.PI*2);ctx.fill(); }
function drawLawnMower(x) { ctx.fillStyle='#228B22';ctx.fillRect(x+30,410,95,55); ctx.fillStyle='#111';ctx.fillRect(x+45,385,48,32); ctx.fillStyle='#AACCFF';ctx.fillRect(x+52,392,32,20); ctx.fillStyle='#111'; ctx.beginPath();ctx.arc(x+45,465,13,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(x+105,465,13,0,Math.PI*2);ctx.fill(); }
function drawTornado(x) {
  tornadoAngle += 0.032;
  const topTwist = Math.sin(tornadoAngle)*22;
  const midTwist = Math.sin(tornadoAngle*1.3)*8;
  ctx.globalAlpha = 0.58;
  ctx.strokeStyle = '#444444'; ctx.lineWidth = 34;
  ctx.beginPath();
  ctx.moveTo(x-38+topTwist,155);
  ctx.quadraticCurveTo(x+22+midTwist,240,x-18+midTwist*1.2,340);
  ctx.quadraticCurveTo(x+28,410,x+8,480);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function loop() {
  ctx.clearRect(0,0,1200,600);
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(20,18,320,48);
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`,35,48); ctx.fillText(`Level: ${currentLevel}`,195,48);

  ctx.fillStyle = '#0066CC';
  ctx.fillRect(980,18,62,38); ctx.fillRect(1048,18,62,38); ctx.fillRect(1116,18,62,38);
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
  ctx.fillText("Day",1011,43); ctx.fillText("Dusk",1079,43); ctx.fillText("Night",1147,43);

  const data = baseLevels[currentLevel-1];
  data.entities.forEach(ent => {
    if (ent.type === 'shedWindow') drawShedWindow(ent.x);
    if (ent.type === 'smallShed') drawSmallShed(ent.x);
    if (ent.type === 'singleGarage') drawSingleGarage(ent.x);
    if (ent.type === 'house') drawTallHouse(ent.x);
    if (ent.type === 'smallHouse') drawSmallHouse(ent.x, ent.color);
    if (ent.type === 'miniBarn') drawMiniBarn(ent.x);
    if (ent.type === 'largeRedBarn') drawLargeRedBarn(ent.x);
    if (ent.type === 'hayBale') drawHayBale(ent.x);
    if (ent.type === 'tractor') drawTractor(ent.x, ent.facing || 'right');
    if (ent.type === 'sedan') drawSedan(ent.x, ent.yOffset || 0);
    if (ent.type === 'pickup') drawPickup(ent.x, ent.yOffset || 0);
    if (ent.type === 'semi') drawSemi(ent.x);
    if (ent.type === 'tree') drawTree(ent.x);
    if (ent.type === 'treeWithSwing') drawTreeWithSwing(ent.x);
    if (ent.type === 'tornado') drawTornado(ent.x);
    if (ent.type === 'lawnMower') drawLawnMower(ent.x);
  });

  drawSideFireTruck();

  ctx.fillStyle = '#FF0'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'right';
  ctx.fillText('KVFD - Kennard, IN',1180,580);

  fireSpots.forEach(spot => {
    if (spot.health <= 0) return;
    if (Math.random() < 0.032) spot.health = Math.min(spot.health + (spot.growthRate || 4.6), spot.maxHealth);
    const intensity = Math.floor(spot.health / 18);
    createFireParticles(spot.x + spot.w/2, spot.y + spot.h/2, intensity);

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      if (p.type === 'water' && p.x > spot.x && p.x < spot.x + spot.w && p.y > spot.y && p.y < spot.y + spot.h) {
        spot.health -= 0.17;
        p.life = 7;
      }
    }
    if (spot.health <= 0) { createSmoke(spot.x + spot.w/2, spot.y + spot.h/2); score += 10; }
  });

  if (isSpraying) createWaterParticles();

  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.update(); p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  ctx.strokeStyle = '#333333'; ctx.lineWidth = 13; ctx.lineCap = 'round'; ctx.shadowBlur = 12; ctx.shadowColor = '#111';
  ctx.beginPath();
  ctx.moveTo(truckX + nozzleAttachX, truckY + nozzleAttachY);
  ctx.quadraticCurveTo(truckX + 255, truckY - 165, mouseX, mouseY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#222'; ctx.fillRect(mouseX-10, mouseY-10, 20, 20);
  ctx.fillStyle = '#555'; ctx.fillRect(mouseX-6, mouseY-15, 12, 9);

  if (gameState === 'playing') checkWin();
  requestAnimationFrame(loop);
}

loop();
</script>
