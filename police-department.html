<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Department - Town of Kennard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <!-- Load shared header -->
  <div id="header"></div>

  <!-- Thin blue banner (unique to this page) -->
  <div class="banner" style="padding: 8px 20px;">
    <div class="container text-center">
      <h1 style="color: white; margin: 0;">Police Department</h1>
    </div>
  </div>

  <!-- Your page content only (everything else is now in header/footer) -->
  <div class="container section">
    <div class="row align-items-center">
      <div class="col-md-4 text-center">
        <img src="images/policeseal-lighter-blue_1.png" alt="Kennard Police Seal" style="width: 100%; max-width: 220px;">
      </div>
      <div class="col-md-8">
        <h2>Kennard’s Law Enforcement</h2>
        <p>Our police department provides 24/7 protection for the Town of Kennard and surrounding areas.</p>
      </div>
    </div>
  </div>

  <!-- ... rest of your police content here (Contact, Safety Tips, etc.) ... -->

  <!-- Load shared footer -->
  <div id="footer"></div>

  <script>
    // Load header and footer
    fetch('header.html').then(r => r.text()).then(html => document.getElementById('header').innerHTML = html);
    fetch('footer.html').then(r => r.text()).then(html => document.getElementById('footer').innerHTML = html);
  </script>
</body>
</html>
