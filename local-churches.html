<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Churches - Town of Kennard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    .blue-header { background-color: #001f3f; }
    .top-brand { padding: 6px 0; }
    .blue-card { background: linear-gradient(135deg, #e6f0ff, #d0e0f5); border: none; box-shadow: 0 4px 12px rgba(0, 31, 63, 0.15); transition: all 0.3s ease; height: 100%; }
    .blue-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0, 31, 63, 0.25); }
  </style>
</head>
<body>
  <div id="site-header"></div>
<!-- Note to self: Double-row header like FAQ -->
  

  <!-- Local Churches cards with centered links under buttons -->
  <div class="container section">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card h-100 p-4" style="background: white; border: 1px solid #e0e0e0;">
          <h3>Kennard Friends Church</h3>
          <p>101 N Vine St, Kennard, IN 47351</p>
          <a href="http://kennardfriends.blogspot.com/?m=0" target="_blank" class="green-button btn btn-lg px-4 mb-2">Visit Church Website</a>
          <p class="small text-center"><a href="http://kennardfriends.blogspot.com/?m=0" target="_blank">http://kennardfriends.blogspot.com/?m=0</a></p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100 p-4" style="background: white; border: 1px solid #e0e0e0;">
          <h3>Kennard Baptist Church</h3>
          <p>6931 W County Road 100 South, Shirley, IN 47384</p>
          <a href="https://www.kennardbaptist.com/" target="_blank" class="green-button btn btn-lg px-4 mb-2">Visit Church Website</a>
          <p class="small text-center"><a href="https://www.kennardbaptist.com/" target="_blank">https://www.kennardbaptist.com/</a></p>
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <!-- Search script -->
  <script src="shared/site.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
