<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Town of Kennard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

  <!-- === HEADER WILL LOAD HERE === -->
  <div id="header-placeholder"></div>

  <!-- === YOUR CURRENT INDEX CONTENT GOES HERE === -->
  <!-- Paste everything that was between your old header and footer here -->
  <!-- (weather widget, welcome text, location info, YouTube button, public comments, cards, bids summary, etc.) -->
  <!-- Do NOT change anything inside this section yet -->

  <!-- === FOOTER WILL LOAD HERE === -->
  <div id="footer-placeholder"></div>

  <!-- Load header and footer -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('header.html')
        .then(r => r.text())
        .then(html => document.getElementById('header-placeholder').innerHTML = html);

      fetch('footer.html')
        .then(r => r.text())
        .then(html => document.getElementById('footer-placeholder').innerHTML = html);
    });
  </script>
</body>
</html>
